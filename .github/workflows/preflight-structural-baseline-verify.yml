name: Safe Check Structural Baseline Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/scripts/preflight_structural_baseline_patch.py"
      - "koschei/api/internal/services/security_radar_structural.go"
      - "koschei/api/internal/handlers/arvis_preflight.go"
      - ".github/workflows/preflight-structural-baseline-verify.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Apply structural baseline patch
        working-directory: koschei/api
        run: |
          python scripts/preflight_structural_baseline_patch.py
          gofmt -w internal/services/security_radar_structural.go internal/handlers/arvis_preflight.go
      - name: Production package build
        working-directory: koschei/api
        run: go build ./internal/services ./internal/handlers ./internal/http
      - name: Full Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Baseline contract checks
        working-directory: koschei/api
        run: |
          grep -q 'func (s \*SecurityRadarStore) StructuralBaseline' internal/services/security_radar_structural.go
          grep -q 'holder_observed_at, authority_observed_at' internal/services/security_radar_structural.go
          grep -q 'cached.structuralFloor(time.Now().UTC())' internal/services/security_radar_structural.go
          grep -q 'alignARVISPreflightWithStructuralBaseline' internal/handlers/arvis_preflight.go
          grep -q 'Doğrulanmış yapısal risk tabanı uygulandı' internal/handlers/arvis_preflight.go
          grep -q 'solana-mainnet' internal/handlers/arvis_preflight.go
      - name: Commit verified implementation
        if: success()
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/internal/services/security_radar_structural.go koschei/api/internal/handlers/arvis_preflight.go
          git commit -m 'Align Safe Check with verified structural risk'
          git push origin HEAD:${{ github.head_ref }}
