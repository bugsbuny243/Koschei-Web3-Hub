name: Export source for forensics

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'feature/pump-ledger-launch-forensics'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Package source
        run: |
          tar --exclude=.git -czf /tmp/koschei-source.tgz .
      - uses: actions/upload-artifact@v4
        with:
          name: koschei-source-forensics
          path: /tmp/koschei-source.tgz
