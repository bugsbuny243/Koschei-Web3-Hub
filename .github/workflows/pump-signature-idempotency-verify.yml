name: Pump Signature Idempotency Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/scripts/pump_signature_idempotency_patch.py"
      - "koschei/api/internal/services/security_radar_store.go"
      - ".github/workflows/pump-signature-idempotency-verify.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Apply idempotency patch
        working-directory: koschei/api
        run: |
          python scripts/pump_signature_idempotency_patch.py
          gofmt -w internal/services/security_radar_store.go
      - name: Railway production build command
        working-directory: koschei/api
        run: go build -o app .
      - name: Security Radar service tests
        working-directory: koschei/api
        run: go test ./internal/services -count=1
      - name: Full Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Constraint compatibility contract
        working-directory: koschei/api
        run: |
          grep -Fq 'ON CONFLICT DO NOTHING' internal/services/security_radar_store.go
          ! grep -Fq 'ON CONFLICT (signature, module_id, network) DO NOTHING' internal/services/security_radar_store.go
          grep -Fq 'security_radar_seen_signatures_legacy_unique_idx' migrations/033_security_radar_live_feed.sql
          grep -Fq 'security_radar_seen_signatures_unique_idx' migrations/033_security_radar_live_feed.sql
      - name: Commit verified hotfix
        if: success()
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/internal/services/security_radar_store.go
          git commit -m 'Make Pump signature dedupe idempotent'
          git push origin HEAD:${{ github.head_ref }}
