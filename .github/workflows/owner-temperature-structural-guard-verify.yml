name: Owner Temperature Structural Guard Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/scripts/owner_temperature_structural_guard_patch.py"
      - "koschei/api/internal/router/anthropic_owner.go"
      - "koschei/api/internal/handlers/arvis_preflight.go"
      - "koschei/api/internal/services/security_radar_structural.go"
      - ".github/workflows/owner-temperature-structural-guard-verify.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Apply three-file production patch
        working-directory: koschei/api
        run: |
          python scripts/owner_temperature_structural_guard_patch.py
          gofmt -w internal/router/anthropic_owner.go internal/handlers/arvis_preflight.go internal/services/security_radar_structural.go
      - name: Owner Anthropic isolation tests
        working-directory: koschei/api
        run: go test ./internal/router -run '^TestOwnerChat' -count=1
      - name: Temperature omission contract
        working-directory: koschei/api
        run: |
          ! grep -q 'json:"temperature' internal/router/anthropic_owner.go
          ! grep -q 'Temperature:' internal/router/anthropic_owner.go
          grep -q 'HARD RULE: never send `temperature`' internal/router/anthropic_owner.go
      - name: Production package build
        working-directory: koschei/api
        run: go build ./internal/router ./internal/services ./internal/handlers ./internal/http
      - name: Full Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Structural contract checks
        working-directory: koschei/api
        run: |
          grep -q 'alignARVISPreflightWithStructuralBaseline' internal/handlers/arvis_preflight.go
          grep -q 'must never lower a stronger local' internal/handlers/arvis_preflight.go
          grep -q 'holder and authority freshness remain independent' internal/services/security_radar_structural.go
          grep -q 'cached.structuralFloor(time.Now().UTC())' internal/services/security_radar_structural.go
      - name: Commit verified implementation
        if: success()
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/internal/router/anthropic_owner.go koschei/api/internal/handlers/arvis_preflight.go koschei/api/internal/services/security_radar_structural.go
          git commit -m 'Remove deprecated Anthropic temperature and guard structural baseline'
          git push origin HEAD:${{ github.head_ref }}
