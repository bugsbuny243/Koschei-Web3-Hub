name: Auth Retention Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/public/js/koschei-auth.js"
      - "koschei/api/internal/services/security_radar_watcher.go"
      - "koschei/api/internal/services/security_radar_retention_worker.go"
      - ".github/workflows/auth-retention-verify.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - run: go mod download
      - name: Go format
        run: test -z "$(gofmt -l internal/services/security_radar_watcher.go internal/services/security_radar_retention_worker.go)"
      - name: Compile services package
        run: go test ./internal/services -run '^$'
      - name: Vet services package
        run: go vet ./internal/services
      - name: Build complete API
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Check auth JavaScript
        run: node --check public/js/koschei-auth.js
      - name: Enforce Neon CORS hard rule
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('public/js/koschei-auth.js').read_text()
          start = text.index('async function fetchNeonJSON')
          end = text.index('async function fetchNeonSession')
          block = text[start:end]
          assert "credentials: 'include'" not in block.replace("// HARD RULE: never add credentials:'include' here.", '')
          assert 'HARD RULE' in block
          assert 'Shopier' not in text and 'Paddle' not in text
          assert 'aktif Koschei paketi' not in text
          PY
      - name: Smoke test Neon sign-in request
        run: |
          node <<'JS'
          const fs = require('fs');
          const vm = require('vm');
          const calls = [];
          const storage = new Map();
          global.window = global;
          global.document = { title: 'test' };
          global.location = { origin: 'https://tradepigloball.co', pathname: '/login.html', search: '', hash: '', href: '' };
          global.history = { replaceState() {} };
          global.localStorage = {
            getItem: key => storage.get(key) || null,
            setItem: (key, value) => storage.set(key, String(value)),
            removeItem: key => storage.delete(key),
          };
          const payload = Buffer.from(JSON.stringify({ sub: 'user-1', email: 'user@example.com', exp: Math.floor(Date.now()/1000)+3600 })).toString('base64url');
          const token = `e30.${payload}.sig`;
          global.fetch = async (url, options = {}) => {
            calls.push({ url: String(url), options });
            if (url === '/api/config') return new Response(JSON.stringify({ neonAuthUrl: 'https://auth.example.test' }), { status: 200 });
            if (url === 'https://auth.example.test/sign-in/email') return new Response(JSON.stringify({ access_token: token }), { status: 200 });
            if (url === '/api/me') return new Response(JSON.stringify({ ok: true, email: 'user@example.com' }), { status: 200 });
            return new Response('{}', { status: 404 });
          };
          vm.runInThisContext(fs.readFileSync('public/js/koschei-auth.js', 'utf8'));
          KoscheiAuth.signIn('user@example.com', 'secret').then(() => {
            const neon = calls.find(call => call.url.includes('/sign-in/email'));
            if (!neon) throw new Error('Neon sign-in request missing');
            if ('credentials' in neon.options) throw new Error('Cross-origin credentials must not be sent');
            if (KoscheiAuth.getEmail() !== 'user@example.com') throw new Error('JWT persistence failed');
          }).catch(error => { console.error(error); process.exit(1); });
          JS
