name: Free Core KOSCH Premium Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/internal/http/**"
      - "koschei/api/internal/handlers/platform.go"
      - "koschei/api/public/dashboard.html"
      - "koschei/api/public/pricing.html"
      - "koschei/api/public/kosch.html"
      - "koschei/api/public/security-ecosystem.*"
      - ".github/workflows/free-core-kosch-premium-verify.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - run: go mod download
      - name: Check Go formatting
        run: |
          test -z "$(gofmt -l internal/http/server.go internal/http/server_helpers.go internal/http/sensitive_rate_limit.go internal/http/route_inventory.go internal/handlers/platform.go)"
      - name: Compile changed backend packages
        run: go build ./internal/http ./internal/handlers
      - name: Vet production Go files
        run: |
          http_files=$(go list -f '{{range .GoFiles}}{{$.Dir}}/{{.}} {{end}}' ./internal/http)
          handler_files=$(go list -f '{{range .GoFiles}}{{$.Dir}}/{{.}} {{end}}' ./internal/handlers)
          go vet $http_files
          go vet $handler_files
      - name: Build complete API
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Assert route split
        run: |
          grep -q 'mux.HandleFunc("/api/token/scan", method("POST", h.TokenScan))' internal/http/server.go
          grep -q 'koschAccess(method("POST", h.SecurityRadarCheck))' internal/http/server.go
          grep -q 'free-core-kosch-premium' internal/http/server.go
          grep -q 'path == "/api/token/scan"' internal/http/server_helpers.go
          grep -q 'case "/api/token/scan"' internal/http/sensitive_rate_limit.go
      - name: Check public page JavaScript
        run: |
          python3 - <<'PY'
          import pathlib, re, subprocess, tempfile
          pages = ['dashboard.html', 'kosch.html', 'security-ecosystem.html']
          pattern = re.compile(r'<script(?P<attrs>[^>]*)>(?P<body>.*?)</script>', re.I | re.S)
          failures = []
          for name in pages:
              text = (pathlib.Path('public') / name).read_text(encoding='utf-8')
              for idx, match in enumerate(pattern.finditer(text), 1):
                  if re.search(r'\bsrc\s*=', match.group('attrs'), re.I):
                      continue
                  body = match.group('body').strip()
                  if not body:
                      continue
                  with tempfile.NamedTemporaryFile('w', suffix='.js', encoding='utf-8', delete=False) as fh:
                      fh.write(body)
                      path = fh.name
                  result = subprocess.run(['node', '--check', path], text=True, capture_output=True)
                  if result.returncode:
                      failures.append(f'{name} script {idx}: {result.stderr}')
          if failures:
              raise SystemExit('\n'.join(failures))
          PY
      - name: Assert dashboard is public free core
        run: |
          ! grep -q 'requireAuth' public/dashboard.html
          grep -q "fetch('/api/token/scan'" public/dashboard.html
          grep -q 'KOSCH ücretsiz kullanımı kapatmaz' public/dashboard.html
