name: Agent Holder Intelligence Unification

on:
  push:
    branches:
      - agent/unify-holder-intelligence-core
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum

      - name: Expand and apply surgical edits
        shell: bash
        run: |
          set -o pipefail
          mkdir -p .github/agent/diagnostics
          base64 -d .github/agent/apply_holder_unification.py.gz.b64 | gzip -d > .github/agent/apply_holder_unification.py
          python3 .github/agent/apply_holder_unification.py 2>&1 | tee .github/agent/diagnostics/apply.log
          gofmt -w \
            koschei/api/internal/services/security_radars.go \
            koschei/api/internal/services/arvis_arms.go \
            koschei/api/internal/services/holder_role_intelligence.go \
            koschei/api/internal/services/holder_intelligence.go \
            koschei/api/internal/services/holder_role_intelligence_test.go \
            koschei/api/internal/services/holder_intelligence_test.go \
            koschei/api/internal/handlers/holder_intelligence_core.go \
            koschei/api/internal/handlers/holder_intelligence_core_test.go \
            koschei/api/internal/handlers/token_scanner.go \
            koschei/api/internal/handlers/b2b_token_scan.go \
            koschei/api/internal/handlers/shield.go \
            koschei/api/internal/handlers/owner_operations.go \
            koschei/api/internal/handlers/security_radar_detail_v3.go

      - name: Test API
        shell: bash
        working-directory: koschei/api
        run: |
          set -o pipefail
          go test ./... 2>&1 | tee ../../.github/agent/diagnostics/test.log

      - name: Vet API
        shell: bash
        working-directory: koschei/api
        run: |
          set -o pipefail
          go vet ./... 2>&1 | tee ../../.github/agent/diagnostics/vet.log

      - name: Build API
        shell: bash
        working-directory: koschei/api
        run: |
          set -o pipefail
          CGO_ENABLED=0 GOOS=linux go build ./... 2>&1 | tee ../../.github/agent/diagnostics/build.log

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: holder-unification-diagnostics
          path: .github/agent/diagnostics
          if-no-files-found: error

      - name: Commit verified implementation
        run: |
          rm -rf .github/agent .github/workflows/agent-holder-unification.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Unify customer holder intelligence"
          git push origin HEAD:${TARGET_BRANCH}
