name: Dead Code Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Inventory and reference audit
        working-directory: koschei/api
        run: |
          python - <<'PY' | tee dead-code-audit.txt
          from pathlib import Path
          import re
          names = {'rug_radar.go','web3.go','local_auth.go','mev_shield.go','liquidity_radar.go','impact_metrics.go','metadata.go','owner_payment_health.go','web3_jobs.go','package_status.go','jobs.go','dao_guardian.go','plans.go','payments.go','smart_money.go'}
          root = Path('.')
          files = [p for p in root.rglob('*.go') if '/vendor/' not in str(p)]
          candidates = [p for p in files if p.name in names or p.name.startswith('credits')]
          all_text = {p: p.read_text(errors='ignore') for p in files}
          print('=== CANDIDATE FILES ===')
          for p in sorted(candidates):
            text = all_text[p]
            funcs = re.findall(r'^func\s+(?:\([^)]*\)\s*)?([A-Za-z_][A-Za-z0-9_]*)\s*\(', text, re.M)
            types = re.findall(r'^type\s+([A-Za-z_][A-Za-z0-9_]*)\b', text, re.M)
            vars_ = re.findall(r'^(?:var|const)\s+([A-Za-z_][A-Za-z0-9_]*)\b', text, re.M)
            symbols = list(dict.fromkeys(funcs + types + vars_))
            external = []
            for sym in symbols:
              hits=[]; rx=re.compile(r'\b'+re.escape(sym)+r'\b')
              for other,body in all_text.items():
                if other==p: continue
                count=len(rx.findall(body))
                if count: hits.append((str(other),count))
              if hits: external.append((sym,hits))
            print(f'\nFILE {p} lines={len(text.splitlines())}')
            print('symbols:', ', '.join(symbols) or '(none)')
            if external:
              print('EXTERNAL REFERENCES:')
              for sym,hits in external: print(' ',sym,'=>','; '.join(f'{f}:{n}' for f,n in hits))
            else: print('EXTERNAL REFERENCES: NONE')
          print('\n=== ROUTE REFERENCES ===')
          for p in sorted(root.rglob('*.go')):
            body=p.read_text(errors='ignore')
            if re.search(r'(RugRadar|Web3|MEV|Liquidity|PackageStatus|SmartMoney|DAO|Payment|Credit|Job)', body, re.I) and ('internal/http' in str(p) or 'server.go' in p.name or 'routes' in p.name or 'router' in str(p)):
              print(p)
              for i,line in enumerate(body.splitlines(),1):
                if re.search(r'(RugRadar|Web3|MEV|Liquidity|PackageStatus|SmartMoney|DAO|Payment|Credit|Job)', line, re.I): print(f'  {i}: {line.strip()}')
          PY
      - name: Production build before cleanup
        id: build
        continue-on-error: true
        working-directory: koschei/api
        run: go build ./... 2>&1 | tee build-before.txt
      - name: Upload audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dead-code-audit
          path: |
            koschei/api/dead-code-audit.txt
            koschei/api/build-before.txt
      - name: Stop if baseline build is broken
        if: steps.build.outcome == 'failure'
        run: exit 1
