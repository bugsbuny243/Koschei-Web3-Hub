name: Dead Code Cleanup Verify

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Verify removed files and auth isolation
        working-directory: koschei/api
        run: |
          for f in \
            internal/handlers/rug_radar.go \
            internal/handlers/web3.go \
            internal/handlers/local_auth.go \
            internal/handlers/mev_shield.go \
            internal/handlers/liquidity_radar.go \
            internal/handlers/impact_metrics.go \
            internal/handlers/metadata.go \
            internal/handlers/owner_payment_health.go \
            internal/handlers/web3_jobs.go \
            internal/handlers/package_status.go \
            internal/handlers/jobs.go \
            internal/handlers/dao_guardian.go \
            internal/handlers/plans.go \
            internal/handlers/smart_money.go \
            internal/handlers/credits.go \
            internal/handlers/credits_reservation.go \
            internal/handlers/enterprise_modules_test.go; do
            test ! -e "$f"
          done
          ! grep -R --include='*.go' -n 'tryLocalJWT' internal
          grep -q 'return neonClaimsFromToken(token)' internal/handlers/neon_auth.go
          grep -q 'func normalizedClaimEmail' internal/handlers/shared_helpers.go
          grep -q 'func firstNonEmptyString' internal/handlers/shared_helpers.go
          grep -q 'func firstNonEmpty' internal/handlers/shared_helpers.go
          grep -q 'func isMissingRelation' internal/handlers/shared_helpers.go
          grep -q 'func nullTimePtr' internal/handlers/shared_helpers.go
          ! grep -R --include='*.go' -n 'ShopierWebhook' internal
      - name: Production package build
        working-directory: koschei/api
        run: go build ./internal/services ./internal/handlers ./internal/http
      - name: Full Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...
