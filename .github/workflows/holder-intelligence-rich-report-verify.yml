name: Holder Intelligence Rich Report Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/scripts/holder_intelligence_hardening_patch.py"
      - "koschei/api/internal/services/token_market_snapshot.go"
      - "koschei/api/internal/services/token_market_snapshot_test.go"
      - "koschei/api/internal/services/holder_intelligence.go"
      - "koschei/api/internal/services/holder_intelligence_test.go"
      - "koschei/api/internal/services/arvis_arms.go"
      - "koschei/api/internal/handlers/security_radar_detail.go"
      - "koschei/api/internal/handlers/owner_operations.go"
      - "koschei/api/public/js/owner-control-center.js"
      - ".github/workflows/holder-intelligence-rich-report-verify.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply holder intelligence hardening
        working-directory: koschei/api
        run: |
          python scripts/holder_intelligence_hardening_patch.py
          gofmt -w internal/services/token_market_snapshot.go internal/services/token_market_snapshot_test.go internal/services/holder_intelligence.go internal/services/holder_intelligence_test.go internal/services/arvis_arms.go internal/handlers/security_radar_detail.go internal/handlers/owner_operations.go
      - name: Focused holder intelligence tests
        working-directory: koschei/api
        run: go test ./internal/services -run '^Test(TokenMarketSnapshot|HolderIntelligence)' -count=1
      - name: Production package build
        working-directory: koschei/api
        run: go build ./internal/services ./internal/handlers ./internal/http
      - name: Full Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Owner JavaScript syntax
        run: node --check koschei/api/public/js/owner-control-center.js
      - name: Hardening contract assertions
        working-directory: koschei/api
        run: |
          grep -Fq 'bestHasLiquidity' internal/services/token_market_snapshot.go
          grep -Fq 'holderIntelligenceTopRiskRow' internal/services/holder_intelligence.go
          grep -Fq 'ArvisHolderRolesFromBundle' internal/services/arvis_arms.go
          grep -Fq 'evidence_reused_from_full_scan' internal/handlers/security_radar_detail.go
          grep -Fq 'holderBehaviorLabel(r.behavior)' public/js/owner-control-center.js
          grep -Fq 'owner-control-center.js?v=9' public/owner-production.html
      - name: Commit verified hardening
        if: success()
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/internal/services/token_market_snapshot.go koschei/api/internal/services/token_market_snapshot_test.go koschei/api/internal/services/holder_intelligence.go koschei/api/internal/services/holder_intelligence_test.go koschei/api/internal/services/arvis_arms.go koschei/api/internal/handlers/security_radar_detail.go koschei/api/internal/handlers/owner_operations.go koschei/api/public/js/owner-control-center.js
          git commit -m 'Harden rich holder intelligence reporting'
          git push origin HEAD:${{ github.head_ref }}
