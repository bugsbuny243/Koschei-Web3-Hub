name: Apply Launch Forensics integration

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/pump-ledger-launch-forensics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
      - name: Apply surgical integration patches
        shell: bash
        run: |
          git apply --check .github/patches/owner-operations.patch
          git apply --check .github/patches/pump-high-volume-forensics.patch
          git apply --check .github/patches/structural-launch-forensics.patch
          git apply .github/patches/owner-operations.patch
          git apply .github/patches/pump-high-volume-forensics.patch
          git apply .github/patches/structural-launch-forensics.patch
          gofmt -w \
            koschei/api/internal/handlers/launch_forensics_integration.go \
            koschei/api/internal/handlers/owner_operations.go \
            koschei/api/internal/handlers/owner_operations_narrative_test.go \
            koschei/api/internal/handlers/security_radar_detail_v3.go \
            koschei/api/internal/services/holder_intelligence.go \
            koschei/api/internal/services/launch_actor_classification.go \
            koschei/api/internal/services/launch_actor_classification_test.go \
            koschei/api/internal/services/launch_forensics.go \
            koschei/api/internal/services/launch_forensics_arvis.go \
            koschei/api/internal/services/launch_forensics_ata.go \
            koschei/api/internal/services/launch_forensics_test.go \
            koschei/api/internal/services/launch_funding_trace.go \
            koschei/api/internal/services/pump_high_volume_radar.go \
            koschei/api/internal/services/pump_trade_ledger.go \
            koschei/api/internal/services/pumpportal_client.go \
            koschei/api/internal/services/pumpportal_radar_adapter.go \
            koschei/api/internal/services/pumpportal_trade_parse_test.go \
            koschei/api/internal/services/security_radar_retention_worker.go \
            koschei/api/internal/services/security_radar_structural.go \
            koschei/api/internal/services/solana_rpc_batch.go
          node --check koschei/api/public/js/owner-holder-tier-labels.js
          node --check koschei/api/public/js/owner-launch-forensics.js
          cd koschei/api
          go test ./...
          go vet ./...
          CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Commit verified implementation
        shell: bash
        run: |
          rm -f \
            .github/workflows/apply-launch-forensics.yml \
            .github/workflows/export-source-forensics.yml \
            .github/patches/launch-forensics.part00 \
            .github/patches/owner-operations.patch \
            .github/patches/pump-high-volume-forensics.patch \
            .github/patches/structural-launch-forensics.patch
          rmdir .github/patches 2>/dev/null || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: add Pump trade ledger and Launch Forensics"
          git push origin HEAD:${{ github.head_ref }}
