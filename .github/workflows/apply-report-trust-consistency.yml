name: Apply report trust consistency

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum

      - name: Apply patch
        run: python .github/scripts/apply_report_trust_consistency.py

      - name: Format Go
        working-directory: koschei/api
        run: gofmt -w internal/handlers/lp_market_context.go internal/handlers/lp_market_context_test.go internal/handlers/arvis_preflight.go internal/handlers/arvis_preflight_test.go internal/handlers/security_radar.go internal/handlers/health.go

      - name: Validate JavaScript and UI contract
        working-directory: koschei/api
        run: |
          node --check public/js/public-solana-scan.js
          node --check public/js/lp-control-evidence-card.js
          node scripts/verify-report-trust-consistency.js

      - name: Download modules
        working-directory: koschei/api
        run: go mod download

      - name: Targeted tests
        working-directory: koschei/api
        run: |
          go test ./internal/handlers -run 'Test(JupiterContextIsOptionalAndReportsSellImpact|ARVISPreflightMarksAddressCoverageIncomplete)' -count=1 -timeout=3m

      - name: Full Go tests
        working-directory: koschei/api
        run: go test ./... -timeout=15m

      - name: Vet
        working-directory: koschei/api
        run: go vet ./...

      - name: Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...

      - name: Commit verified product changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/api-ci.yml koschei/api
          git commit -m "fix: remove contradictory risk evidence and expose coverage gaps"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
