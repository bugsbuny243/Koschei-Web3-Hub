name: Human Radar Narrative Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/scripts/human_radar_narrative_patch.py"
      - "koschei/api/internal/handlers/owner_operations.go"
      - "koschei/api/internal/handlers/owner_operations_narrative_test.go"
      - ".github/workflows/human-radar-narrative-verify.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Apply narrative patch
        working-directory: koschei/api
        run: |
          python scripts/human_radar_narrative_patch.py
          gofmt -w internal/handlers/owner_operations.go internal/handlers/owner_operations_narrative_test.go
      - name: Narrative tests
        working-directory: koschei/api
        run: go test ./internal/handlers -run '^TestOwnerRadarNarrative' -count=1
      - name: Production package build
        working-directory: koschei/api
        run: go build ./internal/handlers ./internal/http
      - name: Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Contract assertions
        working-directory: koschei/api
        run: |
          grep -q 'primary_risk_driver' internal/handlers/owner_operations.go
          grep -q 'Pratik sonuç:' internal/handlers/owner_operations.go
          grep -q 'ana risk sürücüsü' internal/handlers/owner_operations.go
          grep -q 'Creator/deployer cüzdanı bu taramada doğrulanamadı' internal/handlers/owner_operations.go
          git diff origin/main...HEAD -- public/js/koschei-auth.js | test ! -s /dev/stdin
      - name: Commit verified narrative
        if: success()
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/internal/handlers/owner_operations.go koschei/api/internal/handlers/owner_operations_narrative_test.go
          git commit -m 'Make ARVIS summaries explain risk in plain language'
          git push origin HEAD:${{ github.head_ref }}
