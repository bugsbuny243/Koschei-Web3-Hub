name: Apply customer investigation UI and RPC resilience

on:
  push:
    branches:
      - fix/customer-investigation-ui-rpc-resilience

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/customer-investigation-ui-rpc-resilience
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum

      - name: Apply prepared patch
        run: python .github/scripts/apply_customer_investigation_ui_rpc.py

      - name: Format Go
        working-directory: koschei/api
        run: gofmt -w internal/web3/solana_rpc.go internal/web3/solana_rpc_test.go internal/handlers/unified_live_evidence.go

      - name: Validate customer JavaScript
        working-directory: koschei/api
        run: |
          node --check public/js/security-radar-detail.js
          node scripts/verify-customer-investigation-ui.js

      - name: Download modules
        working-directory: koschei/api
        run: go mod download

      - name: Targeted tests
        working-directory: koschei/api
        run: |
          go test ./internal/web3 -run 'TestSolanaRPC(FallsBackAfterEndpointTimeout|FallsBackAfterProviderRateLimit)' -count=1
          go test ./internal/handlers -run 'TestCustomerInvestigation|TestUnifiedLive' -count=1

      - name: Full Go tests
        working-directory: koschei/api
        run: go test ./...

      - name: Vet
        working-directory: koschei/api
        run: go vet ./...

      - name: Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...

      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: render customer investigation and harden RPC fallback"
          git push origin HEAD:fix/customer-investigation-ui-rpc-resilience
