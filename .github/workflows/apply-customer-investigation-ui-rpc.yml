name: Apply customer investigation UI and RPC resilience

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum

      - name: Bound timeout regression server
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/apply_customer_investigation_ui_rpc.py')
          text = path.read_text()
          old = r'\t\t<-r.Context().Done()\n'
          new = r'\t\ttime.Sleep(200 * time.Millisecond)\n\t\thttp.Error(w, "late primary", http.StatusGatewayTimeout)\n'
          if old not in text:
              raise RuntimeError('escaped blocking handler marker not found')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Apply prepared patch
        run: python .github/scripts/apply_customer_investigation_ui_rpc.py

      - name: Format Go
        working-directory: koschei/api
        run: gofmt -w internal/web3/solana_rpc.go internal/web3/solana_rpc_test.go internal/handlers/unified_live_evidence.go

      - name: Validate customer JavaScript
        working-directory: koschei/api
        run: |
          node --check public/js/security-radar-detail.js
          node scripts/verify-customer-investigation-ui.js

      - name: Download modules
        working-directory: koschei/api
        run: go mod download

      - name: RPC fallback regression tests
        working-directory: koschei/api
        run: go test -v ./internal/web3 -run 'TestSolanaRPC(FallsBackAfterEndpointTimeout|FallsBackAfterProviderRateLimit)' -count=1 -timeout=2m

      - name: Full Go tests
        working-directory: koschei/api
        run: go test ./... -timeout=15m

      - name: Vet
        working-directory: koschei/api
        run: go vet ./...

      - name: Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...

      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: render customer investigation and harden RPC fallback"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
