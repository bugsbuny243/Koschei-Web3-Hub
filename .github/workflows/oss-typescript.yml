name: ARVIS OSS TypeScript

on:
  pull_request:
    paths:
      - "sdk/typescript/**"
      - "oss/event-normalizer/**"
      - ".github/workflows/oss-typescript.yml"
  push:
    branches: [main]
    paths:
      - "sdk/typescript/**"
      - "oss/event-normalizer/**"
      - ".github/workflows/oss-typescript.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - sdk/typescript
          - oss/event-normalizer
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run check
      - run: npm test
      - run: npm pack --dry-run
