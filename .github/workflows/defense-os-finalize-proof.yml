name: Finalize Defense OS Proof Semantics

on:
  push:
    branches: [feat/solana-defense-os-phases-2-5]
    paths: [.github/workflows/defense-os-finalize-proof.yml]

permissions:
  contents: write

jobs:
  finalize:
    if: contains(github.event.head_commit.message, 'Add final Defense OS proof fixer')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/solana-defense-os-phases-2-5
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - name: Patch evidence semantics
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path('koschei/api/internal/handlers/defense_os.go')
          s = p.read_text()
          start = s.index('\tstatus := map[string]string{"passed": "verified"')
          end_marker = '\tlimitations := verification.Limitations\n'
          end = s.index(end_marker, start) + len(end_marker)
          block = '''\tstatus := map[string]string{"passed": "partial", "failed": "failed", "partial": "partial", "blocked": "blocked", "tool_unavailable": "blocked"}[verification.Status]
\tif status == "" {
\t\tstatus = "partial"
\t}
\tvar before, beforeStatus sql.NullString
\t_ = h.DB.QueryRowContext(r.Context(), `SELECT verification_ref,status FROM defense_verification_runs WHERE finding_ref=$1 AND patch_ref IS NULL ORDER BY created_at DESC LIMIT 1`, findingRef).Scan(&before, &beforeStatus)
\tevidence := []string{"verification:" + verification.VerificationRef, "patch:" + patchRef, "artifact:" + verification.SourceArtifactRef}
\tlimitations := append([]string{}, verification.Limitations...)
\tlimitations = append(limitations, "Generic build or test success is not proof that an exploit path was closed. Verified proof-of-fix requires a versioned reproduction invariant with an unpatched baseline and a patched counter-run.")
\tif !before.Valid {
\t\tlimitations = append(limitations, "No unpatched baseline verification was bound to this finding.")
\t} else {
\t\tevidence = append(evidence, "baseline_verification:"+before.String, "baseline_status:"+beforeStatus.String)
\t}
'''
          s = s[:start] + block + s[end:]
          training_start = s.index('\tif status == "verified" {', start)
          training_end = s.index('\n\t}', training_start) + len('\n\t}')
          s = s[:training_start] + s[training_end:]
          p.write_text(s)

          p = Path('koschei/api/internal/router/ai_router.go')
          s = p.read_text()
          start = s.index('\tdec:=json.NewDecoder')
          end = s.index('\n}', start)
          line = '''\tdec := json.NewDecoder(strings.NewReader(content[start : end+1]))
\tdec.DisallowUnknownFields()
\tif err := dec.Decode(dst); err != nil {
\t\treturn fmt.Errorf("invalid structured provider output: %w", err)
\t}
\tvar trailing any
\tif err := dec.Decode(&trailing); err != io.EOF {
\t\treturn errors.New("provider returned multiple JSON values")
\t}
\treturn nil'''
          s = s[:start] + line + s[end:]
          p.write_text(s)

          p = Path('koschei/api/internal/router/ai_router_structured_test.go')
          s = p.read_text()
          insert = '''\tif err := DecodeJSONObject("{\\"summary\\":\\"one\\"}{\\"summary\\":\\"two\\"}", &out); err == nil {
\t\tt.Fatal("multiple JSON values were accepted")
\t}
'''
          pos = s.rfind('}')
          p.write_text(s[:pos] + insert + s[pos:])

          p = Path('docs/solana-defense-os-phases-2-5.md')
          s = p.read_text()
          old = 'A successful approved patch verification can create an immutable proof-of-fix record. The proof remains non-authoritative for the token verdict until a future versioned deterministic acceptance rule explicitly consumes it.'
          new = 'An approved patch verification creates an immutable proof record, but this release keeps it `partial`. It cannot become `verified` until a versioned exploit-reproduction invariant binds an unpatched baseline to a patched counter-run. The record remains non-authoritative for the token verdict.'
          if old not in s:
              raise SystemExit('documentation marker missing')
          p.write_text(s.replace(old, new, 1))
          PY
          gofmt -w koschei/api/internal/handlers/defense_os.go koschei/api/internal/router/ai_router.go koschei/api/internal/router/ai_router_structured_test.go
          cd koschei/api
          go test ./internal/defense ./internal/router ./internal/handlers ./internal/http
          go vet ./internal/defense ./internal/router ./internal/handlers ./internal/http
      - name: Commit
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/internal/handlers/defense_os.go koschei/api/internal/router/ai_router.go koschei/api/internal/router/ai_router_structured_test.go docs/solana-defense-os-phases-2-5.md
          git commit -m 'Harden proof-of-fix evidence semantics'
          git push origin HEAD:feat/solana-defense-os-phases-2-5
