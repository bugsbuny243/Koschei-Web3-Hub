name: Owner Operations Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/internal/handlers/owner_operations.go"
      - "koschei/api/internal/handlers/owner_ai_chat_context.go"
      - "koschei/api/internal/http/server.go"
      - "koschei/api/public/owner-production.html"
      - "koschei/api/public/js/owner-control-center.js"
      - "koschei/api/public/js/owner-ai-chat.js"
      - "koschei/api/public/css/owner-ai-chat.css"
      - ".github/workflows/owner-operations-verify.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - run: go mod download
      - name: Go format
        run: test -z "$(gofmt -l internal/handlers/owner_operations.go internal/handlers/owner_ai_chat_context.go internal/http/server.go)"
      - name: Build production packages
        run: go build ./internal/handlers ./internal/http
      - name: Vet clean packages
        run: go vet -tests=false ./internal/http
      - name: Build complete API
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Check owner JavaScript
        run: |
          node --check public/js/owner-control-center.js
          node --check public/js/owner-ai-chat.js
      - name: Assert owner routes and product model
        run: |
          grep -q '/api/owner/arvis/scan' internal/http/server.go
          grep -q '/api/owner/kosch-access' internal/http/server.go
          grep -q '/api/owner/security-events' internal/http/server.go
          grep -q 'Tam Tara + Görsel Üret' public/js/owner-control-center.js
          grep -q 'Free core + KOSCH premium' public/owner-production.html
          ! grep -Eqi 'shopier|paddle|entitlement|gelir ve paketler|aktif paket' public/owner-production.html public/js/owner-control-center.js public/js/owner-ai-chat.js internal/handlers/owner_ai_chat_context.go
      - name: Protect customer auth
        run: git diff origin/main...HEAD -- public/js/koschei-auth.js | test ! -s /dev/stdin
