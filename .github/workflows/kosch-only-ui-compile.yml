name: KOSCH Only UI Compile

on:
  pull_request:
    branches:
      - main
    paths:
      - "koschei/api/internal/handlers/**"
      - "koschei/api/internal/http/**"
      - "koschei/api/public/**"
      - ".github/workflows/kosch-only-ui-compile.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum

      - name: Download modules
        run: go mod download

      - name: Format changed Go files
        run: |
          files=(
            internal/handlers/api_key_kosch_access.go
            internal/handlers/credits_atomic.go
            internal/handlers/entitlement.go
            internal/handlers/platform.go
            internal/handlers/premium_access_status.go
            internal/handlers/premium_access_status_test.go
            internal/handlers/security_radar_graph.go
            internal/http/route_inventory.go
            internal/http/server.go
          )
          gofmt -w "${files[@]}"
          git diff -- "${files[@]}" > /tmp/kosch-gofmt.patch

      - name: Upload gofmt patch
        uses: actions/upload-artifact@v4
        with:
          name: kosch-gofmt-patch
          path: /tmp/kosch-gofmt.patch
          if-no-files-found: error

      - name: Compile handler and HTTP tests
        run: go test ./internal/handlers ./internal/http -run '^$'

      - name: Vet changed backend packages
        run: go vet ./internal/handlers ./internal/http

      - name: Build complete API
        run: CGO_ENABLED=0 GOOS=linux go build ./...

      - name: Verify billing routes are retired
        run: |
          ! grep -E '/api/payments/request|/api/shopier/webhook|OwnerApprovePayment|OwnerRejectPayment|OwnerAddCredits' internal/http/server.go
          grep -q 'RequireAPIKeyKOSCH' internal/http/server.go
          grep -q 'verified_holder_balance' internal/handlers/platform.go

      - name: Check standalone JavaScript syntax
        run: |
          node --check public/js/koschei-analytics.js
          node --check public/js/koschei-premium-modules.js
          node --check public/js/owner-ai-chat.js
          node --check public/js/owner-paddle-diagnostics.js
          node --check public/js/paddle-checkout.js

      - name: Check inline page scripts
        run: |
          python3 - <<'PY'
          import pathlib, re, subprocess, tempfile

          pages = [
              'security-radar.html', 'dashboard.html', 'account.html', 'pricing.html',
              'kosch.html', 'security-ecosystem.html', 'launches.html', 'support.html',
              'solana-security-tools.html', 'reports.html', 'token-disclosure.html',
              'exposure-report.html', 'watchlist.html', 'webhooks.html',
              'token-2022-scanner.html', 'docs-sdk.html', 'feedback.html',
              'login.html', 'register.html', 'shopier-only.html', 'kosch-access.html',
          ]
          pattern = re.compile(r'<script(?P<attrs>[^>]*)>(?P<body>.*?)</script>', re.I | re.S)
          failures = []
          for name in pages:
              path = pathlib.Path('public') / name
              if not path.exists():
                  failures.append(f'{name}: missing')
                  continue
              text = path.read_text(encoding='utf-8')
              for index, match in enumerate(pattern.finditer(text), start=1):
                  attrs = match.group('attrs')
                  if re.search(r'\bsrc\s*=', attrs, re.I) or 'application/ld+json' in attrs.lower():
                      continue
                  body = match.group('body').strip()
                  if not body:
                      continue
                  with tempfile.NamedTemporaryFile('w', suffix='.js', encoding='utf-8', delete=False) as fh:
                      fh.write(body)
                      temp = fh.name
                  result = subprocess.run(['node', '--check', temp], text=True, capture_output=True)
                  if result.returncode:
                      failures.append(f'{name} script {index}: {result.stderr.strip()}')
          if failures:
              raise SystemExit('\n'.join(failures))
          PY
