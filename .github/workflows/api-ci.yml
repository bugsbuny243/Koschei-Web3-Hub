name: API CI

on:
  push:
    branches: [main]
    paths:
      - "koschei/api/**"
      - "Dockerfile"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "koschei/api/**"
      - "Dockerfile"
      - ".github/workflows/api-ci.yml"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Download modules
        run: go mod download
      - name: Apply holder role UI fix
        run: python scripts/holder_role_ui_fix.py
      - name: Holder role tests
        run: go test ./internal/services -run '^TestHolderRole' -count=1
      - name: Production package build
        run: go build ./internal/services ./internal/handlers ./internal/http
      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: JavaScript syntax
        run: node --check public/js/owner-control-center.js
      - name: Contract assertions
        run: |
          grep -q 'raw_percentage' public/js/owner-control-center.js
          grep -q 'circulating_percentage' public/js/owner-control-center.js
          grep -q 'owner_wallet' public/js/owner-control-center.js
          grep -q 'scoreText' public/js/owner-control-center.js
          ! grep -q 'a.percentage' public/js/owner-control-center.js
          ! grep -q 'a.cumulative_percentage' public/js/owner-control-center.js
          git diff origin/main...HEAD -- public/js/koschei-auth.js | test ! -s /dev/stdin
      - name: Commit verified UI fix
        if: success()
        working-directory: .
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/public/js/owner-control-center.js
          git commit -m 'Show resolved holder roles in owner report'
          git push origin HEAD:${{ github.head_ref }}
