name: API CI

on:
  push:
    branches: [main]
    paths:
      - "koschei/api/**"
      - "Dockerfile"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "koschei/api/**"
      - "Dockerfile"
      - ".github/workflows/api-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Download modules
        run: go mod download
      - name: Test
        shell: bash
        run: |
          set +e
          go test ./... > /tmp/go-test.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "=== FAILING TEST SUMMARY ==="
            grep -E '^(--- FAIL:|FAIL[[:space:]]|panic:|[[:space:]]+Error Trace:|[[:space:]]+Error:)' /tmp/go-test.log || true
            echo "=== TEST OUTPUT TAIL ==="
            tail -n 160 /tmp/go-test.log
          else
            echo "go test ./... passed"
          fi
          exit "$status"
      - name: Vet
        run: go vet ./...
      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build ./...
