name: API CI

on:
  push:
    branches: [main]
    paths:
      - "koschei/api/**"
      - "Dockerfile"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "koschei/api/**"
      - "Dockerfile"
      - ".github/workflows/api-ci.yml"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Download modules
        run: go mod download
      - name: Wire holder role intelligence
        run: |
          python scripts/holder_role_patch.py
          gofmt -w internal/services/holder_role_intelligence.go internal/services/holder_role_intelligence_test.go internal/services/security_radars.go internal/services/arvis_arms.go internal/handlers/security_radar_detail.go internal/handlers/owner_operations.go
      - name: Holder role tests
        run: go test ./internal/services -run '^TestHolderRole' -count=1
      - name: Production package build
        run: go build ./internal/services ./internal/handlers ./internal/http
      - name: Vet clean packages
        run: go vet -tests=false ./internal/services ./internal/http
      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: JavaScript syntax
        run: node --check public/js/owner-control-center.js
      - name: Contract assertions
        run: |
          grep -q 'blocking_final_verdict' internal/services/arvis_arms.go
          grep -q 'circulating_holder_distribution' internal/services/holder_role_intelligence.go
          grep -q 'target_not_token_mint' internal/handlers/security_radar_detail.go
          grep -q 'Protocol inventory excluded' public/js/owner-control-center.js
          git diff origin/main...HEAD -- public/js/koschei-auth.js | test ! -s /dev/stdin
      - name: Commit verified integration
        if: success()
        working-directory: .
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/internal/services/holder_role_intelligence.go koschei/api/internal/services/holder_role_intelligence_test.go koschei/api/internal/services/security_radars.go koschei/api/internal/services/arvis_arms.go koschei/api/internal/handlers/security_radar_detail.go koschei/api/internal/handlers/owner_operations.go koschei/api/public/js/owner-control-center.js
          git commit -m 'Wire role-aware holder concentration'
          git push origin HEAD:${{ github.head_ref }}
