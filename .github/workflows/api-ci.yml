name: API CI

on:
  push:
    branches: [main]
    paths:
      - "koschei/api/**"
      - "Dockerfile"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "koschei/api/**"
      - "Dockerfile"
      - ".github/workflows/api-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Download modules
        run: go mod download
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          go test ./... 2>&1 | tee test-output.log
      - name: Upload failed test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-output
          path: koschei/api/test-output.log
          if-no-files-found: error
      - name: Vet
        run: go vet ./...
      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build ./...
