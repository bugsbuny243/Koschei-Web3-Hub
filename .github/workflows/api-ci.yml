name: API CI

on:
  push:
    branches: [main]
    paths:
      - "koschei/api/**"
      - "oss/verifier/**"
      - "Dockerfile"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "koschei/api/**"
      - "oss/verifier/**"
      - "Dockerfile"
      - ".github/workflows/api-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: koschei_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d koschei_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Download modules
        run: go mod download
      - name: Validate migrations on PostgreSQL 17
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          result_file="${RUNNER_TEMP}/migration-validation.txt"
          output_file="${RUNNER_TEMP}/migration-output.txt"
          : > "${result_file}"
          for migration in $(find migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            echo "RUN ${migration}" >> "${result_file}"
            if ! psql \
              --host=127.0.0.1 \
              --port=5432 \
              --username=postgres \
              --dbname=koschei_ci \
              --set=ON_ERROR_STOP=1 \
              --file="${migration}" \
              > "${output_file}" 2>&1; then
              echo "FAIL ${migration}" >> "${result_file}"
              tail -n 120 "${output_file}" >> "${result_file}"
              cat "${result_file}"
              exit 1
            fi
            echo "PASS ${migration}" >> "${result_file}"
          done
          cat "${result_file}"
      - name: Validate immutable dossier storage
        env:
          PGPASSWORD: postgres
        run: |
          psql --host=127.0.0.1 --port=5432 --username=postgres --dbname=koschei_ci --set=ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO dossier_source_snapshots
          (mint,network,verdict_signature,ruleset_version,produced_at,source_hash,canonical_source,source_payload)
          VALUES (
            'ci-mint','solana-mainnet','ci-verdict-signature','ci-ruleset',now(),
            'sha256:44136fa355b3678a1146ad16f7e8649e94fb4fc21fe77e8310c060f61caaff8a',
            convert_to('{}','UTF8'),'{}'::jsonb
          );

          DO $$
          DECLARE blocked boolean := false;
          BEGIN
            BEGIN
              UPDATE dossier_source_snapshots SET mint='mutated' WHERE verdict_signature='ci-verdict-signature';
            EXCEPTION WHEN OTHERS THEN
              IF position('immutable dossier records' in SQLERRM)=0 THEN RAISE; END IF;
              blocked := true;
            END;
            IF NOT blocked THEN RAISE EXCEPTION 'source snapshot update was not blocked'; END IF;
          END $$;

          INSERT INTO dossier_exports
          (case_ref,mint,verdict_signature,source_snapshot_id,bundle_hash,canonical_bundle,bundle_json,requested_by)
          SELECT
            'KD1-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa','ci-mint','ci-verdict-signature',id,
            'sha256:44136fa355b3678a1146ad16f7e8649e94fb4fc21fe77e8310c060f61caaff8a',
            convert_to('{}','UTF8'),'{}'::jsonb,'ci'
          FROM dossier_source_snapshots WHERE verdict_signature='ci-verdict-signature';

          DO $$
          DECLARE update_blocked boolean := false; delete_blocked boolean := false;
          BEGIN
            BEGIN
              UPDATE dossier_exports SET mint='mutated' WHERE case_ref='KD1-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa';
            EXCEPTION WHEN OTHERS THEN
              IF position('immutable dossier records' in SQLERRM)=0 THEN RAISE; END IF;
              update_blocked := true;
            END;
            BEGIN
              DELETE FROM dossier_exports WHERE case_ref='KD1-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa';
            EXCEPTION WHEN OTHERS THEN
              IF position('immutable dossier records' in SQLERRM)=0 THEN RAISE; END IF;
              delete_blocked := true;
            END;
            IF NOT update_blocked OR NOT delete_blocked THEN RAISE EXCEPTION 'dossier export mutation was not blocked'; END IF;
          END $$;
          SQL
      - name: Upload migration validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-validation
          path: ${{ runner.temp }}/migration-validation.txt
          if-no-files-found: error
          retention-days: 7
      - name: Check public JavaScript
        run: |
          set -euo pipefail
          for file in public/js/*.js; do
            node --check "$file"
          done
          node --check ../../oss/verifier/typescript/verify-dossier.mjs
          node --check scripts/verify-dossier-contract.mjs
          node --check scripts/run-production-investigation-acceptance.mjs
          node scripts/verify-public-scan-request-guard.js
          node scripts/verify-full-scan-truth-contract.js
          node scripts/verify-verdict-card.js
          node scripts/verify-verdict-card-evidence-refs.js
          node scripts/verify-lp-control-evidence-card.js
          node scripts/verify-live-evidence-card.js
          node scripts/verify-customer-investigation-ui.js
          node scripts/verify-report-trust-consistency.js
          node scripts/verify-dossier-contract.mjs
      - name: Check Turkish public copy
        run: |
          grep -q '<html lang="tr">' public/index.html
          grep -q '<html lang="tr">' public/scan.html
          grep -q '<html lang="tr">' public/safe-check.html
          grep -q '<html lang="tr">' public/security-radar.html
          grep -q 'lp-control-evidence-card.js' public/scan.html
          grep -q 'unified-live-evidence-card.js' public/scan.html
          grep -q 'public-scan-request-guard.js' public/scan.html
          ! grep -Eqi 'Paste it before|Token ikinci planda|KOSCH stays as|What ARVIS does|Who it is for|Power users|Automatic flow' public/index.html
          ! grep -Eqi 'Login yok|Wallet connect yok|Read-only analiz|İmzalı verdict geçmişi' public/scan.html
      - name: Test
        run: |
          set -o pipefail
          go test ./... 2>&1 | tee "${RUNNER_TEMP}/go-test.txt"
      - name: Upload Go test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test
          path: ${{ runner.temp }}/go-test.txt
          if-no-files-found: warn
          retention-days: 7
      - name: Vet
        run: go vet ./...
      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build ./...
