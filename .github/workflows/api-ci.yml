name: API CI

on:
  push:
    branches: [main]
    paths:
      - "koschei/api/**"
      - "Dockerfile"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "koschei/api/**"
      - "Dockerfile"
      - ".github/workflows/api-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: koschei_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d koschei_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Download modules
        run: go mod download
      - name: Validate migrations on PostgreSQL 17
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for migration in $(find migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            echo "Applying ${migration}"
            psql \
              --host=127.0.0.1 \
              --port=5432 \
              --username=postgres \
              --dbname=koschei_ci \
              --set=ON_ERROR_STOP=1 \
              --file="${migration}"
          done
      - name: Check public JavaScript
        run: |
          node --check public/js/public-solana-scan.js
          node --check public/js/public-solana-scan-tr.js
          node --check public/js/public-transaction-shield.js
          node --check public/js/kosch-transparency.js
          node --check public/js/koschei-global-shell.js
          node --check public/js/owner-holder-tier-labels.js
          node --check public/js/owner-launch-forensics.js
          node --check public/js/owner-defense-network.js
      - name: Check Turkish public copy
        run: |
          grep -q '<html lang="tr">' public/index.html
          grep -q '<html lang="tr">' public/scan.html
          grep -q '<html lang="tr">' public/safe-check.html
          grep -q '<html lang="tr">' public/security-radar.html
          ! grep -Eqi 'Paste it before|Token ikinci planda|KOSCH stays as|What ARVIS does|Who it is for|Power users|Automatic flow' public/index.html
          ! grep -Eqi 'Login yok|Wallet connect yok|Read-only analiz|İmzalı verdict geçmişi' public/scan.html
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build ./...
