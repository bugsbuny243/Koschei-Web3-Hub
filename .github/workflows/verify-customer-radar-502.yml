name: Verify customer Radar 502 fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum

      - name: Download modules
        run: go mod download
        working-directory: koschei/api

      - name: Targeted regression tests
        run: go test ./internal/handlers -run 'TestCustomerInvestigation(Status|Envelope)' -count=1
        working-directory: koschei/api

      - name: Full Go tests
        run: go test ./...
        working-directory: koschei/api

      - name: Vet
        run: go vet ./...
        working-directory: koschei/api

      - name: Linux build
        run: CGO_ENABLED=0 GOOS=linux go build ./...
        working-directory: koschei/api

      - name: Remove verification workflow
        run: |
          rm .github/workflows/verify-customer-radar-502.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove customer radar verification workflow"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
