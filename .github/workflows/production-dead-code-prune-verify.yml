name: Production Dead Code Prune Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/scripts/dead_code_cleanup_patch.py"
      - "koschei/api/internal/handlers/**"
      - "koschei/api/internal/http/server.go"
      - "docs/production-route-map.md"
      - "docs/production-data-audit.md"
      - ".github/workflows/production-dead-code-prune-verify.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Apply Neon-only auth cleanup
        working-directory: koschei/api
        run: |
          python scripts/dead_code_cleanup_patch.py
          gofmt -w internal/handlers/neon_auth.go
      - name: Production package build
        id: production_build
        continue-on-error: true
        working-directory: koschei/api
        run: |
          set -o pipefail
          go build ./internal/handlers ./internal/http 2>&1 | tee cleanup-build.log
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-build-log
          path: koschei/api/cleanup-build.log
          if-no-files-found: error
      - name: Stop on production build failure
        if: steps.production_build.outcome == 'failure'
        run: exit 1
      - name: Full Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Core service tests
        working-directory: koschei/api
        run: go test ./internal/router ./internal/services -count=1
      - name: Route and deletion contract
        working-directory: koschei/api
        run: |
          grep -Fq 'return neonClaimsFromToken(token)' internal/handlers/neon_auth.go
          ! grep -R -n --include='*.go' 'tryLocalJWT\|LocalRegister\|LocalLogin\|koschei-local' internal/handlers
          for file in \
            rug_radar.go web3.go local_auth.go mev_shield.go liquidity_radar.go \
            impact_metrics.go metadata.go owner_payment_health.go web3_jobs.go \
            package_status.go jobs.go dao_guardian.go smart_money.go plans.go \
            payments.go credits.go; do
            test ! -e "internal/handlers/$file"
          done
          ! grep -Fq '/api/payments/request' ../../docs/production-route-map.md
          ! grep -Fq '/api/rug-radar/feed' ../../docs/production-route-map.md
          grep -Fq '/api/v1/radar/detail' ../../docs/production-route-map.md
          grep -Fq 'Do not keep disconnected production handlers' ../../docs/production-route-map.md
      - name: Commit verified auth patch
        if: success()
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/internal/handlers/neon_auth.go
          git commit -m 'Enforce Neon-only customer JWT verification'
          git push origin HEAD:${{ github.head_ref }}
