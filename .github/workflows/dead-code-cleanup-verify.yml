name: Dead Code Cleanup Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/scripts/dead_code_cleanup_pass1.py"
      - "koschei/api/internal/handlers/**"
      - ".github/workflows/dead-code-cleanup-verify.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Apply dead-code cleanup
        working-directory: koschei/api
        run: |
          python scripts/dead_code_cleanup_pass1.py
          gofmt -w internal/handlers/neon_auth.go
      - name: Production package build
        id: build
        continue-on-error: true
        working-directory: koschei/api
        run: |
          set -o pipefail
          go build ./internal/handlers ./internal/http 2>&1 | tee cleanup-build.log
      - name: Upload cleanup build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-build-log
          path: koschei/api/cleanup-build.log
          if-no-files-found: error
      - name: Stop on build failure
        if: steps.build.outcome == 'failure'
        run: exit 1
      - name: Full Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Neon-only auth contract
        working-directory: koschei/api
        run: |
          ! grep -R "tryLocalJWT" internal/handlers
          ! test -e internal/handlers/local_auth.go
          grep -Fq 'return neonClaimsFromToken(token)' internal/handlers/neon_auth.go
      - name: Route-chain contract
        working-directory: koschei/api
        run: |
          ! grep -R "RugRadarFeed\|Web3Events\|AnalyzeMEV\|LiquidityDrainAnalyze\|GenerateMetadata\|OwnerPaymentHealth\|CreateWeb3Job\|MePackage\|CreateJob\|DAO" internal/http
      - name: Commit verified cleanup
        if: success()
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A koschei/api/internal/handlers
          git commit -m 'Remove disconnected legacy handlers'
          git push origin HEAD:${{ github.head_ref }}
