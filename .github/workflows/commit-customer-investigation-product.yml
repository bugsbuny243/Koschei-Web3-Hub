name: Commit verified customer investigation product diff

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  commit-product:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum

      - name: Generate product diff
        run: |
          python - <<'PY'
          from pathlib import Path
          patch = Path('.github/scripts/apply_customer_investigation_ui_rpc.py')
          text = patch.read_text()
          blocking = '<-r.Context().Done()'
          finite = 'time.Sleep(200 * time.Millisecond)\n\t\thttp.Error(w, "late primary", http.StatusGatewayTimeout)'
          if blocking not in text:
              raise SystemExit('blocking handler expression not found')
          patch.write_text(text.replace(blocking, finite, 1))
          PY
          python .github/scripts/apply_customer_investigation_ui_rpc.py
          python - <<'PY'
          from pathlib import Path
          path = Path('koschei/api/internal/handlers/unified_live_evidence.go')
          text = path.read_text()
          marker = 'func parseUnifiedLiveTransaction('
          wrapper = '''func fetchUnifiedTransactions(ctx context.Context, rpcURL string, signatures []string) (map[string]services.SolanaTransactionResult, error) {
              return fetchUnifiedTransactionsLegacy(ctx, rpcURL, signatures)
          }

          '''
          if marker not in text:
              raise SystemExit('parse function marker not found')
          path.write_text(text.replace(marker, wrapper + marker, 1))
          PY

      - name: Remove temporary machinery
        run: |
          rm -f .github/workflows/apply-customer-investigation-ui-rpc-v2.yml
          rm -f .github/workflows/diagnose-customer-investigation-full-tests.yml
          rm -f .github/workflows/finalize-customer-investigation-ui-rpc.yml
          rm -f .github/workflows/commit-customer-investigation-product.yml

      - name: Format and validate
        working-directory: koschei/api
        run: |
          gofmt -w internal/web3/solana_rpc.go internal/web3/solana_rpc_test.go internal/handlers/unified_live_evidence.go
          node --check public/js/security-radar-detail.js
          node scripts/verify-customer-investigation-ui.js
          go mod download
          go test ./internal/web3 -run 'TestSolanaRPC(FallsBackAfterEndpointTimeout|FallsBackAfterProviderRateLimit)' -count=1 -timeout=2m
          go test ./... -timeout=15m
          go vet ./...
          CGO_ENABLED=0 GOOS=linux go build ./...

      - name: Commit and push with retry
        run: |
          branch='${{ github.event.pull_request.head.ref }}'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: render customer investigation and harden RPC fallback"
          for attempt in 1 2 3; do
            git pull --rebase origin "$branch"
            if git push origin HEAD:"$branch"; then
              exit 0
            fi
            sleep 3
          done
          exit 1
