name: Validate FUNDING.json for Drips

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if FUNDING.json exists
        run: |
          if [ ! -f FUNDING.json ]; then
            echo "❌ FUNDING.json not found in root!"
            exit 1
          fi
          echo "✅ FUNDING.json exists"

      - name: Validate basic Drips format
        run: |
          if ! grep -q '"ethereum"' FUNDING.json; then
            echo "❌ 'ethereum' field is missing!"
            cat FUNDING.json
            exit 1
          fi
          
          echo "✅ FUNDING.json format looks good for Drips"
          cat FUNDING.json