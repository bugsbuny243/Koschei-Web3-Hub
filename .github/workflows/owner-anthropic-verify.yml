name: Owner Anthropic Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/scripts/owner_anthropic_patch.py"
      - "koschei/api/internal/router/**"
      - "koschei/api/internal/handlers/owner_ai_chat.go"
      - "koschei/api/internal/handlers/owner_ai_chat_context.go"
      - ".github/workflows/owner-anthropic-verify.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Apply owner Anthropic patch
        working-directory: koschei/api
        run: |
          python scripts/owner_anthropic_patch.py
          gofmt -w internal/router/anthropic_owner.go internal/router/anthropic_owner_test.go internal/handlers/owner_ai_chat.go internal/handlers/owner_ai_chat_context.go
      - name: Anthropic isolation tests
        working-directory: koschei/api
        run: go test ./internal/router -run '^TestOwnerChat' -count=1
      - name: Production package build
        working-directory: koschei/api
        run: go build ./internal/router ./internal/handlers ./internal/http
      - name: Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Contract assertions
        working-directory: koschei/api
        run: |
          grep -q 'router.OwnerChat' internal/handlers/owner_ai_chat.go
          grep -q 'ANTHROPIC_API_KEY' internal/router/anthropic_owner.go
          grep -q 'ANTHROPIC_OWNER_MODEL' internal/handlers/owner_ai_chat_context.go
          grep -q 'Qwen/Qwen3-235B-A22B-2507' internal/router/ai_router.go
          ! grep -q 'callTogetherWithSystemTimeoutAndMaxTokens' internal/handlers/owner_ai_chat.go
          git diff origin/main...HEAD -- public/js/koschei-auth.js | test ! -s /dev/stdin
      - name: Commit verified implementation
        if: success()
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/internal/router/anthropic_owner.go koschei/api/internal/router/anthropic_owner_test.go koschei/api/internal/handlers/owner_ai_chat.go koschei/api/internal/handlers/owner_ai_chat_context.go
          git commit -m 'Route owner chat exclusively through Anthropic'
          git push origin HEAD:${{ github.head_ref }}
