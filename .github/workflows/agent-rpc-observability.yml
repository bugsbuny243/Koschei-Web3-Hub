name: Verify RPC Provider Observability

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.head_ref }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum

      - name: Apply RPC observability patch
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p rpc-observability-diagnostics
          test "$(cat .github/agent-rpc/chunk-* | git hash-object --stdin)" = "19706a3337587eac8eaebca9a933159ba12c1d4e"
          cat .github/agent-rpc/chunk-* | base64 -d | gzip -d > /tmp/apply_rpc_observability.py
          python3 /tmp/apply_rpc_observability.py
          python3 - <<'PY'
          from pathlib import Path
          p = Path('koschei/api/internal/web3/solana_rpc.go')
          text = p.read_text()
          old = '''\tif isSolanaMainnet(network) {\n\t\tprimaryHost := RPCProviderHost(configuredSolanaRPCURL(network, strings.TrimSpace(os.Getenv("ALCHEMY_API_KEY"))))\n\t\tcandidates := []string{\n\t\t\tstrings.TrimSpace(os.Getenv("SOLANA_RPC_FALLBACK_URL")),\n\t\t\tstrings.TrimSpace(os.Getenv("ALCHEMY_SOLANA_RPC_URL")),\n'''
          new = '''\tif isSolanaMainnet(network) {\n\t\tprimaryURL := configuredSolanaRPCURL(network, strings.TrimSpace(os.Getenv("ALCHEMY_API_KEY")))\n\t\tif explicit := strings.TrimSpace(os.Getenv("SOLANA_RPC_FALLBACK_URL")); explicit != "" && explicit != strings.TrimSpace(primaryURL) {\n\t\t\treturn explicit\n\t\t}\n\t\tprimaryHost := RPCProviderHost(primaryURL)\n\t\tcandidates := []string{\n\t\t\tstrings.TrimSpace(os.Getenv("ALCHEMY_SOLANA_RPC_URL")),\n'''
          if old not in text:
              raise SystemExit('fallback selection marker missing')
          p.write_text(text.replace(old, new, 1))
          PY
          gofmt -w \
            koschei/api/main.go \
            koschei/api/internal/web3/rpc_observability.go \
            koschei/api/internal/web3/rpc_observability_test.go \
            koschei/api/internal/web3/solana_rpc.go \
            koschei/api/internal/web3/solana_rpc_test.go \
            koschei/api/internal/web3/rpc_manager.go \
            koschei/api/internal/services/solana_rpc_client.go \
            koschei/api/internal/services/solana_rpc_batch.go \
            koschei/api/internal/services/solana_rpc_failover.go \
            koschei/api/internal/handlers/token_scanner.go \
            koschei/api/internal/handlers/rug_radar.go

      - name: Test API
        working-directory: koschei/api
        shell: bash
        run: |
          set -o pipefail
          go test ./... 2>&1 | tee ../../rpc-observability-diagnostics/test.log

      - name: Vet API
        working-directory: koschei/api
        shell: bash
        run: |
          set -o pipefail
          go vet ./... 2>&1 | tee ../../rpc-observability-diagnostics/vet.log

      - name: Build API
        working-directory: koschei/api
        shell: bash
        run: |
          set -o pipefail
          CGO_ENABLED=0 GOOS=linux go build ./... 2>&1 | tee ../../rpc-observability-diagnostics/build.log

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rpc-observability-diagnostics
          path: rpc-observability-diagnostics
          if-no-files-found: error

      - name: Commit verified implementation
        run: |
          rm -rf .github/agent-rpc .github/workflows/agent-rpc-observability.yml rpc-observability-diagnostics
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Log Solana RPC providers and failure classes"
          git push origin HEAD:${TARGET_BRANCH}
