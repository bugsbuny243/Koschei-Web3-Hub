name: Holder Cluster Flow V2 Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/scripts/holder_cluster_flow_guard_patch.py"
      - "koschei/api/internal/services/holder_cluster_*.go"
      - "koschei/api/internal/services/arvis_arms.go"
      - "koschei/api/public/js/owner-control-center.js"
      - "koschei/api/public/owner-production.html"
      - ".github/workflows/holder-cluster-flow-v2-verify.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply DEX common-exit guard
        working-directory: koschei/api
        run: |
          python scripts/holder_cluster_flow_guard_patch.py
          gofmt -w internal/services/holder_cluster_flow_intelligence.go internal/services/holder_cluster_flow_intelligence_test.go
      - name: Focused flow tests
        working-directory: koschei/api
        run: go test ./internal/services -run '^TestHolderCluster(Flow|TokenOwner|TransactionIndexes)' -count=1
      - name: Production package build
        working-directory: koschei/api
        run: go build ./internal/services ./internal/handlers ./internal/http
      - name: Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Owner JavaScript syntax
        run: node --check koschei/api/public/js/owner-control-center.js
      - name: Commit verified guard
        if: success()
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/internal/services/holder_cluster_flow_intelligence.go koschei/api/internal/services/holder_cluster_flow_intelligence_test.go
          git commit -m 'Exclude known DEX routes from common-exit scoring'
          git push origin HEAD:${{ github.head_ref }}
