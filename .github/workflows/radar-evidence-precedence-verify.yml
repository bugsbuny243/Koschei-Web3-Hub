name: Radar Evidence Precedence Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/scripts/radar_evidence_precedence_patch.py"
      - "koschei/api/internal/services/**"
      - "koschei/api/internal/handlers/owner_operations.go"
      - "koschei/api/public/js/owner-control-center.js"
      - ".github/workflows/radar-evidence-precedence-verify.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Apply Radar evidence patch
        working-directory: koschei/api
        run: |
          python scripts/radar_evidence_precedence_patch.py
          gofmt -w internal/services/security_radars.go internal/services/arvis_arms.go internal/services/arvis_transaction_bundle.go internal/services/arvis_transaction_arms.go internal/services/arvis_evidence_precedence_test.go internal/handlers/owner_operations.go internal/handlers/owner_radar_conclusion_test.go
      - name: Focused evidence tests
        working-directory: koschei/api
        run: |
          go test ./internal/services -run 'Test(FundingCluster|SniperTiming|MajorityEOAHolder)' -count=1
          go test ./internal/handlers -run '^TestOwnerRadarPracticalConclusion' -count=1
      - name: Production package build
        working-directory: koschei/api
        run: go build ./internal/services ./internal/handlers ./internal/http
      - name: Linux build
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Contract assertions
        working-directory: koschei/api
        run: |
          grep -q 'truncated recent-activity window, not launch timing' internal/services/arvis_arms.go
          grep -q 'replaceFundingClusterArmPreservingHolderEvidence' internal/services/arvis_transaction_bundle.go
          grep -q 'risk = 70' internal/services/arvis_arms.go
          grep -q 'manual_rpc_saver' internal/handlers/owner_operations.go
          grep -q 'Holder Cluster Intelligence' public/js/owner-control-center.js
          grep -q "x.verified===true?'verified':'unavailable'" public/js/owner-control-center.js
          ! grep -q "badge('verified')</div>.*Complete evidence log" public/js/owner-control-center.js
          git diff origin/main...HEAD -- public/js/koschei-auth.js | test ! -s /dev/stdin
      - name: Commit verified implementation
        if: success()
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/internal/services/security_radars.go koschei/api/internal/services/arvis_arms.go koschei/api/internal/services/arvis_transaction_bundle.go koschei/api/internal/services/arvis_transaction_arms.go koschei/api/internal/services/arvis_evidence_precedence_test.go koschei/api/internal/handlers/owner_operations.go koschei/api/internal/handlers/owner_radar_conclusion_test.go koschei/api/public/js/owner-control-center.js
          git commit -m 'Harden Radar evidence precedence and owner reporting'
          git push origin HEAD:${{ github.head_ref }}
