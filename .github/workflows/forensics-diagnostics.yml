name: Forensics diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feature/pump-ledger-launch-forensics'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Download modules
        run: go mod download
      - name: Run tests and capture output
        shell: bash
        run: |
          set +e
          go test ./... > "$RUNNER_TEMP/go-test.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/go-test.log"
          echo "$status" > "$RUNNER_TEMP/go-test.status"
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: forensics-go-test-log
          path: |
            ${{ runner.temp }}/go-test.log
            ${{ runner.temp }}/go-test.status
