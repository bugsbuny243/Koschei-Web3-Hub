name: Apply PR579 semantic fixes

on:
  push:
    branches:
      - feature/pump-ledger-launch-forensics

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/pump-ledger-launch-forensics
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Apply surgical patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/patches/pr579-fix.patch.* > /tmp/pr579-fix.patch
          patch -p1 < /tmp/pr579-fix.patch
          gofmt -w \
            koschei/api/internal/services/holder_scan_tiers.go \
            koschei/api/internal/services/launch_actor_classification.go \
            koschei/api/internal/services/launch_actor_classification_test.go \
            koschei/api/internal/services/launch_forensics.go \
            koschei/api/internal/services/launch_forensics_ata.go \
            koschei/api/internal/services/launch_funding_trace.go \
            koschei/api/internal/services/launch_forensics_arvis.go \
            koschei/api/internal/services/pumpportal_client.go \
            koschei/api/internal/services/pumpportal_trade_parse_test.go \
            koschei/api/internal/services/security_radar_retention_worker.go \
            koschei/api/internal/services/launch_forensics_test.go \
            koschei/api/internal/handlers/launch_forensics_integration.go
          node --check koschei/api/public/js/owner-launch-forensics.js
          cd koschei/api
          go test ./...
          go vet ./...
          CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Commit verified fixes
        shell: bash
        run: |
          rm -f .github/patches/pr579-fix.patch.*
          rm -f .github/workflows/apply-pr579-semantic-fixes.yml
          rm -f .github/workflows/forensics-diagnostics.yml
          rm -f .github/workflows/export-source-forensics.yml
          rmdir .github/patches 2>/dev/null || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: harden Launch Forensics budgets and evidence"
          git push origin HEAD:feature/pump-ledger-launch-forensics
