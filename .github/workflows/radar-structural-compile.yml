name: Radar Structural Compile

on:
  pull_request:
    branches:
      - main
    paths:
      - "koschei/api/internal/services/security_radar_store.go"
      - "koschei/api/internal/services/security_radar_allowlist.go"
      - "koschei/api/internal/services/security_radar_structural.go"
      - "koschei/api/neon_structural_floor.sql"
      - ".github/workflows/radar-structural-compile.yml"

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Download modules
        run: go mod download
      - name: Check formatting
        run: test -z "$(gofmt -l internal/services/security_radar_store.go internal/services/security_radar_allowlist.go internal/services/security_radar_structural.go)"
      - name: Compile services tests
        run: go test ./internal/services -run '^$'
      - name: Vet services
        run: go vet ./internal/services
      - name: Build API
        run: CGO_ENABLED=0 GOOS=linux go build ./...
