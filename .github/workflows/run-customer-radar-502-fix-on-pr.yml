name: Run customer Radar fix on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod

      - name: Execute prepared patch
        shell: python
        run: |
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/apply-customer-radar-502-fix.yml')
          text = source.read_text()
          marker = '      - name: Apply handler fix\n        shell: python\n        run: |\n'
          start = text.index(marker) + len(marker)
          end = text.index('\n      - name: Format changed Go files', start)
          script = textwrap.dedent(text[start:end])
          exec(compile(script, str(source), 'exec'), {'__name__': '__main__'})
          Path('.github/workflows/run-customer-radar-502-fix-on-pr.yml').unlink()

      - name: Format changed Go files
        run: gofmt -w internal/handlers/security_radar.go internal/handlers/security_radar_court.go internal/handlers/customer_investigation_response.go internal/handlers/customer_investigation_response_test.go
        working-directory: koschei/api

      - name: Run regression tests
        run: go test ./internal/handlers -run 'TestCustomerInvestigation(Status|Envelope)' -count=1
        working-directory: koschei/api

      - name: Commit tested fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: return customer investigation instead of 502"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
