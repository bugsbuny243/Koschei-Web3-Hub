name: Repository Dead Code Audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Repair incomplete legacy payment cleanup
        working-directory: koschei/api
        run: |
          python scripts/repo_cleanup_phase1.py
          gofmt -w internal/handlers/owner.go
      - name: Verify repaired baseline
        working-directory: koschei/api
        run: go build ./...
      - name: Run deletion simulations
        run: python .github/scripts/repo_dead_code_audit.py
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-dead-code-audit
          path: audit-output/
          if-no-files-found: error
      - name: Commit baseline repair
        if: success()
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/internal/handlers/owner.go
          git commit -m 'Remove orphaned Shopier webhook'
          git push origin HEAD:${{ github.head_ref }}
