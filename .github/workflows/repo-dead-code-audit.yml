name: Repository Cleanup Verify

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply repository cleanup
        working-directory: koschei/api
        run: |
          python scripts/repo_cleanup_phase1.py
          python scripts/repo_cleanup_phase2.py
          gofmt -w internal/handlers internal/router
      - name: Production package build
        continue-on-error: true
        working-directory: koschei/api
        run: |
          set +e
          go build ./internal/handlers ./internal/http ./internal/router ./internal/services ./internal/web3 > ../../cleanup-build.log 2>&1
          code=$?
          cat ../../cleanup-build.log
          printf '%s' "$code" > ../../cleanup-build-status.txt
          exit $code
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-cleanup-build
          path: |
            cleanup-build.log
            cleanup-build-status.txt
          if-no-files-found: error
      - name: Full Linux build
        if: hashFiles('cleanup-build-status.txt') != ''
        continue-on-error: true
        working-directory: koschei/api
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Full test suite
        if: hashFiles('cleanup-build-status.txt') != ''
        continue-on-error: true
        working-directory: koschei/api
        run: go test ./... -count=1
      - name: Frontend syntax
        continue-on-error: true
        run: |
          node --check koschei/api/public/js/koschei-premium-modules.js
          node --check koschei/api/public/js/owner-control-center.js
          node --check koschei/api/public/js/koschei-auth.js
      - name: Cleanup contract
        continue-on-error: true
        run: |
          test ! -e koschei/api/internal/handlers/rug_radar.go
          test ! -e koschei/api/internal/handlers/web3.go
          test ! -e koschei/api/internal/handlers/local_auth.go
          test ! -e koschei/api/internal/handlers/mev_shield.go
          test ! -e koschei/api/internal/handlers/liquidity_radar.go
          test ! -e koschei/api/internal/handlers/payments.go
          test ! -e koschei/api/internal/router/model_router.go
          test -e koschei/api/internal/handlers/kosch_access_guard.go
          test -e koschei/api/internal/handlers/auth_session.go
          ! grep -R "shopierPacks\|tryLocalJWT\|requirePremiumOutput\|consumePremiumOutput\|OwnerPaymentRequestsList\|ResolveModelRoute" koschei/api/internal --include='*.go'
