name: Defense OS Array Fix

on:
  push:
    branches:
      - feat/solana-defense-os-phases-2-5
    paths:
      - .github/workflows/defense-os-array-fix.yml

permissions:
  contents: write

jobs:
  fix:
    if: contains(github.event.head_commit.message, 'Add temporary defense os fixer')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/solana-defense-os-phases-2-5
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - name: Fix PostgreSQL array adapter
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('koschei/api/internal/defense/os.go')
          s = p.read_text()
          s = s.replace('"database/sql"\n', '"database/sql"\n\t"database/sql/driver"\n', 1)
          old = 'func(a pqFloatArray)Value()(any,error)'
          if old not in s:
              raise SystemExit('Value signature not found')
          s = s.replace(old, 'func(a pqFloatArray)Value()(driver.Value,error)', 1)
          old_scan = 'func(s pqFloatArrayScanner)Scan(src any)error{if src==nil{*s.dest=nil;return nil};text:=fmt.Sprint(src);text=strings.Trim(text,"{}");if text==""{*s.dest=nil;return nil};parts:=strings.Split(text,",");out:=make([]float64,0,len(parts));for _,p:=range parts{var v float64;if _,err:=fmt.Sscan(strings.TrimSpace(p),&v);err!=nil{return err};out=append(out,v)};*s.dest=out;return nil}'
          new_scan = '''func (s pqFloatArrayScanner) Scan(src any) error {
          if src == nil {
              *s.dest = nil
              return nil
          }
          var text string
          switch value := src.(type) {
          case string:
              text = value
          case []byte:
              text = string(value)
          default:
              text = fmt.Sprint(value)
          }
          text = strings.Trim(text, "{}")
          if text == "" {
              *s.dest = nil
              return nil
          }
          parts := strings.Split(text, ",")
          out := make([]float64, 0, len(parts))
          for _, part := range parts {
              var value float64
              if _, err := fmt.Sscan(strings.TrimSpace(part), &value); err != nil {
                  return err
              }
              out = append(out, value)
          }
          *s.dest = out
          return nil
          }'''
          if old_scan not in s:
              raise SystemExit('scanner implementation not found')
          s = s.replace(old_scan, new_scan, 1)
          p.write_text(s)
          PY
          gofmt -w koschei/api/internal/defense/os.go
          cd koschei/api
          go test ./internal/defense ./internal/router ./internal/handlers ./internal/http
          go vet ./internal/defense ./internal/router ./internal/handlers ./internal/http
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add koschei/api/internal/defense/os.go
          git commit -m 'Fix Defense OS PostgreSQL embedding array adapter'
          git push origin HEAD:feat/solana-defense-os-phases-2-5
