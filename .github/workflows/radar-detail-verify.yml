name: Radar Detail Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "koschei/api/internal/handlers/security_radar_detail.go"
      - "koschei/api/internal/services/pumpportal_radar_adapter.go"
      - "koschei/api/internal/http/server.go"
      - "koschei/api/public/security-radar.html"
      - "koschei/api/public/safe-check.html"
      - "koschei/api/public/js/security-radar-detail.js"
      - ".github/workflows/radar-detail-verify.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - run: go mod download
      - name: Go format
        run: test -z "$(gofmt -l internal/handlers/security_radar_detail.go internal/services/pumpportal_radar_adapter.go internal/http/server.go)"
      - name: Compile changed packages
        id: compile
        continue-on-error: true
        run: go test ./internal/handlers ./internal/services ./internal/http -run '^$' > /tmp/radar-compile.log 2>&1
      - name: Upload compile diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-compile-log
          path: /tmp/radar-compile.log
      - name: Stop on compile failure
        if: steps.compile.outcome != 'success'
        run: |
          cat /tmp/radar-compile.log
          exit 1
      - name: Vet changed packages
        run: go vet ./internal/handlers ./internal/services ./internal/http
      - name: Build complete API
        run: CGO_ENABLED=0 GOOS=linux go build ./...
      - name: Check Radar JavaScript
        run: node --check public/js/security-radar-detail.js
      - name: Check inline Safe Check JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('public/safe-check.html').read_text()
          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', html, re.S)
          Path('/tmp/safe-check-inline.js').write_text('\n'.join(scripts))
          PY
          node --check /tmp/safe-check-inline.js
      - name: Assert complete detail surface
        run: |
          grep -q 'top_3_percentage' internal/handlers/security_radar_detail.go
          grep -q 'top_20_percentage' internal/handlers/security_radar_detail.go
          grep -q 'creator_wallet' internal/handlers/security_radar_detail.go
          grep -q '/api/v1/radar/detail' internal/http/server.go
          grep -q 'COMPLETE EVIDENCE LOG' public/js/security-radar-detail.js
          grep -q 'Tam Security Radar Raporu' public/safe-check.html
      - name: Protect auth client
        run: git diff origin/main...HEAD -- public/js/koschei-auth.js | test ! -s /dev/stdin
