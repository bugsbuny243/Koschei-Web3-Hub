name: Security CI

on:
  push:
    branches: [main]
    paths:
      - "koschei/api/**/*.go"
      - "koschei/api/go.mod"
      - "koschei/api/go.sum"
      - "sdk/typescript/**"
      - "oss/event-normalizer/**"
      - ".github/dependabot.yml"
      - ".github/workflows/security-ci.yml"
  pull_request:
    paths:
      - "koschei/api/**/*.go"
      - "koschei/api/go.mod"
      - "koschei/api/go.sum"
      - "sdk/typescript/**"
      - "oss/event-normalizer/**"
      - ".github/dependabot.yml"
      - ".github/workflows/security-ci.yml"
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  go-security:
    name: Go vulnerability and static security scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: koschei/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum
      - name: Download modules
        run: go mod download
      - name: Install security scanners
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/security-bin"
          GOBIN="${RUNNER_TEMP}/security-bin" go install golang.org/x/vuln/cmd/govulncheck@latest
          GOBIN="${RUNNER_TEMP}/security-bin" go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Reachable vulnerability scan
        run: "${RUNNER_TEMP}/security-bin/govulncheck" ./...
      - name: High-confidence static security scan
        run: "${RUNNER_TEMP}/security-bin/gosec" -severity high -confidence high -exclude-generated ./...

  npm-security:
    name: npm audit (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package:
          - sdk/typescript
          - oss/event-normalizer
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies without lifecycle scripts
        run: npm install --ignore-scripts --no-fund
      - name: Audit high and critical vulnerabilities
        run: npm audit --audit-level=high
