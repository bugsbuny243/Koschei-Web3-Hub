name: Apply tiered holder depth on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/arvis-tiered-holder-depth' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
      - name: Execute staged surgical patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          source=Path('.github/workflows/apply-tiered-holder-depth.yml').read_text()
          marker="python3 - <<'PY'\n"
          if marker not in source:
              raise SystemExit('staged patch marker not found')
          script=source.split(marker,1)[1].split('\n          PY',1)[0]
          exec(compile(textwrap.dedent(script), 'tiered-holder-patch', 'exec'))
          PY
          gofmt -w koschei/api/internal/services/holder_scan_tiers.go koschei/api/internal/services/holder_scan_tiers_test.go koschei/api/internal/services/holder_cluster_intelligence.go
          node --check koschei/api/public/js/owner-holder-tier-labels.js
          cd koschei/api
          go test ./...
          go vet ./...
          go build ./...
      - name: Commit verified source changes
        shell: bash
        run: |
          rm .github/workflows/apply-tiered-holder-depth.yml .github/workflows/apply-tiered-holder-depth-pr.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: add tiered ARVIS holder scan depth"
          git push origin HEAD:${{ github.head_ref }}
