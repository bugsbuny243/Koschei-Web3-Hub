name: Verify Final Holder Core

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.head_ref }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: koschei/api/go.mod
          cache-dependency-path: koschei/api/go.sum

      - name: Test API
        shell: bash
        working-directory: koschei/api
        run: |
          set -o pipefail
          mkdir -p ../../holder-final-diagnostics
          go test ./... 2>&1 | tee ../../holder-final-diagnostics/test.log

      - name: Vet API
        shell: bash
        working-directory: koschei/api
        run: |
          set -o pipefail
          go vet ./... 2>&1 | tee ../../holder-final-diagnostics/vet.log

      - name: Build API
        shell: bash
        working-directory: koschei/api
        run: |
          set -o pipefail
          CGO_ENABLED=0 GOOS=linux go build ./... 2>&1 | tee ../../holder-final-diagnostics/build.log

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: holder-final-diagnostics
          path: holder-final-diagnostics
          if-no-files-found: error

      - name: Remove temporary verification workflow
        run: |
          rm -rf .github/workflows/verify-holder-core-final.yml holder-final-diagnostics
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove temporary final holder verification"
          git push origin HEAD:${TARGET_BRANCH}
