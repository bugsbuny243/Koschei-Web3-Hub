<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Register — Koschei Web3 Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--accent:#00ff88;--accent2:#00ccff;--danger:#ff4466;--success:#00ff88;--text:#f0f0ff;--text2:#8888aa;--bg:#030309}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}.blob{position:absolute;border-radius:50%;filter:blur(90px);animation:bf 10s ease-in-out infinite}.b1{width:400px;height:400px;background:rgba(0,255,136,.08);top:-80px;left:-60px}.b2{width:350px;height:350px;background:rgba(124,58,237,.1);bottom:-60px;right:-40px;animation-delay:-5s}@keyframes bf{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-15px)}}.card{position:relative;z-index:1;background:rgba(255,255,255,.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:36px 32px;width:100%;max-width:420px;margin:20px}.logo{font-size:22px;font-weight:800;color:var(--accent);text-align:center;margin-bottom:6px}.title{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px}.sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px;line-height:1.5}.form{display:flex;flex-direction:column;gap:14px}.form-group{display:flex;flex-direction:column;gap:8px}.form-label{font-size:13px;font-weight:700}.form-input{width:100%;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:rgba(0,0,0,.28);color:var(--text);font:inherit;padding:12px 13px;outline:none}.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,136,.12)}.btn{display:block;width:100%;padding:12px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;transition:opacity .15s;margin-top:4px;text-align:center;text-decoration:none}.btn:hover{opacity:.88}.btn:disabled{opacity:.55;cursor:not-allowed}.alert{padding:10px 14px;border-radius:10px;font-size:13px;display:none;margin-bottom:12px;line-height:1.45}.alert.show{display:block}.alert-error{background:rgba(255,68,102,.12);border:1px solid var(--danger);color:var(--danger)}.alert-success{background:rgba(0,255,136,.12);border:1px solid var(--success);color:var(--success)}.link{text-align:center;font-size:13px;color:var(--text2);margin-top:16px}.link a{color:var(--accent);text-decoration:none}
  </style>
</head>
<body>
<div class="blobs"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="card">
  <div class="logo">K Koschei</div>
  <div class="title">Create Account</div>
  <div class="sub">Create your Koschei account. Premium tools require an active package.</div>
  <div class="alert" id="alert" role="alert" aria-live="polite"></div>
  <form class="form" id="registerForm">
    <div class="form-group"><label class="form-label" for="email">Email</label><input class="form-input" id="email" name="email" type="email" autocomplete="email" required></div>
    <div class="form-group"><label class="form-label" for="password">Password</label><input class="form-input" id="password" name="password" type="password" autocomplete="new-password" minlength="8" required></div>
    <div class="form-group"><label class="form-label" for="confirmPassword">Confirm password</label><input class="form-input" id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required></div>
    <button class="btn" id="submitBtn" type="submit">Create account</button>
  </form>
  <div class="link">Already have an account? <a href="/login.html">Sign in</a></div>
</div>
<script src="/js/koschei-auth.js?v=5"></script>
<script>
  const form = document.getElementById('registerForm');
  const submitBtn = document.getElementById('submitBtn');
  const alertEl = document.getElementById('alert');

  function showAlert(message, type = 'error') {
    alertEl.textContent = message;
    alertEl.className = 'alert show ' + (type === 'success' ? 'alert-success' : 'alert-error');
  }

  function validate(email, password, confirmPassword) {
    if (!email || !email.includes('@')) return 'Enter a valid email address.';
    if (!password || password.length < 8) return 'Password must be at least 8 characters.';
    if (password !== confirmPassword) return 'Passwords do not match.';
    return '';
  }

  (async () => {
    await KoscheiAuth.init();
    if (KoscheiAuth.isLoggedIn()) {
      window.location.href = '/hub.html';
      return;
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating…';
      alertEl.className = 'alert';
      const body = Object.fromEntries(new FormData(form));
      const email = String(body.email || '').trim();
      const password = String(body.password || '');
      const confirmPassword = String(body.confirmPassword || '');
      const validationError = validate(email, password, confirmPassword);
      if (validationError) {
        showAlert(validationError);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
        return;
      }
      try {
        await KoscheiAuth.signUp(email, password);
        showAlert('Account created. Redirecting…', 'success');
        window.location.href = '/hub.html';
      } catch (error) {
        showAlert(error && error.message ? error.message : 'Registration failed. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
      }
    });
  })();
</script>
</body>
</html>
