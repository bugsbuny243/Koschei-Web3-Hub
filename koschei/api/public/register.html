<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Register — Koschei Web3 Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--accent:#00ff88;--accent2:#00ccff;--danger:#ff4466;--text:#f0f0ff;--text2:#8888aa;--bg:#030309;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .blob{position:absolute;border-radius:50%;filter:blur(90px);animation:bf 10s ease-in-out infinite;}
    .b1{width:400px;height:400px;background:rgba(0,255,136,.08);top:-80px;left:-60px;}
    .b2{width:350px;height:350px;background:rgba(0,204,255,.08);bottom:-60px;right:-40px;animation-delay:-5s;}
    @keyframes bf{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-15px)}}
    .card{position:relative;z-index:1;background:rgba(255,255,255,.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:36px 32px;width:100%;max-width:400px;margin:20px;}
    .logo{font-size:22px;font-weight:800;color:var(--accent);text-align:center;margin-bottom:6px;}
    .title{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px;}
    .sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px;}
    .form-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);font-size:14px;padding:12px 14px;outline:none;width:100%;transition:border-color .15s;margin-bottom:12px;}
    .form-input:focus{border-color:var(--accent);}
    .form-input::placeholder{color:var(--text2);}
    .btn{display:block;width:100%;padding:12px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;transition:opacity .15s;margin-top:4px;}
    .btn:hover{opacity:.88;}
    .btn:disabled{opacity:.4;cursor:not-allowed;}
    .alert{padding:10px 14px;border-radius:10px;font-size:13px;display:none;margin-bottom:12px;}
    .alert.show{display:block;}
    .alert-error{background:rgba(255,68,102,.12);border:1px solid var(--danger);color:var(--danger);}
    .link{text-align:center;font-size:13px;color:var(--text2);margin-top:16px;}
    .link a{color:var(--accent);text-decoration:none;}
    .spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="blobs"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="card">
  <div class="logo">K Koschei</div>
  <div class="title">Create Account</div>
  <div class="sub">Free. No credit card required.</div>
  <div class="alert" id="alert"></div>
  <input class="form-input" type="email" id="email" placeholder="Email address" autocomplete="email">
  <input class="form-input" type="password" id="password" placeholder="Password" autocomplete="new-password">
  <input class="form-input" type="password" id="password2" placeholder="Confirm password" autocomplete="new-password">
  <button class="btn" id="btn" onclick="register()">Create Account</button>
  <div class="link">Already have an account? <a href="/login.html">Sign in</a></div>
</div>
<script src="/js/koschei-auth.js?v=5"></script>
<script>
(async()=>{
  await KoscheiAuth.init();
  if(KoscheiAuth.isLoggedIn()) window.location.href='/hub.html';
})();
async function register(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('password').value;
  const pw2=document.getElementById('password2').value;
  const btn=document.getElementById('btn');
  clearAlert();
  if(!email||!pw){showAlert('Email and password are required.');return;}
  if(pw.length<8){showAlert('Password must be at least 8 characters.');return;}
  if(pw!==pw2){showAlert('Passwords do not match.');return;}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try{
    await KoscheiAuth.signUp(email,pw);
    window.location.href='/hub.html';
  }catch(e){
    showAlert(e.message||'Registration failed. Please try again.');
  }finally{
    btn.disabled=false;btn.innerHTML='Create Account';
  }
}
function showAlert(m){const e=document.getElementById('alert');e.textContent=m;e.className='alert alert-error show';}
function clearAlert(){document.getElementById('alert').className='alert';}
</script>
</body>
</html>
