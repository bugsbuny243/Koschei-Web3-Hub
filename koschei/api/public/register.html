<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayıt Ol — Koschei</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/koschei.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div>
      <a href="/" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;">
        <span style="font-size:22px;font-weight:700;color:var(--accent);">K</span>
        <span style="font-size:16px;font-weight:600;">Koschei <span style="color:var(--text2);font-weight:400;">Web3 Hub</span></span>
      </a>
      <div class="auth-title" style="margin-top:28px;">Hesap Oluştur</div>
      <div class="auth-sub">Ücretsiz başla. Kredi kartı gerekmez.</div>
    </div>
    <div class="alert" id="alert"></div>
    <div class="card" style="gap:16px;display:flex;flex-direction:column;">
      <div class="form-group">
        <label class="form-label">E-posta</label>
        <input class="form-input" type="email" id="email" placeholder="sen@ornek.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Şifre</label>
        <input class="form-input" type="password" id="password" placeholder="En az 8 karakter" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Şifre Tekrar</label>
        <input class="form-input" type="password" id="password2" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn btn-primary btn-full" id="regBtn" onclick="handleRegister()">Hesap Oluştur</button>
    </div>
    <div class="auth-footer">Zaten hesabın var mı? <a href="/login.html">Giriş yap</a></div>
  </div>
</div>
<script src="/js/koschei-auth.js"></script>
<script>
  (async () => { await KoscheiAuth.init(); KoscheiAuth.requireGuest('/hub.html'); })();
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
  async function handleRegister() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const btn = document.getElementById('regBtn');
    clearAlert();
    if (!email || !password) { showError('Tüm alanları doldurun.'); return; }
    if (password.length < 8) { showError('Şifre en az 8 karakter olmalı.'); return; }
    if (password !== password2) { showError('Şifreler eşleşmiyor.'); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      await KoscheiAuth.signUp(email, password);
      showSuccess('Hesap oluşturuldu! Yönlendiriliyor...');
      setTimeout(() => window.location.replace('/hub.html'), 1000);
    } catch (err) {
      showError(err.message || 'Kayıt başarısız.');
      btn.disabled = false;
      btn.textContent = 'Hesap Oluştur';
    }
  }
  function showError(msg) { const el = document.getElementById('alert'); el.textContent = msg; el.className = 'alert alert-error show'; }
  function showSuccess(msg) { const el = document.getElementById('alert'); el.textContent = msg; el.className = 'alert alert-success show'; }
  function clearAlert() { const el = document.getElementById('alert'); el.className = 'alert'; el.textContent = ''; }
</script>
</body>
</html>
