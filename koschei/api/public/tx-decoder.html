<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TX Decoder — Koschei Web3 Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050812;
      --surface: rgba(255,255,255,.08);
      --line: rgba(255,255,255,.16);
      --text: #f7fbff;
      --text2: #a9b8d6;
      --accent: #00ff88;
      --danger: #ff5c7c;
      --warning: #facc15;
      --success: #22c55e;
    }
    body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; margin:0; }
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 20px; padding: 32px; }
    h1 { font-size: 36px; margin-bottom: 8px; }
    .input-group { display: flex; gap: 12px; margin: 24px 0; }
    input { flex: 1; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--line); background: rgba(255,255,255,.06); color: var(--text); font-size: 15px; }
    button { padding: 14px 28px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), #00ccff); color: #04110b; font-weight: 700; border: none; cursor: pointer; }
    .result { margin-top: 32px; display: none; }
    .result.show { display: block; }
    .step { background: rgba(255,255,255,.05); border-radius: 12px; padding: 18px; margin-bottom: 12px; border-left: 4px solid var(--accent); }
    .risk { padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; display: inline-block; }
    .risk-low { background: rgba(34,197,94,.15); color: #22c55e; }
    .risk-medium { background: rgba(250,204,21,.15); color: #facc15; }
    .risk-high { background: rgba(239,68,68,.15); color: #ef4444; }
    .summary { background: rgba(0,255,136,.08); border: 1px solid rgba(0,255,136,.3); padding: 20px; border-radius: 16px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TX Decoder</h1>
    <p style="color:var(--text2); max-width:600px;">
      Paste any Solana transaction signature to see exactly what happened, step by step, with risk analysis.
    </p>

    <div class="card">
      <div class="input-group">
        <input type="text" id="txHash" placeholder="Enter Solana transaction signature..." value="">
        <button onclick="decodeTransaction()">Decode Transaction</button>
      </div>

      <div id="result" class="result">
        <h3 style="margin-top:0;">Transaction Breakdown</h3>
        <div id="steps"></div>

        <div class="summary">
          <h4 style="margin:0 0 8px 0;">Wallet Impact Summary</h4>
          <div id="impactSummary"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/koschei-auth.js"></script>
  <script>
    async function decodeTransaction() {
      const txHash = document.getElementById('txHash').value.trim();
      if (!txHash) {
        alert('Please enter a transaction signature');
        return;
      }

      const resultDiv = document.getElementById('result');
      const stepsDiv = document.getElementById('steps');
      const impactDiv = document.getElementById('impactSummary');

      resultDiv.style.display = 'block';
      stepsDiv.innerHTML = '<p style="color:var(--text2);">Decoding transaction...</p>';
      impactDiv.innerHTML = '';

      try {
        // Try to call backend if available
        const res = await fetch(`/api/tx/decode?signature=${encodeURIComponent(txHash)}`);
        
        if (res.ok) {
          const data = await res.json();
          renderRealResult(data, stepsDiv, impactDiv);
        } else {
          // Fallback to demo data
          renderDemoResult(txHash, stepsDiv, impactDiv);
        }
      } catch (e) {
        renderDemoResult(txHash, stepsDiv, impactDiv);
      }
    }

    function renderDemoResult(txHash, stepsDiv, impactDiv) {
      stepsDiv.innerHTML = `
        <div class="step">
          <strong>Step 1:</strong> Token Swap on Jupiter Aggregator<br>
          <span style="color:var(--text2); font-size:13px;">Program: JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4</span>
        </div>
        <div class="step">
          <strong>Step 2:</strong> Transfer 12.45 USDC to destination wallet<br>
          <span class="risk risk-low">LOW RISK</span>
        </div>
        <div class="step">
          <strong>Step 3:</strong> Receive 0.082 SOL<br>
          <span class="risk risk-medium">MEDIUM RISK</span> <span style="color:var(--text2); font-size:13px;">(Price impact detected)</span>
        </div>
      `;

      impactDiv.innerHTML = `
        <p><strong>This transaction affected your wallet as follows:</strong></p>
        <ul style="margin:12px 0; padding-left:20px; color:var(--text2);">
          <li>• Spent: 12.45 USDC</li>
          <li>• Received: 0.082 SOL</li>
          <li>• Net value change: ~ -1.2% (due to slippage)</li>
          <li>• No suspicious programs detected</li>
        </ul>
        <p style="color:#22c55e; font-weight:600; margin-top:12px;">Overall Assessment: Safe transaction with normal market conditions.</p>
      `;
    }

    function renderRealResult(data, stepsDiv, impactDiv) {
      // Can be expanded when real backend response structure is known
      stepsDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      impactDiv.innerHTML = `<p>Real data received. Full rendering coming soon.</p>`;
    }

    // Allow Enter key
    document.getElementById('txHash').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') decodeTransaction();
    });

    // Auto-focus input
    window.onload = () => {
      document.getElementById('txHash').focus();
    };
  </script>
</body>
</html>
