<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TX Decoder — Koschei Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#050812; --surface:rgba(255,255,255,.08); --line:rgba(255,255,255,.16); --text:#f7fbff; --text2:#a9b8d6; --accent:#00ff88; }
    body { background:var(--bg); color:var(--text); font-family:Inter, system-ui, sans-serif; margin:0; }
    .container { max-width:900px; margin:40px auto; padding:0 20px; }
    .card { background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:32px; }
    h1 { font-size:36px; margin-bottom:8px; }
    .pro-badge { display:inline-block; background:linear-gradient(135deg,#00ff88,#69d8ff); color:#04110b; font-size:11px; font-weight:800; padding:3px 10px; border-radius:999px; margin-left:12px; }
    textarea { width:100%; height:120px; padding:16px; border-radius:12px; border:1px solid var(--line); background:rgba(255,255,255,.06); color:var(--text); font-family:monospace; }
    button { padding:14px 28px; border-radius:12px; background:linear-gradient(135deg,var(--accent),#00ccff); color:#04110b; font-weight:700; border:none; cursor:pointer; }
    .result { margin-top:30px; padding:24px; background:rgba(255,255,255,.05); border-radius:16px; }
    .pro-footer { margin-top:50px; text-align:center; padding:30px; background:var(--surface); border-radius:20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TX Decoder <span class="pro-badge">PRO</span></h1>
    <p style="color:var(--text2); max-width:620px;">Decode complex Solana transactions into clear, human-readable summaries with AI risk analysis. Pro feature.</p>

    <div class="card">
      <textarea id="txInput" placeholder="Paste Solana transaction signature or raw transaction..."></textarea>
      <button onclick="decodeTX()" style="margin-top:16px;">Decode Transaction</button>

      <div id="result" class="result" style="display:none;"></div>
    </div>

    <div class="pro-footer">
      <p style="color:var(--text2); margin-bottom:16px;">This is a Pro feature with advanced decoding and risk insights.</p>
      <a href="https://www.shopier.com/TradeVisual/47465449" target="_blank" style="display:inline-block; padding:14px 32px; background:linear-gradient(135deg,#00ff88,#69d8ff); color:#04110b; font-weight:700; border-radius:12px; text-decoration:none;">Buy Pro Access</a>
    </div>
  </div>

  <script src="/js/koschei-auth.js"></script>
  <script>
    async function decodeTX() {
      const input = document.getElementById('txInput').value.trim();
      if (!input) return alert('Please enter a transaction');

      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '<p style="color:var(--text2);">Decoding with AI analysis...</p>';

      try {
        const res = await KoscheiAuth.apiCall('/api/tx/decode', {
          method: 'POST',
          body: JSON.stringify({ tx: input })
        });
        const data = await res.json();
        resultDiv.innerHTML = `<pre style="white-space:pre-wrap; color:#a9b8d6;">${JSON.stringify(data, null, 2)}</pre>`;
      } catch(e) {
        resultDiv.innerHTML = `<p style="color:#facc15;">Advanced TX decoding requires Pro access.</p>`;
      }
    }
  </script>
</body>
</html>
