<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/css/koschei.css"><title>TX Decoder Pro — Koschei</title><style>.hero{padding:32px;background:linear-gradient(135deg,#111118,#13231d);border:1px solid #2a2a3a;border-radius:16px;margin-bottom:20px}.stack{display:grid;gap:16px}pre{white-space:pre-wrap;overflow:auto;color:#c7f9df}.metric{font-size:28px;color:var(--accent);font-weight:700}textarea{min-height:110px}code{color:var(--accent2)}</style></head><body><nav class="nav"><a class="nav-logo" href="/hub">K Koschei</a><div class="nav-links"><a class="nav-link" href="/hub">Hub</a><a class="nav-link" href="/docs">Docs</a><a class="nav-link" href="/impact">Impact</a><a class="nav-link" href="/account">Account</a></div></nav><main class="page"><section class="hero"><span class="badge badge-green">Preliminary intelligence</span><h1>TX Decoder Pro</h1><p>Human-readable, cross-chain transaction intelligence.</p></section><form id="form" class="card stack"><label class="form-label">Chain<input class="form-input" name="chain" placeholder="solana | base | ethereum"></label><label class="form-label">Network<input class="form-input" name="network" placeholder="devnet | base-mainnet | sepolia"></label><label class="form-label">Transaction hash<input class="form-input" name="tx_hash" placeholder="public transaction hash"></label><button class="btn btn-primary">Decode transaction</button></form><section class="card" style="margin-top:20px"><h2>Structured result</h2><pre id="out">Submit public information to begin. Never enter private keys or seed phrases.</pre></section></main><script src="/js/koschei-auth.js?v=4"></script><script src="/js/koschei-analytics.js?v=1"></script><script>(async()=>{await KoscheiAuth.init();if(!KoscheiAuth.requireAuth('/login'))return;KoscheiAnalytics.track('tx_decode_pro_view');form.onsubmit=async e=>{e.preventDefault();let body=Object.fromEntries(new FormData(form));let r=await KoscheiAuth.apiCall('/api/web3/tx-decode-pro',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});out.textContent=JSON.stringify(await r.json(),null,2);KoscheiAnalytics.track('tx_decode_pro_decode')}})()</script></body></html>
