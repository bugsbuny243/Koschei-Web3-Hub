<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="Koschei ARVIS geri bildirimi: kanıt, yapısal risk, KOSCH erişimi ve arayüz sorunlarını paylaşın."><title>Koschei ARVIS · Geri Bildirim</title><style>:root{--line:#24eaff35;--t:#f4fbff;--m:#9aabb8;--g:#18ffb2;--c:#24eaff;--r:#ff4d6d}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--t);font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at 10% 0,#18ffb222,transparent 30%),linear-gradient(135deg,#020409,#071522 58%,#02040a)}.wrap{width:min(900px,calc(100% - 20px));margin:auto;padding:16px 0 70px}.glass{border:1px solid var(--line);background:linear-gradient(145deg,#081722f2,#04090ff2);border-radius:26px;box-shadow:0 24px 80px #000a}.top{display:flex;justify-content:space-between;align-items:center}.top a{color:inherit;text-decoration:none;font-weight:900}.hero,.form{padding:24px;margin-top:14px}.eyebrow{font-size:11px;font-weight:950;letter-spacing:.13em;text-transform:uppercase;color:#8fffe5}.hero h1{font-size:clamp(34px,6vw,60px);letter-spacing:-.055em;margin:8px 0}.muted{color:var(--m);line-height:1.65}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:grid;gap:7px}.full{grid-column:1/-1}select,input,textarea{width:100%;border:1px solid var(--line);border-radius:15px;background:#02070d;color:var(--t);padding:14px}textarea{min-height:210px}.row{display:flex;justify-content:space-between;gap:10px;margin-top:14px}button{border:0;border-radius:999px;padding:0 24px;min-height:50px;font-weight:1000;color:#02100d;background:linear-gradient(135deg,var(--g),var(--c))}.notice{display:none;margin-top:14px;padding:14px;border-radius:15px;border:1px solid #18ffb250}.notice.show{display:block}.notice.bad{border-color:#ff4d6d60;color:#ffe3e9}.honeypot{position:absolute;left:-9999px}@media(max-width:680px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.row{flex-direction:column}}</style></head><body><main class="wrap"><header class="top"><a href="/dashboard">KOSCHEI ARVIS</a><a href="/account">Hesap</a></header><section class="hero glass"><div class="eyebrow">Evidence & KOSCH feedback</div><h1>Sistemi birlikte güçlendirelim.</h1><p class="muted">Yanlış pozitif, eksik kanıt, yapısal floor, KOSCH bakiye doğrulaması, cüzdan bağlantısı veya arayüz sorunlarını ayrıntılı biçimde bildirin.</p></section><section class="form glass"><form id="feedbackForm"><div class="grid"><div class="field"><label>Geri bildirim türü</label><select id="category" required><option value="">Seçin</option><option value="system_gap">Sistem eksikliği</option><option value="bug">Hata</option><option value="evidence">Kanıt / skor tutarsızlığı</option><option value="structural_floor">Yapısal floor sorunu</option><option value="kosch_access">KOSCH access / cüzdan sorunu</option><option value="security">Güvenlik bildirimi</option><option value="suggestion">Öneri</option></select></div><div class="field"><label>E-posta</label><input id="email" type="email"></div><div class="field full"><label>Kısa başlık</label><input id="subject" required maxlength="160"></div><div class="field full"><label>Ayrıntılı açıklama</label><textarea id="message" required maxlength="5000" placeholder="Hedef, mint, imza, beklenen sonuç ve görülen sonucu yazın. Seed phrase veya private key paylaşmayın."></textarea><div class="row"><span id="counter">0 / 5000</span><button id="submit">Gönder</button></div></div><input class="honeypot" id="website"></div></form><div id="notice" class="notice"></div></section></main><script src="/js/koschei-auth.js?v=33"></script><script>(async()=>{const f=document.getElementById('feedbackForm'),m=document.getElementById('message'),c=document.getElementById('counter'),n=document.getElementById('notice'),s=document.getElementById('submit'),e=document.getElementById('email');try{await KoscheiAuth.init();e.value=KoscheiAuth.getEmail?.()||''}catch{}m.oninput=()=>c.textContent=`${m.value.length} / 5000`;function show(t,b=false){n.textContent=t;n.className='notice show'+(b?' bad':'')}f.onsubmit=async ev=>{ev.preventDefault();const category=document.getElementById('category').value,subject=document.getElementById('subject').value.trim(),body=m.value.trim();if(!category)return show('Tür seçin.',true);if(subject.length<3||body.length<10)return show('Başlık ve açıklamayı tamamlayın.',true);s.disabled=true;try{const r=await fetch('/api/analytics/event',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event_name:'customer_feedback',email:e.value.trim(),path:location.href,metadata:{category,subject,message:body,website:document.getElementById('website').value}})}),d=await r.json().catch(()=>({}));if(!r.ok||!d.ok)throw new Error(d.message||'Kaydedilemedi.');show('Geri bildiriminiz alındı.');f.reset();c.textContent='0 / 5000'}catch(err){show(err.message,true)}finally{s.disabled=false}}})();</script></body></html>
