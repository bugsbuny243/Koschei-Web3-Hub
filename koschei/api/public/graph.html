<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/css/koschei.css"><title>Intelligence Graph — Koschei</title><style>.hero{padding:32px;background:linear-gradient(135deg,#111118,#13231d);border:1px solid #2a2a3a;border-radius:16px;margin-bottom:20px}.stack{display:grid;gap:16px}.form-grid,.graph-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.node{padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px}.node b{color:var(--accent)}pre{white-space:pre-wrap}@media(max-width:700px){.form-grid,.graph-grid{grid-template-columns:1fr}}</style></head><body><nav class="nav"><a class="nav-logo" href="/hub">K Koschei</a><div class="nav-links"><a class="nav-link" href="/hub">Hub</a><a class="nav-link" href="/watchlist">Watchlist</a><a class="nav-link" href="/account">Account</a></div></nav><main class="page"><section class="hero"><span class="badge badge-green">Live · 0 outputs</span><h1>Intelligence Graph</h1><p>Analyze relationships from one of your watchlist sources or a submitted public address.</p><p class="auth-sub">Only your logged-in account’s sources and events are used.</p></section><form id="form" class="card stack"><div class="form-grid"><label class="form-label">Your watchlist source<select id="source" class="form-input" name="source_id"><option value="">Use public address instead</option></select></label><label class="form-label">Public address<input class="form-input" name="address" placeholder="Public wallet or contract"></label><label class="form-label">Chain<input class="form-input" name="chain" placeholder="ethereum"></label><label class="form-label">Network<input class="form-input" name="network" placeholder="mainnet"></label></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-primary">Build Graph</button><button type="button" id="example" class="btn btn-ghost">Load example</button></div></form><section class="card" style="margin-top:20px"><h2>Relationship summary</h2><p id="relationship">Build a graph to see relationships.</p><h3 style="margin-top:20px">Nodes</h3><div id="nodes" class="graph-grid"></div><h3 style="margin-top:20px">Edges</h3><div id="edges" class="graph-grid"></div></section></main><script src="/js/koschei-auth.js?v=4"></script><script src="/js/koschei-analytics.js?v=1"></script><script>(async()=>{await KoscheiAuth.init();if(!KoscheiAuth.requireAuth('/login'))return;const escapeHTML=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));example.onclick=()=>{relationship.textContent='Demo example — no backend execution, no credit decrement, and no paid output saved.';nodes.innerHTML='<div class="node"><b>Demo wallet</b><p>submitted_address · ethereum/mainnet</p></div><div class="node"><b>Demo transaction</b><p>transaction · ethereum/mainnet</p></div>';edges.innerHTML='<div class="node"><b>Demo example</b><p>example relationship only</p></div>'};const sr=await KoscheiAuth.apiCall('/api/web3/sources');if(sr.ok){const d=await sr.json();(d.sources||[]).forEach(x=>source.add(new Option(`${x.label||x.name} · ${x.chain}/${x.network}`,x.id)))}form.onsubmit=async e=>{e.preventDefault();const r=await KoscheiAuth.apiCall('/api/web3/intelligence-graph/build',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(form))) });const d=await r.json();relationship.innerHTML=(d.error==='insufficient_outputs')?'Real execution requires credits. Demo examples are free. <a class="btn btn-ghost" href="/pricing">View Pricing</a>':(d.relationship_summary||d.message||d.error||'No summary');nodes.innerHTML=(d.nodes||[]).map(x=>`<div class="node"><b>${escapeHTML(x.label||x.address||x.node_type)}</b><p>${escapeHTML(x.node_type)} · ${escapeHTML(x.chain)}/${escapeHTML(x.network)}</p></div>`).join('')||'<p>No related nodes found.</p>';edges.innerHTML=(d.edges||[]).map(x=>`<div class="node"><b>${escapeHTML(x.relationship_type)}</b><p>${escapeHTML(x.chain)}/${escapeHTML(x.network)}</p><small>${escapeHTML(x.tx_hash||'')}</small></div>`).join('')||'<p>No relationships found yet.</p>'}})()</script></body></html>
