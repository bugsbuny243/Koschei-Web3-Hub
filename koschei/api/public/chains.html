<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chains — Koschei Web3 Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050812;
      --surface: rgba(255,255,255,.08);
      --line: rgba(255,255,255,.16);
      --text: #f7fbff;
      --text2: #a9b8d6;
      --accent: #00ff88;
      --danger: #ff5c7c;
      --warning: #facc15;
      --success: #22c55e;
    }
    body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; margin:0; }
    .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 36px; margin-bottom: 8px; }
    .chains-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 32px; }
    .chain-card { background: var(--surface); border: 1px solid var(--line); border-radius: 20px; padding: 24px; }
    .chain-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .chain-name { font-size: 22px; font-weight: 700; }
    .status { padding: 4px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .status.online { background: rgba(34,197,94,.15); color: #22c55e; }
    .status.degraded { background: rgba(250,204,21,.15); color: #facc15; }
    .status.offline { background: rgba(239,68,68,.15); color: #ef4444; }
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .metric { text-align: center; }
    .metric-value { font-size: 26px; font-weight: 700; }
    .metric-label { color: var(--text2); font-size: 13px; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chain Health</h1>
    <p style="color:var(--text2); max-width:620px;">
      Real-time status of supported blockchains. Monitor TPS, block height, and network health.
    </p>

    <div class="chains-grid" id="chainsGrid">
      <!-- Populated by JS -->
    </div>
  </div>

  <script src="/js/koschei-auth.js"></script>
  <script>
    const chains = [
      { id: 'solana', name: 'Solana', symbol: '◎' },
      { id: 'ethereum', name: 'Ethereum', symbol: '⟠' },
      { id: 'base', name: 'Base', symbol: '🔵' },
      { id: 'arbitrum', name: 'Arbitrum', symbol: '🔷' },
      { id: 'polygon', name: 'Polygon', symbol: '🟣' },
      { id: 'optimism', name: 'Optimism', symbol: '🔴' }
    ];

    async function loadChainHealth() {
      const grid = document.getElementById('chainsGrid');
      grid.innerHTML = '';

      for (const chain of chains) {
        const card = document.createElement('div');
        card.className = 'chain-card';

        try {
          const res = await fetch(`/api/web3/health?chain=${chain.id}`);
          const data = await res.json();

          if (data.ok) {
            card.innerHTML = createChainHTML(chain, data);
          } else {
            card.innerHTML = createDemoChainHTML(chain);
          }
        } catch (e) {
          card.innerHTML = createDemoChainHTML(chain);
        }

        grid.appendChild(card);
      }
    }

    function createChainHTML(chain, data) {
      const status = data.status || 'online';
      const statusClass = status === 'online' ? 'online' : status === 'degraded' ? 'degraded' : 'offline';

      return `
        <div class="chain-header">
          <div class="chain-name">${chain.symbol} ${chain.name}</div>
          <div class="status ${statusClass}">${status.toUpperCase()}</div>
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-value">${data.tps || '—'}</div>
            <div class="metric-label">TPS</div>
          </div>
          <div class="metric">
            <div class="metric-value">${data.block_height || '—'}</div>
            <div class="metric-label">Block Height</div>
          </div>
          <div class="metric">
            <div class="metric-value">${data.uptime || '99.9'}%</div>
            <div class="metric-label">Uptime</div>
          </div>
          <div class="metric">
            <div class="metric-value">${data.avg_block_time || '—'}s</div>
            <div class="metric-label">Avg Block Time</div>
          </div>
        </div>
      `;
    }

    function createDemoChainHTML(chain) {
      return `
        <div class="chain-header">
          <div class="chain-name">${chain.symbol} ${chain.name}</div>
          <div class="status online">ONLINE</div>
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-value">${chain.id === 'solana' ? '2,847' : '12'}</div>
            <div class="metric-label">TPS</div>
          </div>
          <div class="metric">
            <div class="metric-value">${chain.id === 'solana' ? '312,458,291' : '20,184,392'}</div>
            <div class="metric-label">Block Height</div>
          </div>
          <div class="metric">
            <div class="metric-value">99.97%</div>
            <div class="metric-label">Uptime</div>
          </div>
          <div class="metric">
            <div class="metric-value">${chain.id === 'solana' ? '0.42' : '12.1'}s</div>
            <div class="metric-label">Avg Block Time</div>
          </div>
        </div>
      `;
    }

    window.onload = loadChainHealth;
  </script>
</body>
</html>
