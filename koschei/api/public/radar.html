<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Liquidity Radar — Koschei</title><style>:root{--bg:#0f0f1b;--panel:#17172a;--text:#f5f7fb;--muted:#a7b0c2;--accent:#00ffaa;--line:rgba(255,255,255,.12);--danger:#ff5c7a;--warn:#ffd166}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 0%,rgba(0,255,170,.18),transparent 30%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}.wrap{width:min(1080px,calc(100% - 32px));margin:auto}.nav{border-bottom:1px solid var(--line);background:rgba(15,15,27,.78);backdrop-filter:blur(16px);position:sticky;top:0}.navin{display:flex;justify-content:space-between;gap:12px;padding:16px 0;flex-wrap:wrap}.nav a{color:var(--muted);text-decoration:none;font-weight:800;margin-right:12px}.brand{color:var(--text)!important}.hero{padding:54px 0 20px}.hero h1{font-size:clamp(36px,6vw,70px);letter-spacing:-.06em;line-height:.95;margin:0 0 12px}.hero p{color:var(--muted);line-height:1.7;font-size:18px}.toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:18px 0;flex-wrap:wrap}.pill{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(0,255,170,.1);color:var(--accent);font-weight:900}.list{display:grid;gap:12px;margin-bottom:52px}.alert{border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:18px;background:linear-gradient(180deg,rgba(23,23,42,.96),rgba(16,16,32,.94));padding:16px;display:grid;grid-template-columns:1fr auto;gap:12px}.alert.high{border-left-color:var(--danger)}.alert.medium{border-left-color:var(--warn)}.meta{color:var(--muted);font-size:14px;margin-top:5px}.sev{font-weight:950}.high .sev{color:var(--danger)}.medium .sev{color:var(--warn)}.low .sev{color:var(--accent)}button{border:1px solid var(--line);border-radius:14px;background:var(--accent);color:#06130f;padding:12px 16px;font:inherit;font-weight:950;cursor:pointer}@media(max-width:640px){.alert{grid-template-columns:1fr}}</style></head><body><nav class="nav"><div class="wrap navin"><a class="brand" href="/">K Koschei</a><span><a href="/">Home</a><a href="/mev-shield">MEV Shield</a><a href="/impact">Impact</a><a href="/docs">Dokümanlar</a></span></div></nav><main class="wrap"><section class="hero"><h1>Liquidity Radar</h1><p>Canlı alarm listesi; havuz likiditesi, şüpheli outflow, rug-pull paterni ve kritik anomali sinyallerini tek ekranda gösterir.</p></section><div class="toolbar"><span class="pill" id="status">● Live metrics feed unavailable</span><button id="refresh">Yenile</button></div><section class="list" id="list"></section></main><script>const esc=s=>String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));function render(items){if(!items.length){list.innerHTML='<article class="alert low"><div><strong>No live liquidity alerts found.</strong><div class="meta">Only live alerts are shown.</div></div></article>';return}list.innerHTML=items.map(a=>{const cls=(a.severity||'low').toLowerCase().includes('critical')?'high':(a.severity||'').toLowerCase().includes('high')?'high':(a.severity||'').toLowerCase().includes('medium')?'medium':'low';return `<article class="alert ${cls}"><div><strong>${esc(a.token_mint||a.pool_address||'Unknown pool')}</strong><div class="meta">${esc(a.pool_address||'anonymous')} · ${new Date(a.created_at||Date.now()).toLocaleString('tr-TR')}</div></div><div><div class="sev">${esc(a.severity||'LOW')} · ${Number(a.risk_score||0)}/100</div><div class="meta">Önlenen: $${Number(a.loss_prevented_usd||0).toLocaleString('en-US')}</div></div></article>`}).join('')}async function load(){try{const r=await fetch('/api/public/metrics');if(r.ok){const d=await r.json();status.textContent='● Metrics bağlantısı aktif';render((d.recent_logs||[]).map(l=>({severity:l.risk_level,token_mint:l.source,pool_address:l.anonymized_subject,loss_prevented_usd:l.amount_usd,risk_score:l.risk_score,created_at:l.occurred_at})));return}}catch{}status.textContent='● Live metrics feed unavailable';render([])}refresh.onclick=load;load();</script></body></html>
