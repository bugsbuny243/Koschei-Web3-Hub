<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risk Scanner — Koschei Web3 Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050812;
      --surface: rgba(255,255,255,.08);
      --line: rgba(255,255,255,.16);
      --text: #f7fbff;
      --text2: #a9b8d6;
      --accent: #00ff88;
      --danger: #ff5c7c;
      --warning: #facc15;
      --success: #22c55e;
    }
    body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; margin:0; }
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 20px; padding: 32px; }
    h1 { font-size: 36px; margin-bottom: 8px; }
    .input-group { display: flex; gap: 12px; margin: 24px 0; }
    input, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--line); background: rgba(255,255,255,.06); color: var(--text); font-size: 15px; }
    button { padding: 14px 28px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), #00ccff); color: #04110b; font-weight: 700; border: none; cursor: pointer; }
    .result { margin-top: 32px; display: none; }
    .result.show { display: block; }
    .risk-badge { padding: 6px 16px; border-radius: 999px; font-size: 14px; font-weight: 700; display: inline-block; }
    .risk-low { background: rgba(34,197,94,.15); color: #22c55e; }
    .risk-medium { background: rgba(250,204,21,.15); color: #facc15; }
    .risk-high { background: rgba(239,68,68,.15); color: #ef4444; }
    .section { margin-top: 24px; }
    ul { padding-left: 20px; color: var(--text2); line-height: 1.7; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Risk Scanner</h1>
    <p style="color:var(--text2); max-width:620px;">
      Analyze any project, wallet, or smart contract for on-chain risk signals.
    </p>

    <div class="card">
      <div>
        <label style="font-weight:600; font-size:14px;">Target (Project name, Wallet, or Contract)</label>
        <input type="text" id="target" placeholder="Enter project, wallet address, or contract...">
      </div>
      <div style="margin-top:16px;">
        <label style="font-weight:600; font-size:14px;">Additional Notes (optional)</label>
        <textarea id="notes" rows="3" placeholder="Any context or specific concerns..."></textarea>
      </div>
      <div style="margin-top:20px;">
        <button onclick="runRiskScan()">Scan for Risks</button>
      </div>
    </div>

    <div id="result" class="result card">
      <div style="display:flex; align-items:center; gap:12px;">
        <h3 style="margin:0;">Risk Assessment</h3>
        <span id="riskBadge" class="risk-badge"></span>
      </div>

      <div class="section">
        <h4>Key Findings</h4>
        <ul id="findings"></ul>
      </div>

      <div class="section">
        <h4>Recommended Actions</h4>
        <ul id="recommendations"></ul>
      </div>

      <div style="margin-top:20px; font-size:13px; color:var(--text2);" id="disclaimer"></div>
    </div>
  </div>

  <script src="/js/koschei-auth.js"></script>
  <script>
    async function runRiskScan() {
      const target = document.getElementById('target').value.trim();
      const notes = document.getElementById('notes').value.trim();

      if (!target) {
        alert('Please enter a target');
        return;
      }

      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';

      document.getElementById('findings').innerHTML = '<li>Analyzing on-chain signals...</li>';
      document.getElementById('recommendations').innerHTML = '';

      try {
        const res = await KoscheiAuth.apiCall('/api/risk/scan', {
          method: 'POST',
          body: JSON.stringify({ target, notes })
        });

        if (res.ok) {
          const data = await res.json();
          renderRiskResult(data);
        } else {
          renderDemoRiskResult(target);
        }
      } catch (e) {
        renderDemoRiskResult(target);
      }
    }

    function renderRiskResult(data) {
      const badge = document.getElementById('riskBadge');
      const risk = (data.risk_level || 'medium').toLowerCase();
      let badgeClass = 'risk-medium';

      if (risk.includes('low') || risk.includes('safe')) badgeClass = 'risk-low';
      if (risk.includes('high') || risk.includes('danger')) badgeClass = 'risk-high';

      badge.className = `risk-badge ${badgeClass}`;
      badge.textContent = (data.risk_level || 'MEDIUM').toUpperCase();

      // Findings
      const findingsEl = document.getElementById('findings');
      findingsEl.innerHTML = '';
      (data.checklist || data.findings || []).forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        findingsEl.appendChild(li);
      });

      // Recommendations
      const recEl = document.getElementById('recommendations');
      recEl.innerHTML = '';
      (data.recommended_fixes || data.recommendations || []).forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        recEl.appendChild(li);
      });

      document.getElementById('disclaimer').textContent = data.disclaimer || 'This is informational only.';
    }

    function renderDemoRiskResult(target) {
      const badge = document.getElementById('riskBadge');
      badge.className = 'risk-badge risk-medium';
      badge.textContent = 'MEDIUM RISK';

      document.getElementById('findings').innerHTML = `
        <li>Verify the official project source and target address independently.</li>
        <li>Review contract permissions and upgrade controls.</li>
        <li>Check for concentrated holdings or recent large transfers.</li>
      `;

      document.getElementById('recommendations').innerHTML = `
        <li>Use trusted explorers before interacting.</li>
        <li>Revoke unnecessary approvals.</li>
        <li>Start with small test transactions.</li>
      `;

      document.getElementById('disclaimer').textContent = 'This is informational only, not financial or security advice.';
    }

    document.getElementById('target').addEventListener('keypress', e => {
      if (e.key === 'Enter') runRiskScan();
    });
  </script>
</body>
</html>
