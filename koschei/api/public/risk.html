<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risk Scanner — Koschei Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050812;
      --surface: rgba(255,255,255,.08);
      --line: rgba(255,255,255,.16);
      --text: #f7fbff;
      --text2: #a9b8d6;
      --accent: #00ff88;
      --accent2: #69d8ff;
      --danger: #ff5c7c;
    }
    * { box-sizing: border-box; }
    body {
      background: radial-gradient(circle at top left, rgba(0,255,136,.16), transparent 34%), var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      margin: 0;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .nav a {
      color: var(--text2);
      text-decoration: none;
      font-weight: 700;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      margin-top: 18px;
    }
    h1 {
      font-size: 42px;
      margin: 0 0 10px;
    }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #04110b;
      font-size: 12px;
      font-weight: 900;
      padding: 5px 12px;
      border-radius: 999px;
      margin-left: 10px;
    }
    .sub {
      color: var(--text2);
      max-width: 760px;
      line-height: 1.7;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    label {
      font-weight: 800;
      font-size: 14px;
    }
    input, textarea, select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font: inherit;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    button {
      padding: 14px 24px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #04110b;
      font-weight: 900;
      border: 0;
      cursor: pointer;
      width: 100%;
      font-size: 15px;
    }
    button:disabled {
      opacity: .6;
      cursor: wait;
    }
    .alert {
      display: none;
      padding: 14px 16px;
      border-radius: 12px;
      margin-top: 16px;
      font-weight: 600;
    }
    .alert.show { display: block; }
    .alert.error {
      background: rgba(255,92,124,.12);
      border: 1px solid rgba(255,92,124,.5);
      color: #ffd6de;
    }
    .alert.credit {
      background: rgba(250,204,21,.12);
      border: 1px solid rgba(250,204,21,.5);
      color: #fff0aa;
    }
    .result {
      white-space: pre-wrap;
      overflow: auto;
      background: rgba(0,0,0,.25);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      max-height: 620px;
      color: #dce8ff;
      font-family: monospace;
      font-size: 13px;
      margin-top: 16px;
    }
    .notice {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
      margin-top: 8px;
    }
    .credit-box {
      background: rgba(0,255,136,.08);
      border: 1px solid rgba(0,255,136,.3);
      border-radius: 12px;
      padding: 16px;
      margin-top: 24px;
      font-size: 14px;
    }
    .credit-box strong {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="container">
    <nav class="nav">
      <a href="/hub">← Koschei Hub</a>
      <div>
        <a href="/pricing">Buy Credits</a> · <a href="/account">Account</a>
      </div>
    </nav>

    <header>
      <h1>Risk Scanner <span class="badge">PRO</span></h1>
      <p class="sub">
        Analyze any wallet, token, contract or project for on-chain risk signals and get actionable recommendations.
      </p>
      <p class="notice">
        Production mode • Real RPC data • No demo or fabricated results. Requires authentication and credits.
      </p>
    </header>

    <section class="card">
      <form id="toolForm">
        <div class="field">
          <label for="target">Target (Wallet / Token / Contract / Project)</label>
          <input id="target" name="target" type="text" placeholder="Enter wallet, token mint, contract or project name" required>
