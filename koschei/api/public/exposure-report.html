<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Koschei ARVIS Exposure Report</title>
<style>
:root{--bg:#02070d;--panel:#07131c;--line:#24eaff33;--text:#f4fbff;--muted:#9aabb8;--green:#18ffb2;--cyan:#24eaff;--red:#ff4d6d;--amber:#ffcc66;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 10% 0,#18ffb21f,transparent 30%),linear-gradient(135deg,#020409,#071522 62%,#02040a);color:var(--text);font-family:Inter,system-ui,sans-serif}.wrap{width:min(1040px,calc(100% - 24px));margin:auto;padding:18px 0 64px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}.brand{display:flex;gap:10px;align-items:center}.logo{width:46px;height:46px;border:1px solid #18ffb270;border-radius:15px;display:grid;place-items:center;color:var(--green);font-weight:1000;background:#06131c}.eyebrow{font:900 11px var(--mono);letter-spacing:.14em;color:#8fffe5;text-transform:uppercase}.btn{border:1px solid var(--line);border-radius:14px;padding:10px 13px;background:#ffffff0c;color:var(--text);font-weight:900;cursor:pointer;text-decoration:none}.btn.primary{border:0;background:linear-gradient(135deg,var(--green),var(--cyan));color:#02100d}.hero,.card{border:1px solid var(--line);background:linear-gradient(145deg,#081722f2,#04090ff2);border-radius:24px;box-shadow:0 24px 80px #0008}.hero{padding:22px;margin-bottom:14px}.hero h1{font-size:clamp(34px,6vw,66px);line-height:.95;letter-spacing:-.055em;margin:7px 0}.hero p{margin:0;color:#c9d8e2;line-height:1.55}.form{display:grid;grid-template-columns:1fr 150px;gap:10px;margin-top:18px}.form input{border:1px solid #24eaff35;background:#02070d;color:var(--text);border-radius:16px;padding:16px 17px;outline:none;font-family:var(--mono)}.notice{display:none;margin:0 0 14px;padding:13px;border-radius:16px;border:1px solid #ffcc6650;background:#ffcc6612;color:#ffe6ae}.notice.show{display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{padding:16px}.card h2{margin:0 0 10px}.metric{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px 0;border-top:1px solid #ffffff12}.metric:first-of-type{border-top:0}.metric span{color:var(--muted)}.pill{border:1px solid #24eaff3c;border-radius:999px;padding:7px 10px;font:900 11px var(--mono);display:inline-flex;gap:6px;align-items:center}.pill.good{color:#bfffe9;border-color:#18ffb24d;background:#18ffb214}.pill.bad{color:#ffcbd4;border-color:#ff4d6d52;background:#ff4d6d18}.verdict{display:grid;grid-template-columns:130px 1fr;gap:16px;align-items:center}.grade{width:122px;height:122px;border-radius:26px;border:1px solid #24eaff50;background:#02070d;display:grid;place-items:center;text-align:center}.grade b{font-size:48px}.grade small{display:block;color:#8fffe5;font:900 10px var(--mono)}.section{margin-top:12px}.section-title{font:900 11px var(--mono);letter-spacing:.11em;text-transform:uppercase;color:#8fffe5;margin:0 0 8px}.list{margin:0;padding-left:20px;color:#dbe9ef;line-height:1.6}.muted{color:var(--muted)}pre{white-space:pre-wrap;word-break:break-word;background:#02070d;border:1px solid #ffffff12;border-radius:16px;padding:14px;color:#dbe9ef}.split{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.chip{border:1px solid #ffffff12;border-radius:14px;background:#ffffff08;padding:11px}.chip span{display:block;color:#8fa5b3;font:900 10px var(--mono);text-transform:uppercase}.chip b{display:block;margin-top:4px;font-size:18px}@media(max-width:800px){.grid,.form,.verdict,.split{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<main class="wrap">
<header class="top"><a class="brand" href="/security-radar"><span class="logo">A</span><span><span class="eyebrow">KOSCHEI ARVIS</span><br><b>Exposure Report</b></span></a><a class="btn" href="/security-radar">Radar</a></header>
<section class="hero"><div class="eyebrow">Evidence-backed on-chain report</div><h1>Signed Exposure Report</h1><p>Mint, cüzdan veya havuz adresini gir. ARVIS kanıt bulursa authority, holder concentration, wallet-cluster durumu ve paylaşılabilir özet üretir. Kanıt yoksa suçlama yok.</p><div class="form"><input id="target" placeholder="Solana mint / wallet / pool"><button id="run" class="btn primary">Raporla</button></div></section>
<div id="notice" class="notice"></div>
<section id="out" class="grid"></section>
</main>
<script src="/js/koschei-auth.js?v=32"></script>
<script>
(async()=>{
if(window.KoscheiAuth){await KoscheiAuth.init();if(!KoscheiAuth.requireAuth('/login.html'))return}
const $=id=>document.getElementById(id),out=$('out'),target=$('target'),notice=$('notice'),run=$('run');
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const jwt=()=>{try{return KoscheiAuth?.getJwt?.()||localStorage.getItem('koschei_jwt')||localStorage.getItem('koschei_token')||''}catch{return''}};
const show=(m)=>{notice.textContent=m;notice.className='notice show'};
const clear=()=>{notice.className='notice';notice.textContent=''};
const val=(obj,path)=>path.split('.').reduce((a,k)=>a&&a[k],obj);
async function api(path){const h=new Headers();const t=jwt();if(t)h.set('Authorization','Bearer '+t);const res=await fetch(path,{credentials:'include',headers:h});let data={};try{data=await res.json()}catch{}return{res,data}}
function sectionCard(title,sec){sec=sec||{};const sig=sec.signals||{};const items=Object.keys(sig).map(k=>`<div class="metric"><span>${esc(k)}</span><b>${esc(sig[k])}</b></div>`).join('')||'<p class="muted">Bu bölüm için doğrulanmış sinyal yok.</p>';const ev=(sec.evidence||[]).slice(0,5).map(x=>`<li>${esc(x)}</li>`).join('');return`<article class="card"><h2>${esc(title)}</h2><span class="pill ${sec.verified?'good':'bad'}">${sec.verified?'verified':'not confirmed'}</span><div class="section"><div class="section-title">signals</div>${items}</div>${ev?`<div class="section"><div class="section-title">evidence</div><ul class="list">${ev}</ul></div>`:''}</article>`}
function render(data){const r=data.report||{},v=r.verdict||{},s=r.summary||{},sections=r.sections||{},share=r.shareable_summary||{};const lines=(share.lines||[]).join('\n');out.innerHTML=`<article class="card" style="grid-column:1/-1"><div class="verdict"><div class="grade"><div><b>${esc(v.grade||'—')}</b><small>${esc(v.risk_index||0)}/100</small></div></div><div><div class="eyebrow">${esc(r.schema_version||'report')}</div><h2>${esc(r.target||'Target')}</h2><p class="muted">${esc(v.recommendation||'Evidence-backed ARVIS decision.')}</p><div class="split"><div class="chip"><span>Verified arms</span><b>${esc(s.verified_arm_count||0)}</b></div><div class="chip"><span>Max risk</span><b>${esc(s.max_risk_index||0)}</b></div><div class="chip"><span>Cluster</span><b>${esc(val(sections,'wallet_cluster.status')||'not_confirmed')}</b></div></div></div></div></article>`+
sectionCard('Authority Status',sections.authority)+sectionCard('Holder Concentration',sections.holder_concentration)+sectionCard('Wallet Cluster',sections.wallet_cluster)+sectionCard('Sniper Timing',sections.sniper_timing)+sectionCard('Program Relation',sections.program_relation)+sectionCard('Liquidity / Exit Risk',sections.liquidity)+`<article class="card" style="grid-column:1/-1"><h2>Shareable Summary</h2><pre>${esc(lines)}\n\n${esc((share.hashtags||[]).join(' '))}</pre><button class="btn primary" id="copy">Kopyala</button></article><article class="card" style="grid-column:1/-1"><h2>Evidence Policy</h2><p class="muted">${esc(r.disclaimer||'Evidence-first.')}</p><pre>${esc(JSON.stringify(r.evidence_policy||{},null,2))}</pre><div class="section-title">Signature</div><pre>${esc(r.signature||'')}</pre></article>`;const copy=$('copy');if(copy)copy.onclick=()=>navigator.clipboard?.writeText(lines+'\n\n'+(share.hashtags||[]).join(' '))}
async function runReport(){clear();const q=target.value.trim()||new URLSearchParams(location.search).get('target')||'';if(!q){show('Bir hedef adres gir.');return}target.value=q;run.disabled=true;out.innerHTML='<article class="card" style="grid-column:1/-1">ARVIS rapor üretiyor…</article>';try{const{res,data}=await api('/api/v1/radar/exposure?target='+encodeURIComponent(q));if(!res.ok){show(data.message||data.error||'Rapor üretilemedi.');out.innerHTML='';return}render(data)}catch(e){show('ARVIS yanıtı alınamadı.')}finally{run.disabled=false}}
run.onclick=runReport;if(new URLSearchParams(location.search).get('target'))runReport();
})();
</script>
</body>
</html>
