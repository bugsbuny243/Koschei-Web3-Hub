<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Koschei ARVIS Structural Exposure Report</title><style>:root{--line:#24eaff33;--text:#f4fbff;--muted:#9aabb8;--green:#18ffb2;--cyan:#24eaff;--red:#ff4d6d;--amber:#ffcc66;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 10% 0,#18ffb21f,transparent 30%),linear-gradient(135deg,#020409,#071522 62%,#02040a);color:var(--text);font-family:Inter,system-ui,sans-serif}.wrap{width:min(1040px,calc(100% - 24px));margin:auto;padding:18px 0 64px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.brand,.btn{color:inherit;text-decoration:none;font-weight:900}.btn{border:1px solid var(--line);border-radius:14px;padding:10px 13px;background:#ffffff0c}.btn.primary{border:0;background:linear-gradient(135deg,var(--green),var(--cyan));color:#02100d}.hero,.card{border:1px solid var(--line);background:linear-gradient(145deg,#081722f2,#04090ff2);border-radius:24px;box-shadow:0 24px 80px #0008}.hero{padding:22px;margin:14px 0}.eyebrow{font:900 11px var(--mono);letter-spacing:.14em;color:#8fffe5;text-transform:uppercase}.hero h1{font-size:clamp(34px,6vw,66px);line-height:.95;letter-spacing:-.055em;margin:7px 0}.muted{color:var(--muted);line-height:1.55}.form{display:grid;grid-template-columns:1fr 150px;gap:10px;margin-top:18px}.form input{border:1px solid #24eaff35;background:#02070d;color:var(--text);border-radius:16px;padding:16px 17px;font-family:var(--mono)}.notice{display:none;margin-bottom:14px;padding:13px;border-radius:16px;border:1px solid #ffcc6650;background:#ffcc6612;color:#ffe6ae}.notice.show{display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{padding:16px}.metric{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px 0;border-top:1px solid #ffffff12}.metric span{color:var(--muted)}.pill{border:1px solid #24eaff3c;border-radius:999px;padding:7px 10px;font:900 11px var(--mono);display:inline-flex;margin:4px}.pill.good{color:#bfffe9;border-color:#18ffb24d}.pill.bad{color:#ffcbd4;border-color:#ff4d6d52}.pill.warn{color:#ffe6ae;border-color:#ffcc6650}.verdict{display:grid;grid-template-columns:130px 1fr;gap:16px}.grade{width:122px;height:122px;border-radius:26px;border:1px solid #24eaff50;background:#02070d;display:grid;place-items:center;text-align:center}.grade b{font-size:48px}.list{padding-left:20px;color:#dbe9ef;line-height:1.6}pre{white-space:pre-wrap;word-break:break-word;background:#02070d;border:1px solid #ffffff12;border-radius:16px;padding:14px}@media(max-width:800px){.grid,.form,.verdict{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><main class="wrap"><header class="top"><a class="brand" href="/security-radar">KOSCHEI ARVIS · Exposure</a><div><a class="btn" href="/security-radar">Radar</a> <a class="btn" href="/kosch-access">KOSCH Access</a></div></header><section class="hero"><div class="eyebrow">KOSCH holder · structural evidence report</div><h1>Signed Exposure Report</h1><p class="muted">Rapor final kararı, 13 kanıt kolunu ve uygulanmışsa yedi günlük holder/authority yapısal tabanını aynı belgede gösterir.</p><div class="form"><input id="target" placeholder="Solana mint / wallet / pool"><button id="run" class="btn primary">Raporla</button></div></section><div id="notice" class="notice"></div><section id="out" class="grid"></section></main><script src="/js/koschei-auth.js?v=33"></script><script>(async()=>{await KoscheiAuth.init();if(!KoscheiAuth.requireAuth('/login'))return;const $=id=>document.getElementById(id),out=$('out'),target=$('target'),notice=$('notice'),run=$('run'),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const show=m=>{notice.textContent=m;notice.className='notice show'};async function api(path){const r=await KoscheiAuth.apiCall(path);const d=await r.json().catch(()=>({}));return{r,d}}function sec(title,x={}){const sig=x.signals||{},metrics=Object.entries(sig).slice(0,10).map(([k,v])=>`<div class="metric"><span>${esc(k)}</span><b>${esc(v)}</b></div>`).join('')||'<p class="muted">Doğrulanmış sinyal yok.</p>',ev=(x.evidence||[]).slice(0,6).map(v=>`<li>${esc(v)}</li>`).join('');return`<article class="card"><h2>${esc(title)}</h2><span class="pill ${x.verified?'good':'bad'}">${x.verified?'verified':'not confirmed'}</span>${metrics}${ev?`<ul class="list">${ev}</ul>`:''}</article>`}function render(d){const r=d.report||{},v=r.verdict||{},s=r.summary||{},sections=r.sections||{},signals=v.signals||r.signals||{},floor=signals.structural_floor||s.structural_floor||0,original=signals.structural_floor_original_risk_index;out.innerHTML=`<article class="card" style="grid-column:1/-1"><div class="verdict"><div class="grade"><div><b>${esc(v.grade||'—')}</b><small>${esc(v.risk_index||0)}/100</small></div></div><div><div class="eyebrow">${esc(r.schema_version||'signed report')}</div><h2>${esc(r.target||'Target')}</h2><p class="muted">${esc(v.recommendation||'Evidence-backed ARVIS decision.')}</p><span class="pill good">KOSCH holder report</span><span class="pill">${esc(s.verified_arm_count||0)} verified arms</span>${floor?`<span class="pill warn">Structural floor ${esc(floor)}/100</span>`:''}${original!==undefined?`<span class="pill">Observed event ${esc(original)}/100</span>`:''}</div></div></article>`+sec('Authority Status',sections.authority)+sec('Holder Concentration',sections.holder_concentration)+sec('Wallet Cluster',sections.wallet_cluster)+sec('Token-2022 Extensions',sections.token_2022_extensions)+sec('Sniper Timing',sections.sniper_timing)+sec('Program Relation',sections.program_relation)+sec('Liquidity / Exit Risk',sections.liquidity)+`<article class="card" style="grid-column:1/-1"><h2>Signature & Evidence Policy</h2><pre>${esc(JSON.stringify({signature:r.signature,evidence_policy:r.evidence_policy,structural_observed_at:signals.structural_observed_at},null,2))}</pre></article>`}run.onclick=async()=>{notice.className='notice';const q=target.value.trim()||new URLSearchParams(location.search).get('target')||'';if(!q){show('Bir hedef gir.');return}target.value=q;run.disabled=true;try{const{r,d}=await api('/api/v1/radar/exposure?target='+encodeURIComponent(q));if(!r.ok){show([402,403].includes(r.status)?'Doğrulanmış KOSCH holder access gerekli.':(d.message||d.error||'Rapor üretilemedi.'));out.innerHTML='';return}render(d)}catch{show('ARVIS yanıtı alınamadı.')}finally{run.disabled=false}};if(new URLSearchParams(location.search).get('target'))run.onclick()})();</script></body></html>
