<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>KOSCHEİ WEB3 · Paddle Checkout</title>
<style>
:root{--bg:#02070d;--panel:#07131c;--line:#24eaff35;--text:#f4fbff;--muted:#9aabb8;--green:#18ffb2;--cyan:#24eaff;--red:#ff4d6d}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;color:var(--text);font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at 15% 0,#18ffb21f,transparent 30%),radial-gradient(circle at 90% 8%,#24eaff18,transparent 28%),linear-gradient(135deg,#020409,#071522 58%,#02040a)}.card{width:min(620px,100%);padding:26px;border:1px solid var(--line);border-radius:26px;background:linear-gradient(145deg,#081722f4,#04090ff4);box-shadow:0 28px 100px #000b;text-align:center}.logo{width:54px;height:54px;margin:auto;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,var(--green),var(--cyan));color:#02100d;font-weight:1000;font-size:24px}h1{margin:18px 0 8px;font-size:clamp(30px,7vw,48px);letter-spacing:-.05em}.muted{color:var(--muted);line-height:1.6}.state{margin-top:18px;padding:14px;border:1px solid var(--line);border-radius:16px;background:#ffffff08}.bad{color:#ffdce3;border-color:#ff4d6d55;background:#ff4d6d12}.actions{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:18px}.btn{min-height:42px;padding:0 15px;border:1px solid var(--line);border-radius:13px;color:var(--text);background:#ffffff0b;text-decoration:none;font-weight:900;display:inline-flex;align-items:center}.btn.primary{border:0;background:linear-gradient(135deg,var(--green),var(--cyan));color:#02100d}
</style>
<script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
</head>
<body>
<main class="card"><div class="logo">K</div><h1>Güvenli ödeme</h1><p class="muted">Paddle, KOSCHEİ WEB3 ödemesini güvenli biçimde işler. Paketiniz doğrulanmış webhook sonrası otomatik aktive edilir.</p><div class="state" id="state">Paddle checkout hazırlanıyor…</div><div class="actions"><a class="btn" href="/pricing">Paketlere dön</a><a class="btn primary" href="/dashboard">Dashboard</a></div></main>
<script src="/js/paddle-checkout.js?v=1"></script>
</body></html>
