<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/css/koschei.css"><title>Smart Money — Koschei</title><style>.hero{padding:32px;background:linear-gradient(135deg,#111118,#13231d);border:1px solid #2a2a3a;border-radius:16px;margin-bottom:20px}pre{white-space:pre-wrap;overflow:auto;color:#c7f9df}.notice{color:var(--text2);font-size:13px}</style></head>
<body><nav class="nav"><a class="nav-logo" href="/hub">K Koschei</a><div class="nav-links"><a class="nav-link" href="/hub">Hub</a><a class="nav-link" href="/docs">Docs</a><a class="nav-link" href="/account">Account</a></div></nav><main class="page"><section class="hero"><span class="badge badge-green">🐋 Solana intelligence</span><h1>Smart Money</h1><p>Review a read-only watchlist of notable public Solana accounts and independently verify their labels.</p></section><section class="card"><button class="btn btn-primary" id="load">Load watchlist</button><p class="notice" style="margin-top:12px">Public addresses only. Labels are informational and should be independently verified.</p></section><section class="card" style="margin-top:20px"><h2>Watchlist</h2><pre id="out">Load the watchlist to begin.</pre></section></main><script src="/js/koschei-auth.js?v=4"></script><script>(async()=>{await KoscheiAuth.init();if(!KoscheiAuth.requireAuth('/login'))return;load.onclick=async()=>{out.textContent='Loading watchlist…';try{let r=await KoscheiAuth.apiCall('/api/smart-money');let data=await r.json();out.textContent=JSON.stringify(data,null,2)}catch(err){out.textContent=JSON.stringify({error:err.message||'Request failed'},null,2)}}})()</script></body></html>
