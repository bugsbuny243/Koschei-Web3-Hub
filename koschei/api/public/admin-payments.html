<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin payments — Koschei</title><link rel="stylesheet" href="/css/koschei.css">
  <style>
    .admin-login{max-width:420px}.requests{display:flex;flex-direction:column;gap:12px}.request{display:grid;grid-template-columns:1fr auto;gap:14px}.request-meta{color:var(--text2);font-size:13px}.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.hidden{display:none}@media(max-width:700px){.request{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav class="nav"><a href="/hub" class="nav-logo">K <span style="color:var(--text);font-weight:500;font-size:15px;">Koschei</span></a><span class="nav-link active">Payment admin</span></nav>
<main class="page">
  <div class="page-title">Payment requests</div><div class="page-sub">Review reported Shopier payments and grant paid output packs.</div>
  <div class="alert" id="message"></div>
  <section class="card admin-login" id="loginBox"><form id="loginForm" style="display:flex;flex-direction:column;gap:14px"><div class="form-group"><label class="form-label" for="password">Admin password</label><input class="form-input" id="password" type="password" required autocomplete="current-password"></div><button class="btn btn-primary" type="submit">Open admin payments</button></form></section>
  <section class="hidden" id="requestsBox"><div style="display:flex;justify-content:space-between;gap:12px;margin-bottom:14px"><h2 style="margin:0">Latest requests</h2><button class="btn btn-ghost" type="button" onclick="loadRequests()">Refresh</button></div><div class="requests" id="requests"></div></section>
</main>
<script>
  const storageKey = 'koschei_admin_password'; const message = document.getElementById('message');
  function escapeHTML(value) { const node = document.createElement('span'); node.textContent = value ?? ''; return node.innerHTML; }
  function showMessage(text, kind) { message.textContent = text; message.className = `alert alert-${kind} show`; }
  function password() { return sessionStorage.getItem(storageKey) || ''; }
  async function adminCall(path, options = {}) { const headers = { ...(options.headers || {}), 'x-admin-password': password() }; if (options.body) headers['Content-Type'] = 'application/json'; return fetch(path, { ...options, headers }); }
  async function loadRequests() {
    try { const res = await adminCall('/api/admin/payment-requests'); const data = await res.json(); if (!res.ok) throw new Error(data.error || 'Could not load payment requests'); document.getElementById('loginBox').classList.add('hidden'); document.getElementById('requestsBox').classList.remove('hidden'); renderRequests(data.payment_requests || []); }
    catch (error) { showMessage(error.message, 'error'); document.getElementById('loginBox').classList.remove('hidden'); document.getElementById('requestsBox').classList.add('hidden'); }
  }
  function renderRequests(requests) { const root = document.getElementById('requests'); if (!requests.length) { root.innerHTML = '<div class="card">No payment requests found.</div>'; return; } root.innerHTML = requests.map((request) => `<article class="card request"><div><strong>${escapeHTML(request.full_name)}</strong><div>${escapeHTML(request.email)}</div><div class="request-meta">${escapeHTML(request.product_id)} · ${escapeHTML(request.amount_try)} ${escapeHTML(request.currency)} · ${escapeHTML(request.status)} · ${escapeHTML(new Date(request.created_at).toLocaleString())}</div><div class="request-meta">Reference: ${escapeHTML(request.raw_payload?.payment_reference || '—')} · Note: ${escapeHTML(request.raw_payload?.note || '—')}${request.raw_payload?.reason ? ` · Reason: ${escapeHTML(request.raw_payload.reason)}` : ''}</div></div>${request.status === 'pending' ? `<div class="actions"><button class="btn btn-primary" onclick="review('${escapeHTML(request.id)}','approve')">Approve</button><button class="btn btn-ghost" onclick="review('${escapeHTML(request.id)}','reject')">Reject</button></div>` : ''}</article>`).join(''); }
  async function review(id, action) { const reason = action === 'reject' ? (prompt('Rejection reason (optional):') ?? '') : ''; try { const res = await adminCall(`/api/admin/payment-requests/${action}`, { method: 'POST', body: JSON.stringify({ payment_request_id: id, reason }) }); const data = await res.json(); if (!res.ok) throw new Error(data.error || `Could not ${action} payment request`); showMessage(`Payment request ${data.status}.`, 'success'); await loadRequests(); } catch (error) { showMessage(error.message, 'error'); } }
  document.getElementById('loginForm').addEventListener('submit', async (event) => { event.preventDefault(); sessionStorage.setItem(storageKey, document.getElementById('password').value); await loadRequests(); });
  if (password()) loadRequests();
</script>
</body>
</html>
