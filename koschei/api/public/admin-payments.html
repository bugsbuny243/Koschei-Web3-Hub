<!DOCTYPE html>
<html lang="en">
<head>
  <!-- AdSense verification -->
  <meta name="google-adsense-account" content="ca-pub-6001394144742471">

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6001394144742471"
     crossorigin="anonymous"></script>

  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin payments — Koschei</title><link rel="stylesheet" href="/css/koschei.css">
  <style>
    .admin-login{max-width:420px}.requests{display:flex;flex-direction:column;gap:12px}.request{display:grid;grid-template-columns:1fr auto;gap:14px}.request-meta{color:var(--text2);font-size:13px}.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.hidden{display:none}@media(max-width:700px){.request{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav class="nav"><a href="/admin" class="nav-logo">K <span style="color:var(--text);font-weight:500;font-size:15px;">Koschei Admin</span></a><span class="nav-link active">Payment admin</span><button class="btn btn-ghost hidden" id="refreshAll" type="button">Refresh all</button><button class="btn btn-ghost hidden" id="lockAdmin" type="button">Lock admin panel</button></nav>
<main class="page">
  <div class="page-title">Payment requests</div><div class="page-sub">Review reported Shopier payments and grant paid output packs.</div>
  <div class="alert" id="message"></div>
  <section class="card admin-login" id="loginBox"><form id="loginForm" style="display:flex;flex-direction:column;gap:14px"><div class="form-group"><label class="form-label" for="password">Admin password</label><input class="form-input" id="password" type="password" required autocomplete="current-password"></div><button class="btn btn-primary" type="submit">Open admin payments</button></form></section>
  <section class="hidden" id="requestsBox"><div style="display:flex;justify-content:space-between;gap:12px;margin-bottom:14px"><h2 style="margin:0">Latest requests</h2><button class="btn btn-ghost" type="button" onclick="loadRequests()">Refresh</button></div><div class="requests" id="requests"></div></section>
</main>
<script src="/js/koschei-admin.js"></script>
<script>
  const message = document.getElementById('message');
  const el = id => document.getElementById(id);
  function escapeHTML(value) { const node = document.createElement('span'); node.textContent = value ?? ''; return node.innerHTML; }
  function showMessage(text, kind) { message.textContent = text; message.className = `alert alert-${kind} show`; }
  function showLocked(text='Enter admin password') { el('loginBox').classList.remove('hidden'); el('requestsBox').classList.add('hidden'); el('refreshAll').classList.add('hidden'); el('lockAdmin').classList.add('hidden'); showMessage(text,'info'); }
  function showUnlocked() { el('loginBox').classList.add('hidden'); el('requestsBox').classList.remove('hidden'); el('refreshAll').classList.remove('hidden'); el('lockAdmin').classList.remove('hidden'); message.className='alert'; }
  function handleError(error) { if(error.code==='ADMIN_LOCKED'){showLocked();return;} if(error.message.startsWith('Unauthorized:')){lockAdmin();showLocked(error.message);return;} showMessage(error.message,'error'); }
  async function responseData(res, fallback) { const data=await res.json().catch(()=>({})); if(res.status===401) throw new Error('Unauthorized: admin password rejected.'); if(!res.ok) throw new Error(data.error||fallback); return data; }
  async function loadRequests() { const data=await responseData(await adminFetch('/api/admin/payment-requests'),'Could not load payment requests'); renderRequests(data.payment_requests||[]); showUnlocked(); }
  function renderRequests(requests) { const root = el('requests'); if (!requests.length) { root.innerHTML = '<div class="card">No payment requests found.</div>'; return; } root.innerHTML = requests.map((request) => `<article class="card request"><div><strong>${escapeHTML(request.full_name)}</strong><div>${escapeHTML(request.email)}</div><div class="request-meta">${escapeHTML(request.product_id)} · ${escapeHTML(request.amount_try)} ${escapeHTML(request.currency)} · ${escapeHTML(request.status)} · ${escapeHTML(new Date(request.created_at).toLocaleString())}</div><div class="request-meta">Reference: ${escapeHTML(request.raw_payload?.payment_reference || '—')} · Note: ${escapeHTML(request.raw_payload?.note || '—')}${request.raw_payload?.reason ? ` · Reason: ${escapeHTML(request.raw_payload.reason)}` : ''}</div></div>${request.status === 'pending' ? `<div class="actions"><button class="btn btn-primary" onclick="review('${escapeHTML(request.id)}','approve')">Approve</button><button class="btn btn-ghost" onclick="review('${escapeHTML(request.id)}','reject')">Reject</button></div>` : ''}</article>`).join(''); }
  async function review(id, action) { const reason = action === 'reject' ? (prompt('Rejection reason (optional):') ?? '') : ''; try { const data=await responseData(await adminFetch(`/api/admin/payment-requests/${action}`, {method:'POST',body:JSON.stringify({payment_request_id:id,reason})}),`Could not ${action} payment request`); showMessage(`Payment request ${data.status}.`,'success'); await loadRequests(); } catch(error){handleError(error);} }
  el('loginForm').addEventListener('submit',async event=>{event.preventDefault();try{unlockAdmin(el('password').value);await loadRequests();}catch(error){handleError(error);}});
  el('refreshAll').addEventListener('click',()=>loadRequests().then(()=>showMessage('Payments refreshed.','success')).catch(handleError));
  el('lockAdmin').addEventListener('click',()=>{lockAdmin();el('password').value='';showLocked();});
  if(isAdminUnlocked())loadRequests().catch(handleError);else showLocked();
</script>
</body>
</html>
