<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Koschei müşteri rapor geçmişi: yalnızca kullanıcının kendi gerçek birleşik analiz raporları.">
  <title>Reports — Koschei</title>
  <link rel="stylesheet" href="/css/koschei.css">
  <style>
    *{box-sizing:border-box}body{min-height:100vh;margin:0;color:#eefbff;background:radial-gradient(circle at 12% 10%,rgba(0,255,157,.16),transparent 30%),radial-gradient(circle at 88% 12%,rgba(104,232,255,.14),transparent 30%),linear-gradient(145deg,#020510,#071327 58%,#020510);font-family:Inter,system-ui,sans-serif}.shell{width:min(1040px,calc(100% - 28px));margin:0 auto;padding:18px 0 56px}.nav{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:22px;padding:12px 14px;border:1px solid rgba(112,240,255,.18);border-radius:24px;background:rgba(3,10,24,.72);backdrop-filter:blur(20px)}.brand{display:inline-flex;align-items:center;gap:10px;font-weight:950;letter-spacing:.06em;text-decoration:none;color:#eefbff}.brand:before{content:"K";display:grid;place-items:center;width:38px;height:38px;border-radius:14px;color:#02100b;background:linear-gradient(135deg,#00ff9d,#68e8ff)}.links{display:flex;gap:8px;flex-wrap:wrap}.links a{color:#c7d7f2;text-decoration:none;font-size:13px;font-weight:850;padding:10px 14px;border:1px solid transparent;border-radius:999px}.links a:hover,.links a.active{color:#68e8ff;border-color:rgba(104,232,255,.22);background:rgba(104,232,255,.08)}.panel{border:1px solid rgba(112,240,255,.18);border-radius:30px;background:linear-gradient(145deg,rgba(7,16,35,.82),rgba(7,16,35,.42));box-shadow:0 30px 100px rgba(0,0,0,.45);padding:clamp(24px,4vw,42px)}.eyebrow{display:inline-flex;color:#bffff0;background:rgba(0,255,157,.1);border:1px solid rgba(0,255,157,.28);padding:8px 12px;border-radius:999px;font-size:12px;font-weight:950;letter-spacing:.11em;text-transform:uppercase}h1{margin:18px 0 10px;font-size:clamp(36px,6vw,64px);line-height:.95;letter-spacing:-.055em}.sub{max-width:760px;color:#9fb0d0;line-height:1.75}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 16px;border-radius:999px;text-decoration:none;font-weight:900}.primary{color:#02120d;background:linear-gradient(135deg,#00ff9d,#68e8ff)}.list{display:grid;gap:12px;margin-top:18px}.item{border:1px solid rgba(104,232,255,.16);border-radius:20px;background:rgba(255,255,255,.045);padding:16px}.item b{display:block;font-size:17px;color:#f6ffff;overflow-wrap:anywhere}.item span{display:block;margin-top:6px;color:#9fb0d0}.empty{margin-top:18px;border:1px solid rgba(104,232,255,.16);border-radius:24px;background:rgba(255,255,255,.045);padding:22px;color:#9fb0d0}@media(max-width:640px){.nav{flex-direction:column;align-items:flex-start}.links{width:100%;display:grid;grid-template-columns:1fr 1fr}.links a{text-align:center}.panel{border-radius:22px}}
  </style>
</head>
<body>
  <div class="shell">
    <nav class="nav" aria-label="Koschei müşteri navigasyonu">
      <a class="brand" href="/dashboard">Koschei</a>
      <div class="links">
        <a href="/dashboard">Dashboard</a>
        <a href="/pricing">Packages</a>
        <a class="active" href="/reports">Reports</a>
        <a href="/account">Account</a>
      </div>
    </nav>
    <main class="panel">
      <span class="eyebrow">Rapor geçmişi</span>
      <h1>Koschei Reports</h1>
      <p class="sub">Bu sayfa yalnızca giriş yapan müşterinin kendi gerçek Koschei analiz raporlarını gösterir. Demo veya örnek rapor geçmişi gösterilmez.</p>
      <div id="reports" class="list"><div class="empty">Rapor geçmişi yükleniyor…</div></div>
      <p><a class="btn primary" href="/dashboard">Dashboard'a dön</a></p>
    </main>
  </div>
  <script src="/js/koschei-auth.js?v=4"></script>
  <script src="/js/koschei-analytics.js?v=1"></script>
  <script>
    (async()=>{const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));const node=document.getElementById('reports');await KoscheiAuth.init();if(!KoscheiAuth.requireAuth('/login'))return;try{const r=await KoscheiAuth.apiCall('/api/v1/unified/reports',{method:'GET'});const d=await r.json().catch(()=>({}));const items=d.reports||[];if(!r.ok||!d.success||!items.length){node.innerHTML='<div class="empty">Henüz gerçek analiz raporu yok.</div>';return}node.innerHTML=items.map(x=>`<article class="item"><b>${esc(x.target_type)} · ${esc(x.target_id)}</b><span>${esc(x.risk_level||'UNKNOWN')} · ${esc(x.created_at||'')}</span></article>`).join('');if(window.KoscheiAnalytics)KoscheiAnalytics.track('koschei_reports_view')}catch(e){node.innerHTML='<div class="empty">Henüz gerçek analiz raporu yok.</div>'}})();
  </script>
</body>
</html>
