<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Radar — Koschei Web3 Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050812;
      --surface: rgba(255,255,255,.08);
      --line: rgba(255,255,255,.16);
      --text: #f7fbff;
      --text2: #a9b8d6;
      --accent: #00ff88;
      --danger: #ff5c7c;
      --warning: #facc15;
      --success: #22c55e;
    }
    body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; margin:0; }
    .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 20px; padding: 28px; }
    h1 { font-size: 36px; margin-bottom: 8px; }
    .search-box { display: flex; gap: 12px; margin: 24px 0; }
    input { flex: 1; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--line); background: rgba(255,255,255,.06); color: var(--text); font-size: 15px; }
    button { padding: 14px 28px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), #00ccff); color: #04110b; font-weight: 700; border: none; cursor: pointer; }
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 32px; }
    .project-card { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; padding: 22px; transition: transform 0.2s ease; }
    .project-card:hover { transform: translateY(-4px); }
    .project-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .project-name { font-size: 20px; font-weight: 700; }
    .score { font-size: 24px; font-weight: 800; }
    .metric { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .tags { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .tag.low-risk { background: rgba(34,197,94,.15); color: #22c55e; }
    .tag.medium-risk { background: rgba(250,204,21,.15); color: #facc15; }
    .tag.high-risk { background: rgba(239,68,68,.15); color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Project Radar</h1>
    <p style="color:var(--text2); max-width:620px;">
      Discover and evaluate early-stage Solana projects using public signals, metadata quality, and opportunity scoring.
    </p>

    <div class="card">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search projects or enter keywords...">
        <button onclick="searchProjects()">Search</button>
      </div>
    </div>

    <div class="projects-grid" id="projectsGrid">
      <!-- Populated dynamically -->
    </div>
  </div>

  <script src="/js/koschei-auth.js"></script>
  <script>
    async function searchProjects() {
      const query = document.getElementById('searchInput').value.trim() || 'new projects';
      const grid = document.getElementById('projectsGrid');
      grid.innerHTML = '<p style="color:var(--text2); padding:20px;">Searching projects...</p>';

      try {
        const res = await KoscheiAuth.apiCall('/api/project/radar', {
          method: 'POST',
          body: JSON.stringify({ query })
        });

        if (res.ok) {
          const data = await res.json();
          renderProjects(data.projects || []);
        } else {
          renderDemoProjects();
        }
      } catch (e) {
        renderDemoProjects();
      }
    }

    function renderProjects(projects) {
      const grid = document.getElementById('projectsGrid');
      grid.innerHTML = '';

      if (projects.length === 0) {
        grid.innerHTML = '<p style="color:var(--text2); padding:20px;">No projects found.</p>';
        return;
      }

      projects.forEach(proj => {
        const card = document.createElement('div');
        card.className = 'project-card';

        const riskClass = proj.risk_level === 'low' ? 'low-risk' : proj.risk_level === 'high' ? 'high-risk' : 'medium-risk';

        card.innerHTML = `
          <div class="project-header">
            <div>
              <div class="project-name">${proj.name || 'Unnamed Project'}</div>
              <div class="metric">${proj.category || 'DeFi / NFT'}</div>
            </div>
            <div class="score" style="color: ${proj.opportunity_score > 70 ? '#22c55e' : '#facc15'};">${proj.opportunity_score || 65}</div>
          </div>

          <div class="metric">Metadata Quality: <strong>${proj.metadata_quality || 'Good'}</strong></div>
          <div class="metric">Risk Level: <strong>${proj.risk_level || 'Medium'}</strong></div>

          <div class="tags">
            <span class="tag ${riskClass}">${proj.risk_level || 'Medium'} Risk</span>
            ${(proj.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
          </div>

          <div style="margin-top:14px; font-size:13px; color:var(--text2);">
            ${proj.short_description || 'Early stage project with growing on-chain activity.'}
          </div>
        `;

        grid.appendChild(card);
      });
    }

    function renderDemoProjects() {
      const grid = document.getElementById('projectsGrid');
      grid.innerHTML = '';

      const demoProjects = [
        {
          name: "Jupiter Aggregator v2",
          category: "DeFi",
          opportunity_score: 82,
          metadata_quality: "Excellent",
          risk_level: "low",
          tags: ["DEX", "Aggregator"],
          short_description: "Leading Solana DEX aggregator with strong traction and clean tokenomics."
        },
        {
          name: "New NFT Launchpad",
          category: "NFT",
          opportunity_score: 67,
          metadata_quality: "Good",
          risk_level: "medium",
          tags: ["NFT", "Launchpad"],
          short_description: "Early-stage NFT platform with interesting community mechanics."
        },
        {
          name: "Meme Coin X",
          category: "Meme",
          opportunity_score: 45,
          metadata_quality: "Low",
          risk_level: "high",
          tags: ["Meme", "High Risk"],
          short_description: "High volatility meme token. Strong community but questionable fundamentals."
        }
      ];

      demoProjects.forEach(proj => {
        const card = document.createElement('div');
        card.className = 'project-card';

        const riskClass = proj.risk_level === 'low' ? 'low-risk' : proj.risk_level === 'high' ? 'high-risk' : 'medium-risk';

        card.innerHTML = `
          <div class="project-header">
            <div>
              <div class="project-name">${proj.name}</div>
              <div class="metric">${proj.category}</div>
            </div>
            <div class="score" style="color: ${proj.opportunity_score > 70 ? '#22c55e' : '#facc15'};">${proj.opportunity_score}</div>
          </div>

          <div class="metric">Metadata Quality: <strong>${proj.metadata_quality}</strong></div>
          <div class="metric">Risk Level: <strong>${proj.risk_level}</strong></div>

          <div class="tags">
            <span class="tag ${riskClass}">${proj.risk_level} Risk</span>
            ${(proj.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
          </div>

          <div style="margin-top:14px; font-size:13px; color:var(--text2);">
            ${proj.short_description}
          </div>
        `;

        grid.appendChild(card);
      });
    }

    // Load some demo projects on page load
    window.onload = () => {
      setTimeout(() => {
        renderDemoProjects();
      }, 300);
    };

    document.getElementById('searchInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') searchProjects();
    });
  </script>
</body>
</html>
