<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login — Koschei Web3 Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--accent:#00ff88;--accent2:#00ccff;--danger:#ff4466;--text:#f0f0ff;--text2:#8888aa;--bg:#030309;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .blob{position:absolute;border-radius:50%;filter:blur(90px);animation:bf 10s ease-in-out infinite;}
    .b1{width:400px;height:400px;background:rgba(0,255,136,.08);top:-80px;left:-60px;}
    .b2{width:350px;height:350px;background:rgba(124,58,237,.1);bottom:-60px;right:-40px;animation-delay:-5s;}
    @keyframes bf{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-15px)}}
    .card{position:relative;z-index:1;background:rgba(255,255,255,.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:36px 32px;width:100%;max-width:400px;margin:20px;}
    .logo{font-size:22px;font-weight:800;color:var(--accent);text-align:center;margin-bottom:6px;}
    .title{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px;}
    .sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px;line-height:1.5;}
    .btn{display:block;width:100%;padding:12px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;transition:opacity .15s;margin-top:4px;text-align:center;text-decoration:none;}
    .btn:hover{opacity:.88;}
    .alert{padding:10px 14px;border-radius:10px;font-size:13px;display:none;margin-bottom:12px;}
    .alert.show{display:block;}
    .alert-error{background:rgba(255,68,102,.12);border:1px solid var(--danger);color:var(--danger);}
    .link{text-align:center;font-size:13px;color:var(--text2);margin-top:16px;}
    .link a{color:var(--accent);text-decoration:none;}
  </style>
</head>
<body>
<div class="blobs"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="card">
  <div class="logo">K Koschei</div>
  <div class="title">Welcome Back</div>
  <div class="sub">Sign in through Neon Auth to access Koschei Web3 Hub.</div>
  <div class="alert" id="alert"></div>
  <a class="btn" href="/api/auth/neon-login">Continue with Neon Auth</a>
  <div class="link">Don't have an account? <a href="/register.html">Create one</a></div>
</div>
<script src="/js/koschei-auth.js?v=6"></script>
<script>
(async()=>{
  await KoscheiAuth.init();
  if(KoscheiAuth.isLoggedIn()) window.location.href='/hub.html';
  if(new URLSearchParams(window.location.search).get('error')==='invalid_state'){
    const alertEl=document.getElementById('alert');
    alertEl.textContent='Authentication state could not be verified. Please try again.';
    alertEl.className='alert alert-error show';
  }
})();
</script>
<!-- This page uses Neon Auth hosted UI only; no local email/password form or custom JWT is created here. -->
</body>
</html>
