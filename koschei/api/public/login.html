<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Koschei ARVIS hesabınıza Neon Auth ile giriş yapın; derin araçlar doğrulanmış KOSCH holder access gerektirir."><title>Giriş Yap — Koschei ARVIS</title><link rel="canonical" href="https://tradepigloball.co/login.html"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>:root{--accent:#00ff88;--accent2:#00ccff;--danger:#ff4466;--success:#00ff88;--text:#f0f0ff;--text2:#8888aa;--bg:#030309}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}.blobs{position:fixed;inset:0;pointer-events:none;overflow:hidden}.blob{position:absolute;border-radius:50%;filter:blur(90px)}.b1{width:400px;height:400px;background:rgba(0,255,136,.08);top:-80px;left:-60px}.b2{width:350px;height:350px;background:rgba(124,58,237,.1);bottom:-60px;right:-40px}.card{position:relative;background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:36px 32px;width:100%;max-width:420px;margin:20px}.logo{font-size:22px;font-weight:800;color:var(--accent);text-align:center}.title{font-size:22px;font-weight:800;text-align:center;margin:12px 0 6px}.sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px;line-height:1.5}.form{display:flex;flex-direction:column;gap:14px}.form-group{display:flex;flex-direction:column;gap:8px}.form-label{font-size:13px;font-weight:700}.form-input{width:100%;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:rgba(0,0,0,.28);color:var(--text);font:inherit;padding:12px 13px}.btn{display:block;width:100%;padding:12px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}.alert{padding:10px 14px;border-radius:10px;font-size:13px;display:none;margin-bottom:12px}.alert.show{display:block}.alert-error{background:rgba(255,68,102,.12);border:1px solid var(--danger);color:var(--danger)}.alert-success{background:rgba(0,255,136,.12);border:1px solid var(--success);color:var(--success)}.link{text-align:center;font-size:13px;color:var(--text2);margin-top:16px}.link a{color:var(--accent);text-decoration:none}.pill{display:table;margin:10px auto 14px;border:1px solid rgba(0,255,136,.25);border-radius:999px;padding:6px 10px;color:var(--accent);font-size:11px;font-weight:800}</style></head><body><div class="blobs"><div class="blob b1"></div><div class="blob b2"></div></div><div class="card"><div class="logo">KOSCHEI ARVIS</div><span class="pill">NEON AUTH · KOSCH ACCESS</span><div class="title">Giriş Yap</div><div class="sub">Hesap oturumunu aç. Derin ARVIS araçları için girişten sonra Phantom cüzdanını doğrula ve KOSCH holder durumunu kontrol et.</div><div class="alert" id="alert"></div><form class="form" id="loginForm"><div class="form-group"><label class="form-label" for="email">E-posta</label><input class="form-input" id="email" name="email" type="email" autocomplete="email" required></div><div class="form-group"><label class="form-label" for="password">Şifre</label><input class="form-input" id="password" name="password" type="password" autocomplete="current-password" required></div><button class="btn" id="submitBtn" type="submit">Giriş Yap</button></form><div class="link">Hesabınız yok mu? <a id="registerLink" href="/register.html">Hesap oluştur</a></div></div><script src="/js/koschei-auth.js?v=32"></script><script>const form=document.getElementById('loginForm'),submitBtn=document.getElementById('submitBtn'),alertEl=document.getElementById('alert'),registerLink=document.getElementById('registerLink');function next(){return KoscheiAuth.nextPath('/dashboard')}function show(m,t='error'){alertEl.textContent=m;alertEl.className='alert show '+(t==='success'?'alert-success':'alert-error')}(async()=>{await KoscheiAuth.init();registerLink.href='/register.html?next='+encodeURIComponent(next());if(KoscheiAuth.isLoggedIn()){location.replace(next());return}form.onsubmit=async e=>{e.preventDefault();submitBtn.disabled=true;try{const b=Object.fromEntries(new FormData(form));await KoscheiAuth.signIn(String(b.email||'').trim(),String(b.password||''));show('Giriş başarılı.','success');location.replace(next())}catch(err){show(err?.message||'Giriş yapılamadı.');submitBtn.disabled=false}}})();</script></body></html>
