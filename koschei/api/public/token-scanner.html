<body>

<main class="page" style="max-width:800px;">
  <div class="page-title">Web3 Risk Scanner</div>
  <div class="page-sub">Run a preliminary checklist for a project, wallet, or contract. Never enter a private key or recovery phrase.</div>

  <form class="card" id="riskForm" style="display:flex;flex-direction:column;gap:16px;margin-bottom:20px;">
    <div class="form-group">
      <label class="form-label" for="riskTarget">Project / wallet / contract</label>
      <input class="form-input" id="riskTarget" type="text" required placeholder="Project name, public wallet address, or contract address">
    </div>
    <div class="form-group">
      <label class="form-label" for="riskNotes">Notes</label>
      <textarea class="form-input" id="riskNotes" rows="4" placeholder="Add public context, concerns, or observed behavior..." style="resize:vertical;"></textarea>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-primary" id="riskScanBtn" type="submit">Scan</button><button class="btn btn-ghost" id="exampleBtn" type="button">Load example</button></div>
  </form>

  <section class="card" id="riskResult" hidden>
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;">
      <strong id="riskResultTitle">Risk scan result</strong>
      <span class="badge badge-blue" id="riskLevel"></span>
    </div>
    <div class="risk-grid">
      <div>
        <div class="form-label">checklist</div>
        <ul class="result-list" id="riskChecklist"></ul>
      </div>
      <div>
        <div class="form-label">recommended_fixes</div>
        <ul class="result-list" id="riskFixes"></ul>
      </div>
    </div>
    <p class="auth-sub" style="margin-top:18px;"><strong>score:</strong> <span id="riskScore"></span></p>
    <p class="auth-sub" style="margin-top:8px;"><strong>disclaimer:</strong> <span id="riskDisclaimer"></span></p>
  </section>
</main>

<script src="/js/koschei-auth.js?v=4"></script>
<script src="/js/koschei-analytics.js?v=1"></script>
<script>
  const fallbackResult = {
    risk_level: 'review_required',
    score: 65,
    checklist: [
      'Verify the official project source and the target address independently.',
      'Review contract verification, permissions, upgrade controls, and transaction history.',
      'Check for unexpected approvals, signer changes, or high-privilege operations.',
      'Confirm that public documentation and audit claims are current and authentic.'
    ],
    recommended_fixes: [
      'Use trusted explorers and official links to confirm addresses before interacting.',
      'Revoke unnecessary token approvals and limit wallet permissions where appropriate.',
      'Use a separate wallet for testing and request an independent security review for high-value activity.'
    ],
    disclaimer: 'This is informational only, not legal, financial, investment, or security advice.'
  };

  function renderList(id, items) {
    const list = document.getElementById(id);
    list.replaceChildren(...items.map(item => {
      const entry = document.createElement('li');
      entry.textContent = item;
      return entry;
    }));
  }

  function renderResult(result, usedClientFallback = false) {
    document.getElementById('riskResultTitle').textContent = usedClientFallback ? 'Fallback risk checklist' : 'Saved risk scan result';
    document.getElementById('riskLevel').textContent = `risk_level: ${result.risk_level}`;
    document.getElementById('riskScore').textContent = result.score;
    document.getElementById('riskDisclaimer').textContent = result.disclaimer;
    renderList('riskChecklist', result.checklist);
    renderList('riskFixes', result.recommended_fixes);
    document.getElementById('riskResult').hidden = false;
  }

  (async () => {
    await KoscheiAuth.init();
    if (!KoscheiAuth.requireAuth('/login')) return;
    KoscheiAnalytics.track('risk_view');


    document.getElementById('exampleBtn').addEventListener('click', () => {
      renderResult({ risk_level: 'Demo example', score: 65, disclaimer: 'Demo example — no backend execution, no credit decrement, and no paid output saved.', checklist: ['Example signal only'], recommended_fixes: ['Buy credits to run real scans.'] }, true);
    });

    document.getElementById('riskForm').addEventListener('submit', async event => {
      event.preventDefault();
      const button = document.getElementById('riskScanBtn');
      const target = document.getElementById('riskTarget').value.trim();
      const notes = document.getElementById('riskNotes').value.trim();
      button.disabled = true;
      button.textContent = 'Scanning...';

      KoscheiAnalytics.track('risk_scan');

      try {
        const response = await KoscheiAuth.apiCall('/api/risk/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target, notes })
        });
        if (!response) {
          renderResult(fallbackResult, true);
          return;
        }
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.message || error.error || `Request failed (${response.status})`);
        }
        renderResult(await response.json());
        KoscheiAnalytics.track('risk_scan_success');
      } catch (error) {
        if (error instanceof TypeError) {
          renderResult(fallbackResult, true);
          return;
        }
        window.alert(error.message || 'Real execution requires credits. Demo examples are free.');
      } finally {
        button.disabled = false;
        button.textContent = 'Scan';
      }
    });
  })();
</script>
