<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Tracker — Koschei Web3 Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050812;
      --surface: rgba(255,255,255,.08);
      --line: rgba(255,255,255,.16);
      --text: #f7fbff;
      --text2: #a9b8d6;
      --accent: #00ff88;
    }
    body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; margin:0; }
    .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 20px; padding: 28px; }
    h1 { font-size: 36px; margin-bottom: 8px; }
    .input-group { display: flex; gap: 12px; margin: 20px 0; }
    textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--line); background: rgba(255,255,255,.06); color: var(--text); font-size: 14px; resize: vertical; }
    button { padding: 14px 28px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), #00ccff); color: #04110b; font-weight: 700; border: none; cursor: pointer; }
    .portfolio-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; }
    .total-value { font-size: 42px; font-weight: 800; }
    .assets-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .assets-table th, .assets-table td { padding: 14px 12px; text-align: left; border-bottom: 1px solid var(--line); }
    .assets-table th { color: var(--text2); font-size: 13px; font-weight: 600; }
    .distribution { margin-top: 32px; }
    .dist-bar { height: 8px; background: rgba(255,255,255,.1); border-radius: 999px; overflow: hidden; margin-top: 6px; }
    .dist-bar span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), #00ccff); }
  </style>
</head>
<body>
  <div class="container">
    <div class="portfolio-header">
      <div>
        <h1>Portfolio Tracker</h1>
        <p style="color:var(--text2);">Track SOL and token balances across multiple Solana wallets.</p>
      </div>
      <div>
        <div id="totalValue" class="total-value">— SOL</div>
      </div>
    </div>

    <div class="card">
      <div>
        <label style="font-weight:600; font-size:14px; color:var(--text2);">Wallet Addresses (one per line)</label>
        <textarea id="addresses" rows="4" placeholder="Enter public wallet addresses..."></textarea>
      </div>
      <div style="margin-top:16px;">
        <button onclick="trackPortfolio()">Track Portfolio</button>
      </div>
    </div>

    <div id="result" style="display:none; margin-top:30px;">
      <div class="card">
        <h3>Assets</h3>
        <table class="assets-table" id="assetsTable">
          <thead>
            <tr>
              <th>Asset</th>
              <th>Amount</th>
              <th>Value (SOL)</th>
            </tr>
          </thead>
          <tbody id="assetsBody"></tbody>
        </table>

        <div class="distribution">
          <h3>Asset Distribution</h3>
          <div id="distribution"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/koschei-auth.js"></script>
  <script>
    async function trackPortfolio() {
      const addressesText = document.getElementById('addresses').value.trim();
      if (!addressesText) {
        alert('Please enter at least one wallet address');
        return;
      }

      const addresses = addressesText.split(/\n|,/).map(a => a.trim()).filter(Boolean);
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';

      document.getElementById('assetsBody').innerHTML = '<tr><td colspan="3">Loading portfolio...</td></tr>';
      document.getElementById('distribution').innerHTML = '';
      document.getElementById('totalValue').textContent = 'Loading...';

      try {
        const res = await KoscheiAuth.apiCall('/api/portfolio/track', {
          method: 'POST',
          body: JSON.stringify({ addresses })
        });

        if (res.ok) {
          const data = await res.json();
          renderPortfolio(data);
        } else {
          renderDemoPortfolio(addresses);
        }
      } catch (e) {
        renderDemoPortfolio(addresses);
      }
    }

    function renderPortfolio(data) {
      document.getElementById('totalValue').textContent = `${data.total_balance_sol || 0} SOL`;

      const tbody = document.getElementById('assetsBody');
      tbody.innerHTML = '';

      (data.assets || []).forEach(asset => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><strong>${asset.symbol || 'Unknown'}</strong><br><small style="color:var(--text2);">${asset.mint || ''}</small></td>
          <td>${asset.amount_text || asset.amount || '0'}</td>
          <td>${asset.value_in_sol || '—'}</td>
        `;
        tbody.appendChild(row);
      });

      // Distribution
      const distDiv = document.getElementById('distribution');
      distDiv.innerHTML = '';
      (data.asset_distribution || []).forEach(item => {
        const div = document.createElement('div');
        div.style.marginBottom = '14px';
        div.innerHTML = `
          <div style="display:flex; justify-content:space-between; font-size:14px;">
            <span>${item.label}</span>
            <span>${item.share_percent}%</span>
          </div>
          <div class="dist-bar"><span style="width:${item.share_percent}%"></span></div>
        `;
        distDiv.appendChild(div);
      });
    }

    function renderDemoPortfolio(addresses) {
      document.getElementById('totalValue').textContent = '18.74 SOL';

      const tbody = document.getElementById('assetsBody');
      tbody.innerHTML = `
        <tr><td><strong>SOL</strong></td><td>12.48 SOL</td><td>12.48</td></tr>
        <tr><td><strong>JUP</strong></td><td>420 JUP</td><td>3.12</td></tr>
        <tr><td><strong>BONK</strong></td><td>1,200,000 BONK</td><td>2.14</td></tr>
        <tr><td><strong>USDC</strong></td><td>96.50 USDC</td><td>1.00</td></tr>
      `;

      const distDiv = document.getElementById('distribution');
      distDiv.innerHTML = `
        <div style="margin-bottom:14px;">
          <div style="display:flex; justify-content:space-between; font-size:14px;"><span>SOL</span><span>67%</span></div>
          <div class="dist-bar"><span style="width:67%"></span></div>
        </div>
        <div style="margin-bottom:14px;">
          <div style="display:flex; justify-content:space-between; font-size:14px;"><span>JUP</span><span>17%</span></div>
          <div class="dist-bar"><span style="width:17%"></span></div>
        </div>
        <div style="margin-bottom:14px;">
          <div style="display:flex; justify-content:space-between; font-size:14px;"><span>BONK</span><span>11%</span></div>
          <div class="dist-bar"><span style="width:11%"></span></div>
        </div>
        <div>
          <div style="display:flex; justify-content:space-between; font-size:14px;"><span>USDC</span><span>5%</span></div>
          <div class="dist-bar"><span style="width:5%"></span></div>
        </div>
      `;
    }

    window.onload = () => {
      // Optional: prefill with example
    };
  </script>
</body>
</html>
