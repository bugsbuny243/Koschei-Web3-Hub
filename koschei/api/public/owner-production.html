<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>KOSCHEİ WEB3 · Owner Control Center</title>
  <link rel="stylesheet" href="/css/owner-control-center.css?v=2">
  <link rel="stylesheet" href="/css/owner-mobile-fixes.css?v=1">
</head>
<body>
  <main id="loginView" class="login-wrap">
    <section class="login-card">
      <div class="brand"><span class="brand-mark">K</span><span><strong>KOSCHEİ WEB3</strong><small>Owner Control Center</small></span></div>
      <div style="margin-top:28px"><span class="eyebrow">Owner only</span><h1 style="margin:0;font-size:38px;letter-spacing:-.05em">İşletmenin tamamı tek ekranda.</h1><p class="muted">Sistem, gelir, müşteriler, Arvıs, güvenlik ve geri bildirim operasyonlarını yönetin.</p></div>
      <form id="loginForm">
        <div class="field"><label for="loginWallet">Owner kimliği</label><input class="input" id="loginWallet" autocomplete="username" placeholder="e-posta veya wallet"></div>
        <div class="field"><label for="loginSecret">Owner secret</label><input class="input" id="loginSecret" type="password" autocomplete="current-password" placeholder="OWNER_SECRET"></div>
        <button class="btn primary" id="loginButton" style="width:100%;margin-top:18px" type="submit">Kontrol merkezine gir</button>
        <div id="loginError" class="error-box hidden" style="margin-top:12px"></div>
      </form>
    </section>
  </main>

  <div id="appView" class="owner-app hidden">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark">K</span><span><strong>KOSCHEİ WEB3</strong><small>Owner Control Center</small></span></div>
      <nav class="sidebar-nav" id="desktopNav"></nav>
      <div class="sidebar-foot">
        <div class="session-box"><b>Owner session</b><span id="sessionState">12 saatlik güvenli oturum</span></div>
        <button class="btn danger" id="logoutButton">Çıkış yap</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div><span class="eyebrow" id="pageEyebrow">Operasyon merkezi</span><h1 id="pageTitle">Bugün</h1></div>
        <div class="top-actions"><span class="sync-pill"><span class="dot warn" id="syncDot"></span><span id="syncText">Bağlanıyor</span></span><button class="btn primary" id="gameStudioButton">Mobil Oyun</button><button class="btn" id="refreshButton">Yenile</button><button class="btn danger mobile-logout" type="button" onclick="document.getElementById('logoutButton').click()">Çıkış</button></div>
      </header>

      <section class="page active" id="page-command"><div id="commandContent"></div></section>
      <section class="page" id="page-arvis"><div id="arvisContent"></div></section>
      <section class="page" id="page-customers"><div id="customersContent"></div></section>
      <section class="page" id="page-revenue"><div id="revenueContent"></div></section>
      <section class="page" id="page-feedback"><div id="feedbackContent"></div></section>
      <section class="page" id="page-security"><div id="securityContent"></div></section>
      <section class="page" id="page-system"><div id="systemContent"></div></section>
      <section class="page" id="page-brain"><div id="brainContent"></div></section>
    </main>

    <nav class="mobile-nav" id="mobileNav"></nav>
  </div>

  <div id="modalRoot"></div>
  <div class="toast" id="toast"></div>
  <script src="/js/owner-control-center.js?v=2"></script>
  <script src="/js/owner-paddle-diagnostics.js?v=1"></script>
  <script src="/js/owner-game-studio.js?v=1"></script>
  <script src="/js/owner-ai-chat.js?v=1"></script>
</body>
</html>
