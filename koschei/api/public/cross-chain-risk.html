<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/css/koschei.css"><title>Cross-chain Risk Monitor — Koschei</title><style>.hero{padding:32px;background:linear-gradient(135deg,#111118,#13231d);border:1px solid #2a2a3a;border-radius:16px;margin-bottom:20px}.stack{display:grid;gap:16px}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.result-item{padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px}.result-item b{display:block;color:var(--accent2);font-size:12px;text-transform:uppercase;margin-bottom:5px}pre{white-space:pre-wrap;overflow:auto;color:#c7f9df}textarea.form-input{min-height:100px;resize:vertical}.note{color:var(--text2);font-size:13px}.loading{opacity:.65}@media(max-width:700px){.form-grid,.result-grid{grid-template-columns:1fr}}</style></head><body><nav class="nav"><a class="nav-logo" href="/hub">K Koschei</a><div class="nav-links"><a class="nav-link" href="/hub">Hub</a><a class="nav-link" href="/docs">Docs</a><a class="nav-link" href="/impact">Impact</a><a class="nav-link" href="/account">Account</a></div></nav><main class="page"><section class="hero"><span class="badge badge-green">User tool · 1 output</span><h1>Cross-chain Risk Monitor</h1><p class="page-sub">Run a preliminary checklist for bridge and cross-chain activity risk.</p><p class="note">No wallet connection or private keys required for core tools.</p></section><form id="form" class="card stack"><div class="form-grid"><label class="form-label">Source chain<input class="form-input" name="source_chain" placeholder="ethereum" required></label><label class="form-label">Target chain<input class="form-input" name="target_chain" placeholder="base" required></label><label class="form-label">Public address<input class="form-input" name="address" placeholder="Optional when tx hash is supplied"></label><label class="form-label">Transaction hash<input class="form-input" name="tx_hash" placeholder="Optional"></label><label class="form-label">Bridge or protocol<input class="form-input" name="bridge_or_protocol" placeholder="Optional"></label></div><button id="submit" class="btn btn-primary">Review cross-chain activity</button></form><section id="result" class="card" style="margin-top:20px"><h2>Result</h2><p id="message" class="note">Submit public information to begin.</p><div id="summary" class="result-grid" style="margin-top:14px"></div><details style="margin-top:16px"><summary>Raw JSON</summary><pre id="raw"></pre></details></section></main><script src="/js/koschei-auth.js?v=4"></script><script src="/js/koschei-analytics.js?v=1"></script><script>(async()=>{await KoscheiAuth.init();if(!KoscheiAuth.requireAuth('/login'))return;const escapeHTML=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));KoscheiAnalytics.track('cross-chain-risk_view');const nice=k=>k.replaceAll('_',' ').replace(/\b\w/g,c=>c.toUpperCase());form.onsubmit=async e=>{e.preventDefault();submit.disabled=true;result.classList.add('loading');message.textContent='Working…';summary.innerHTML='';try{const body=Object.fromEntries(new FormData(form));if(body.milestone_count)body.milestone_count=Number(body.milestone_count);const r=await KoscheiAuth.apiCall('/api/web3/cross-chain-risk',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();raw.textContent=JSON.stringify(d,null,2);if(!r.ok){message.textContent=d.message||d.error||'Request failed';return}const view=d.draft||d;message.textContent='Completed.';summary.innerHTML=Object.entries(view).filter(([k,v])=>!['raw','decoded','draft','ok','preliminary'].includes(k)).map(([k,v])=>`<div class="result-item"><b>${escapeHTML(nice(k))}</b><span>${escapeHTML(typeof v==='object'?JSON.stringify(v,null,2):v)}</span></div>`).join('')}catch(err){message.textContent='Unable to complete the request.'}finally{submit.disabled=false;result.classList.remove('loading')}}})()</script></body></html>
