<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="keywords" content="Solana token scanner, Solana security, rug pull detector, Solana wallet score, NFT metadata generator, Solana transaction decoder, Solana developer tools, smart contract scanner, Web3 security">
  <meta name="author" content="Koschei Web3 Hub">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://tradepigloball.co/wallet-score.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tradepigloball.co/wallet-score.html">
  <meta property="og:title" content="Solana Wallet Score — Instant Reputation Analysis | Koschei">
  <meta property="og:description" content="Get an instant trust score for any Solana wallet. Activity history, balance analysis, AI-powered reputation report. Free.">
  <meta property="og:image" content="https://tradepigloball.co/og-image.svg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@KreatifZihin">
  <meta name="twitter:title" content="Solana Wallet Score — Instant Reputation Analysis | Koschei">
  <meta name="twitter:description" content="Get an instant trust score for any Solana wallet. Activity history, balance analysis, AI-powered reputation report. Free.">
  <meta name="twitter:image" content="https://tradepigloball.co/og-image.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/koschei.css">
  <style>
    .score-circle{width:160px;height:160px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:4px solid;margin:0 auto 20px;}
    .score-num{font-size:48px;font-weight:700;line-height:1;}
    .score-label{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:.8;}
    .badge-pill{display:inline-flex;align-items:center;padding:5px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;font-size:13px;margin:3px;}
    .stat-card{text-align:center;padding:16px;}
    .stat-val{font-size:22px;font-weight:700;margin-bottom:2px;}
    .stat-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);}
    .mono{font-family:'JetBrains Mono',monospace;}
  </style>
</head>
<body>
<nav class="nav">
  <a href="/hub.html" class="nav-logo">K <span style="color:var(--text);font-weight:500;font-size:15px;">Koschei</span></a>
  <div class="nav-links">
    <a href="/hub.html" class="nav-link">Hub</a>
    <a href="/wallet-score.html" class="nav-link active">Wallet Score</a>
    <a href="/tx-decoder.html" class="nav-link">TX Decoder</a>
  </div>
</nav>

<div class="page" style="max-width:720px;">
  <div style="text-align:center;margin-bottom:32px;">
    <div style="font-size:36px;margin-bottom:10px;">🏆</div>
    <div class="page-title" style="font-size:28px;">Wallet Reputation Score</div>
    <div style="color:var(--text2);font-size:15px;">Enter any Solana wallet — get an instant trust score.</div>
  </div>

  <div class="card" style="padding:24px;margin-bottom:20px;">
    <div class="form-group" style="margin-bottom:14px;">
      <label class="form-label">Wallet Address</label>
      <input class="form-input mono" type="text" id="addrInput"
        placeholder="8mXVkMDLFMpiFMPU1YnVBjcBHF3VCkXd...">
    </div>
    <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label">Network</label>
        <select class="form-input" id="netSelect" style="width:auto;">
          <option value="solana-devnet">Solana Devnet</option>
          <option value="solana-mainnet">Solana Mainnet</option>
        </select>
      </div>
      <button class="btn btn-primary" id="scoreBtn" onclick="getScore()" style="padding:10px 24px;">
        🏆 Get Score
      </button>
      <button class="btn btn-ghost" onclick="scoreMyWallet()" style="padding:10px 16px;font-size:13px;">
        Score my wallet
      </button>
    </div>
    <div class="alert" id="alert" style="margin-top:12px;"></div>
  </div>

  <div id="result" style="display:none;">

    <!-- Score circle -->
    <div style="text-align:center;margin-bottom:24px;">
      <div class="score-circle" id="scoreCircle">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-label" id="scoreLevel">—</div>
      </div>
      <div style="font-size:13px;color:var(--text2);max-width:480px;margin:0 auto;line-height:1.7;" id="summary"></div>
    </div>

    <!-- Badges -->
    <div style="text-align:center;margin-bottom:24px;" id="badgesWrap">
      <div id="badgesList"></div>
    </div>

    <!-- Stats -->
    <div class="grid-3" style="margin-bottom:20px;">
      <div class="card stat-card">
        <div class="stat-val" id="statTx">—</div>
        <div class="stat-lbl">Transactions</div>
      </div>
      <div class="card stat-card">
        <div class="stat-val" style="color:var(--accent);" id="statBal">—</div>
        <div class="stat-lbl">Balance</div>
      </div>
      <div class="card stat-card">
        <div class="stat-val" id="statAge">—</div>
        <div class="stat-lbl">Active Days</div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="card" style="padding:18px;margin-bottom:20px;" id="timelineCard">
      <div style="display:flex;justify-content:space-between;font-size:13px;flex-wrap:wrap;gap:8px;">
        <span style="color:var(--text2);">First seen: <span style="color:var(--text);font-weight:600;" id="firstSeen">—</span></span>
        <span style="color:var(--text2);">Last active: <span style="color:var(--text);font-weight:600;" id="lastSeen">—</span></span>
      </div>
    </div>

    <!-- Share -->
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="shareScore()" style="font-size:13px;">
        🐦 Share Score
      </button>
      <button class="btn btn-ghost" onclick="copyLink()" style="font-size:13px;">
        🔗 Copy link
      </button>
      <a href="/tx-decoder.html" class="btn btn-ghost" style="font-size:13px;">
        🔍 Decode transactions →
      </a>
    </div>
  </div>
</div>

<script src="/js/koschei-auth.js?v=3"></script>
<script>
  (async () => {
    await KoscheiAuth.init();
    if (!KoscheiAuth.requireAuth()) return;
    const params = new URLSearchParams(window.location.search);
    if (params.get('addr')) {
      document.getElementById('addrInput').value = params.get('addr');
      if (params.get('net')) document.getElementById('netSelect').value = params.get('net');
      getScore();
    }
  })();

  function scoreMyWallet() {
    const email = KoscheiAuth.getEmail();
    if (!email) return;
    showAlert('Enter your wallet address manually — we only store your email, not your wallet.');
  }

  async function getScore() {
    const addr = document.getElementById('addrInput').value.trim();
    const network = document.getElementById('netSelect').value;
    const btn = document.getElementById('scoreBtn');
    clearAlert();

    if (!addr) { showAlert('Enter a wallet address.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Analyzing...';
    document.getElementById('result').style.display = 'none';

    try {
      const res = await KoscheiAuth.apiCall('/api/wallet/score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address: addr, network }),
      });
      if (!res || !res.ok) {
        const err = res ? await res.json().catch(() => ({})) : {};
        throw new Error(err.error || `Failed (${res?.status})`);
      }
      const data = await res.json();
      displayScore(data);
    } catch (err) {
      showAlert(err.message || 'Analysis failed.');
    } finally {
      btn.disabled = false;
      btn.textContent = '🏆 Get Score';
    }
  }

  function displayScore(data) {
    const color = data.level_color || '#888';

    // Score circle
    const circle = document.getElementById('scoreCircle');
    circle.style.borderColor = color;
    circle.style.background = color + '15';
    document.getElementById('scoreNum').style.color = color;
    document.getElementById('scoreNum').textContent = data.score;
    document.getElementById('scoreLevel').style.color = color;
    document.getElementById('scoreLevel').textContent = data.level;

    document.getElementById('summary').textContent = data.summary || '';

    // Badges
    document.getElementById('badgesList').innerHTML = (data.badges || [])
      .map(b => `<span class="badge-pill">${escHtml(b)}</span>`).join('');

    // Stats
    document.getElementById('statTx').textContent = data.tx_count ?? '—';
    document.getElementById('statBal').textContent = data.balance_sol || '—';
    document.getElementById('statAge').textContent = data.active_days ? data.active_days + ' days' : '—';
    document.getElementById('firstSeen').textContent = data.first_seen || 'Unknown';
    document.getElementById('lastSeen').textContent = data.last_seen || 'Unknown';

    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
  }

  function shareScore() {
    const addr = document.getElementById('addrInput').value.trim();
    const net = document.getElementById('netSelect').value;
    const score = document.getElementById('scoreNum').textContent;
    const level = document.getElementById('scoreLevel').textContent;
    const url = `https://tradepigloball.co/wallet-score.html?addr=${encodeURIComponent(addr)}&net=${encodeURIComponent(net)}`;
    const icons = { TRUSTED:'✅', GOOD:'💙', NEUTRAL:'🟡', RISKY:'⚠️', DANGER:'🚨' };
    const icon = icons[level] || '🏆';
    const text = `${icon} Solana Wallet Score: ${score}/100 — ${level}\n\nAnalyzed by @KreatifZihin's Koschei\n${url}\n\n#Solana #Web3 #SolanaPassport`;
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
  }

  function copyLink() {
    const addr = document.getElementById('addrInput').value.trim();
    const net = document.getElementById('netSelect').value;
    const url = `https://tradepigloball.co/wallet-score.html?addr=${encodeURIComponent(addr)}&net=${encodeURIComponent(net)}`;
    navigator.clipboard.writeText(url).catch(() => {});
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function showAlert(msg) { const el = document.getElementById('alert'); el.textContent = msg; el.className = 'alert alert-error show'; }
  function clearAlert() { document.getElementById('alert').className = 'alert'; }
</script>
</body>
</html>
