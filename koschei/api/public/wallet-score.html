<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet Score — Koschei Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050812;
      --surface: rgba(255,255,255,.08);
      --line: rgba(255,255,255,.16);
      --text: #f7fbff;
      --text2: #a9b8d6;
      --accent: #00ff88;
      --danger: #ff5c7c;
      --warning: #facc15;
      --success: #22c55e;
    }
    body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; margin:0; }
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 20px; padding: 32px; }
    h1 { font-size: 36px; margin-bottom: 8px; }
    .pro-badge { display: inline-block; background: linear-gradient(135deg, #00ff88, #69d8ff); color: #04110b; font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 999px; margin-left: 12px; }
    .input-group { display: flex; gap: 12px; margin: 24px 0; }
    input { flex: 1; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--line); background: rgba(255,255,255,.06); color: var(--text); font-size: 15px; }
    button { padding: 14px 28px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), #00ccff); color: #04110b; font-weight: 700; border: none; cursor: pointer; }
    .score-container { text-align: center; margin: 40px 0; }
    .score { font-size: 120px; font-weight: 800; line-height: 1; }
    .score-label { font-size: 18px; color: var(--text2); margin-top: -20px; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-top: 32px; }
    .metric { background: rgba(255,255,255,.05); padding: 20px; border-radius: 16px; text-align: center; }
    .metric-value { font-size: 28px; font-weight: 700; }
    .metric-label { color: var(--text2); font-size: 13px; margin-top: 4px; }
    .flags { margin-top: 32px; }
    .flag { padding: 10px 16px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
    .flag.high { background: rgba(239,68,68,.1); border: 1px solid #ef4444; }
    .flag.medium { background: rgba(250,204,21,.1); border: 1px solid #facc15; }
    .flag.low { background: rgba(34,197,94,.1); border: 1px solid #22c55e; }
    .pro-footer { margin-top: 50px; text-align: center; padding: 30px; background: var(--surface); border-radius: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Wallet Score <span class="pro-badge">PRO</span></h1>
    <p style="color:var(--text2); max-width:620px;">
      Advanced Solana wallet reputation scoring and risk analysis. Pro feature.
    </p>

    <div class="card">
      <div class="input-group">
        <input type="text" id="walletAddress" placeholder="Enter Solana wallet address...">
        <button onclick="getWalletScore()">Analyze Wallet</button>
      </div>

      <div id="result" style="display:none; margin-top:30px;">
        <div class="score-container">
          <div id="score" class="score">—</div>
          <div class="score-label">Wallet Reputation Score</div>
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="metric-value" id="txCount">—</div>
            <div class="metric-label">Total Transactions</div>
          </div>
          <div class="metric">
            <div class="metric-value" id="age">—</div>
            <div class="metric-label">Wallet Age (days)</div>
          </div>
          <div class="metric">
            <div class="metric-value" id="risk">—</div>
            <div class="metric-label">Risk Level</div>
          </div>
        </div>

        <div class="flags" id="flags"></div>
      </div>
    </div>

    <div class="pro-footer">
      <p style="color:var(--text2); margin-bottom:16px;">This is a Pro feature. Upgrade to unlock full access and higher limits.</p>
      <a href="https://www.shopier.com/TradeVisual/47465449" target="_blank" style="display:inline-block; padding:14px 32px; background:linear-gradient(135deg,#00ff88,#69d8ff); color:#04110b; font-weight:700; border-radius:12px; text-decoration:none;">Buy Pro Access</a>
    </div>
  </div>

  <script src="/js/koschei-auth.js"></script>
  <script>
    async function getWalletScore() {
      const address = document.getElementById('walletAddress').value.trim();
      if (!address) {
        alert('Please enter a wallet address');
        return;
      }

      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';

      document.getElementById('score').textContent = 'Loading...';
      document.getElementById('flags').innerHTML = '';

      try {
        const res = await KoscheiAuth.apiCall('/api/wallet/score', {
          method: 'POST',
          body: JSON.stringify({ address: address })
        });

        if (!res.ok) throw new Error('Failed to fetch wallet score');

        const data = await res.json();
        renderWalletScore(data);
      } catch (e) {
        renderDemoWalletScore(address);
      }
    }

    function renderWalletScore(data) {
      const scoreEl = document.getElementById('score');
      const score = data.score || 72;
      scoreEl.textContent = score;
      scoreEl.style.color = score >= 80 ? '#22c55e' : score >= 50 ? '#facc15' : '#ef4444';

      document.getElementById('txCount').textContent = data.total_transactions || '—';
      document.getElementById('age').textContent = data.wallet_age_days || '—';
      document.getElementById('risk').textContent = data.risk_level || '—';

      const flagsDiv = document.getElementById('flags');
      flagsDiv.innerHTML = '';

      if (data.flags && data.flags.length > 0) {
        data.flags.forEach(flag => {
          const div = document.createElement('div');
          div.className = `flag ${flag.level.toLowerCase()}`;
          div.innerHTML = `<strong>${flag.title}</strong><span style="margin-left:auto; color:var(--text2);">${flag.description}</span>`;
          flagsDiv.appendChild(div);
        });
      } else {
        flagsDiv.innerHTML = `<div class="flag low"><strong>No major risk flags detected.</strong></div>`;
      }
    }

    function renderDemoWalletScore(address) {
      const scoreEl = document.getElementById('score');
      scoreEl.textContent = '84';
      scoreEl.style.color = '#22c55e';

      document.getElementById('txCount').textContent = '1,284';
      document.getElementById('age').textContent = '312';
      document.getElementById('risk').textContent = 'Low';

      const flagsDiv = document.getElementById('flags');
      flagsDiv.innerHTML = `
        <div class="flag low"><strong>Good activity history</strong> <span style="margin-left:auto;">Consistent on-chain behavior</span></div>
        <div class="flag low"><strong>No Sybil patterns detected</strong></div>
        <div class="flag medium"><strong>Moderate DeFi usage</strong> <span style="margin-left:auto;">Some high-risk protocols used</span></div>
      `;
    }

    document.getElementById('walletAddress').addEventListener('keypress', e => {
      if (e.key === 'Enter') getWalletScore();
    });

    window.onload = () => document.getElementById('walletAddress').focus();
  </script>
</body>
</html>
