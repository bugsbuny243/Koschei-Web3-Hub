  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Koschei</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/koschei.css">
  <style>
    .stat{display:flex;flex-direction:column;gap:6px;padding:20px;}
    .stat-label{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);}
    .stat-value{font-size:28px;font-weight:700;}
    .stat-sub{font-size:13px;color:var(--text2);}
  </style>
</head>
<body>
<nav class="nav">
  <a href="/hub" class="nav-logo">K <span style="color:var(--text);font-weight:500;font-size:15px;">Koschei</span></a>
  <div class="nav-links">
    <a href="/hub" class="nav-link">Hub</a>
    <a href="/metadata" class="nav-link">Metadata</a>
    <a href="/risk" class="nav-link">Risk</a>
    <a href="/chains" class="nav-link">Chains</a>
    <a href="/account" class="nav-link">Account</a>
    <button class="btn btn-ghost" style="padding:6px 14px;font-size:13px;" onclick="KoscheiAuth.signOut()">Sign out</button>
  </div>
</nav>

<div class="page">
  <div class="page-title">Dashboard</div>
  <div class="page-sub" id="userEmailDisplay">Loading...</div>

  <div class="grid-3" style="margin-bottom:24px;">
    <div class="card stat">
      <div class="stat-label">Credits</div>
      <div class="stat-value" id="statCredits" style="color:var(--accent);">—</div>
      <div class="stat-sub">Remaining balance</div>
    </div>
    <div class="card stat">
      <div class="stat-label">Plan</div>
      <div class="stat-value" id="statPlan" style="font-size:20px;">—</div>
      <div class="stat-sub">Current tier</div>
    </div>
    <div class="card stat">
      <div class="stat-label">Role</div>
      <div class="stat-value" id="statRole" style="font-size:20px;">—</div>
      <div class="stat-sub">Account type</div>
    </div>
  </div>

  <div class="card" style="padding:24px;">
    <div style="font-size:15px;font-weight:600;margin-bottom:16px;">Quick Actions</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <a href="/metadata" class="btn btn-primary">🧬 Generate Metadata</a>
      <a href="/chains" class="btn btn-ghost">📡 Check Chains</a>
      <a href="/hub" class="btn btn-ghost">← Back to Hub</a>
    </div>
  </div>
</div>

<script src="/js/koschei-auth.js?v=3"></script>
<script>
  (async () => {
    await KoscheiAuth.init();
    if (!KoscheiAuth.requireAuth('/login')) return;
    document.getElementById('userEmailDisplay').textContent = KoscheiAuth.getEmail() || '';
    try {
      const res = await KoscheiAuth.apiCall('/api/me');
      if (res && res.ok) {
        const { user } = await res.json();
        document.getElementById('statCredits').textContent = user.credits ?? 0;
        document.getElementById('statPlan').textContent = user.plan_id || 'free';
        document.getElementById('statRole').textContent = user.role || 'member';
      }
    } catch (e) {
      document.getElementById('userEmailDisplay').textContent = 'Could not load user data.';
    }
  })();
</script>
</body>
</html>
