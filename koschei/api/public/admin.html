<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Koschei AI – Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
    }
    .sidebar {
      background: #1e293b;
      min-height: 100vh;
      padding: 20px 0;
    }
    .sidebar a {
      color: #cbd5e1;
      margin: 10px 15px;
      padding: 10px;
      border-radius: 8px;
      text-decoration: none;
      display: block;
      transition: 0.3s;
    }
    .sidebar a:hover, .sidebar a.active {
      background: #334155;
      color: white;
    }
    .content {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      min-height: 500px;
    }
    .card {
      background: #334155;
      border: none;
      margin-bottom: 15px;
    }
    .footer {
      text-align: center;
      margin-top: 50px;
      color: #64748b;
      font-size: 0.9em;
    }
  </style>
</head><body>

<div class="container-fluid">
  <div class="row">

    <!-- Sol Menü -->
    <div class="col-md-3 col-lg-2 sidebar">
      <h4 class="text-center text-white mb-4">🔐 KOSCHEI</h4>
      <a href="#login" class="active" onclick="showTab('login')">Giriş</a>
      <a href="#schema" onclick="showTab('schema')">Veritabanı Yapısı</a>
      <a href="#users" onclick="showTab('users')">Kullanıcılar</a>
      <a href="#activity" onclick="showTab('activity')">İşlem Kayıtları</a>
      <a href="#ai-agent" onclick="showTab('ai-agent')">AI Ajan</a>
    </div>

    <!-- Ana İçerik -->
    <div class="col-md-9 col-lg-10">
      <div class="content p-4">

        <!-- Giriş Ekranı -->
        <div id="login" class="tab">
          <h2>Yönetici Girişi</h2>
          <p>Bu sistem yalnızca sahibi Onur Bey'e aittir.</p>
          <input type="email" id="adminEmail" class="form-control mb-3" placeholder="E-posta" />
          <input type="password" id="adminPass" class="form-control mb-3" placeholder="Şifre" />
          <button class="btn btn-primary" onclick="adminLogin()">Giriş Yap</button>
          <p id="loginError" class="text-danger mt-2 d-none">Hatalı e-posta veya şifre.</p>
        </div>

        <!-- Diğer sekmeler sonra açılacak -->
        <div id="schema" class="tab d-none"></div>
        <div id="users" class="tab d-none"></div>
        <div id="activity" class="tab d-none"></div>
        <div id="ai-agent" class="tab d-none"></div>

      </div>
    </div>

  </div>
</div>

<!-- JS -->
<script>
  function showTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.add('d-none'));
    document.getElementById(id).classList.remove('d-none');
  }

  async function adminLogin() {
    const email = document.getElementById('adminEmail').value;    const password = document.getElementById('adminPass').value;

    const res = await fetch('/api/v1/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    if (res.ok) {
      localStorage.setItem('admin_auth', 'true');
      showTab('schema'); // Giriş sonrası ilk sekme
      loadSchema();
      loadUsers();
      loadActivity();
    } else {
      document.getElementById('loginError').classList.remove('d-none');
    }
  }

  // Eğer zaten giriş yaptıysa direkt yönlendir
  if (localStorage.getItem('admin_auth') === 'true') {
    showTab('schema');
    loadSchema();
  }
</script>

<div class="footer">
  <p>© 2026 Koschei AI. Tüm hakları saklıdır.</p>
</div>

</body>
</html>
