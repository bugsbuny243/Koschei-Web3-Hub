<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koschei Admin Control Center</title>
  <style>
    :root{color-scheme:dark;--bg:#070b14;--panel:#0e1626;--panel2:#111d31;--line:#24324a;--text:#e7edf8;--muted:#91a0b8;--cyan:#4dd9d2;--blue:#638cff;--ok:#4ade80;--warn:#fbbf24;--bad:#fb7185}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 70% -10%,#162a4d 0,transparent 35%),var(--bg);color:var(--text);font:14px/1.5 Inter,ui-sans-serif,system-ui,sans-serif}button,input{font:inherit}.hidden{display:none!important}.shell{min-height:100vh;display:grid;grid-template-columns:250px 1fr}.side{position:sticky;top:0;height:100vh;padding:24px 18px;border-right:1px solid var(--line);background:rgba(7,11,20,.9)}.brand{font-weight:800;font-size:18px;letter-spacing:.04em;margin-bottom:4px}.brand span{color:var(--cyan)}.sub,.muted{color:var(--muted)}.nav{display:grid;gap:5px;margin-top:28px}.tab{width:100%;padding:10px 12px;border:0;border-radius:8px;background:transparent;color:var(--muted);text-align:left;cursor:pointer}.tab:hover,.tab.active{color:#fff;background:#17243a}.main{padding:28px;min-width:0}.top{display:flex;justify-content:space-between;gap:18px;align-items:center;margin-bottom:26px}.title{font-size:24px;font-weight:800}.btn{border:1px solid var(--line);border-radius:8px;background:#17243a;color:#fff;padding:9px 13px;cursor:pointer}.btn:hover{border-color:var(--cyan)}.btn-primary{background:linear-gradient(135deg,#227b86,#395dc2);border:0}.btn-danger{color:#fecdd3}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:13px}.card{border:1px solid var(--line);border-radius:12px;background:linear-gradient(145deg,rgba(17,29,49,.96),rgba(10,17,30,.96));padding:17px;box-shadow:0 12px 35px rgba(0,0,0,.14)}.metric{font-size:27px;font-weight:800;margin-top:8px}.section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.section-head h2{margin:0;font-size:18px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel)}table{border-collapse:collapse;width:100%;font-size:12px}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;white-space:nowrap}th{position:sticky;top:0;background:#142038;color:#aebbd0}.badge{display:inline-block;padding:3px 7px;border-radius:99px;background:#24324a}.status-ok{color:var(--ok)}.status-warning{color:var(--warn)}.status-critical{color:var(--bad)}.unlock{max-width:430px;margin:12vh auto}.unlock input,.chat-form input{width:100%;border:1px solid var(--line);border-radius:8px;padding:11px;background:#09111f;color:#fff}.notice{border-left:3px solid var(--cyan);background:#101d2e;padding:12px 14px;border-radius:6px;color:#bbc7d8;margin-bottom:16px}.scan{display:grid;gap:9px}.scan-item{display:grid;grid-template-columns:130px 240px 1fr;gap:12px;align-items:start}.chat-window{height:430px;overflow:auto;display:flex;flex-direction:column;gap:11px;padding:14px}.bubble{max-width:85%;padding:11px 13px;border-radius:12px;background:#17243a;white-space:pre-wrap}.bubble.admin{align-self:flex-end;background:#244d68}.bubble small{display:block;color:var(--muted);margin-top:5px}.quick{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}.chat-form{display:flex;gap:8px}.empty{padding:24px;color:var(--muted)}@media(max-width:850px){.shell{display:block}.side{position:static;height:auto}.nav{display:flex;overflow:auto}.tab{white-space:nowrap}.main{padding:18px}.scan-item{grid-template-columns:1fr}.top{align-items:flex-start}.top .sub{display:none}}
  </style>
</head>
<body>
<section class="unlock card" id="unlock"><div class="brand">KOSCHEI <span>CONTROL</span></div><h1>Koschei Admin Control Center</h1><p class="sub">Enter the admin password to open this session. It is kept only in sessionStorage.</p><form id="unlockForm"><input id="password" type="password" autocomplete="current-password" placeholder="Admin password" required><button class="btn btn-primary" style="width:100%;margin-top:10px">Unlock control center</button></form><p id="unlockError" class="status-critical"></p></section>
<div class="shell hidden" id="app">
  <aside class="side"><div class="brand">KOSCHEI <span>CONTROL</span></div><div class="sub">Admin Control Center</div><nav class="nav" id="nav"></nav></aside>
  <main class="main"><header class="top"><div><div class="title" id="pageTitle">Overview</div><div class="sub">Read system state and operate payment reviews.</div></div><button class="btn" id="lockButton">Lock</button></header><div id="view"></div></main>
</div>
<script>
const storageKey='koschei_admin_password';
const tabs=[['Overview','overview'],['Users','users'],['Payments','payments'],['Credits','entitlements'],['Outputs','outputs'],['Watchlist','watchlist-sources'],['Events','web3-events'],['Chains','chain-health'],['Analytics','analytics'],['System Health','system-scan'],['Koschei Chat','chat']];
const titles=Object.fromEntries(tabs.map(x=>[x[1],x[0]])); let active='overview';
const esc=v=>String(v??'—').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=v=>{if(v===null||v===undefined||v==='')return '—';if(typeof v==='object')return JSON.stringify(v);if(typeof v==='string'&&/^\d{4}-\d\d-\d\dT/.test(v))return new Date(v).toLocaleString();return String(v)};
async function call(path,opts={}){opts.headers={...(opts.headers||{}),'x-admin-password':sessionStorage.getItem(storageKey)||''};if(opts.body)opts.headers['Content-Type']='application/json';const res=await fetch(path,opts);const data=await res.json().catch(()=>({}));if(res.status===401){lock('Admin password was rejected.');throw Error('Unauthorized')}if(!res.ok)throw Error(data.error||'Request failed');return data}
function lock(message=''){sessionStorage.removeItem(storageKey);document.getElementById('app').classList.add('hidden');document.getElementById('unlock').classList.remove('hidden');document.getElementById('unlockError').textContent=message}
function init(){document.getElementById('nav').innerHTML=tabs.map(([label,id])=>`<button class="tab ${id===active?'active':''}" data-tab="${id}">${esc(label)}</button>`).join('');document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>show(b.dataset.tab));document.getElementById('app').classList.remove('hidden');document.getElementById('unlock').classList.add('hidden');show(active)}
async function show(id){active=id;document.getElementById('pageTitle').textContent=titles[id];document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===id));document.getElementById('view').innerHTML='<div class="card muted">Loading…</div>';try{if(id==='overview')return renderOverview(await call('/api/admin/summary'));if(id==='system-scan')return renderScan(await call('/api/admin/system-scan'));if(id==='chat')return renderChat();renderTable(id,await call('/api/admin/'+id))}catch(e){document.getElementById('view').innerHTML=`<div class="card status-critical">${esc(e.message)}</div>`}}
function renderOverview(s){const cards=[['Users',s.users_count],['Active entitlements',s.active_entitlements_count],['Outputs remaining',s.total_outputs_remaining],['Web3 outputs',s.web3_outputs_count],['Pending payments',s.pending_payment_requests_count],['Watchlist sources',s.watchlist_sources_count],['Web3 events',s.web3_events_count],['Chain health logs',s.chain_health_logs_count],['Analytics events',s.analytics_events_count]];document.getElementById('view').innerHTML=`<div class="section-head"><h2>System summary</h2><button class="btn" onclick="show('overview')">Refresh</button></div><div class="grid">${cards.map(x=>`<article class="card"><div class="muted">${esc(x[0])}</div><div class="metric">${esc(x[1])}</div></article>`).join('')}</div><div class="grid" style="margin-top:14px">${[['Latest login',s.latest_login_time],['Latest output',s.latest_output_time],['Latest chain check',s.latest_chain_check_time]].map(x=>`<article class="card"><div class="muted">${x[0]}</div><strong>${esc(fmt(x[1]))}</strong></article>`).join('')}</div>`}
function renderTable(id,payload){const rows=payload.data||[];let cols=[...new Set(rows.flatMap(Object.keys))];let body=rows.map(r=>`<tr>${cols.map(c=>`<td>${c==='status'?`<span class="badge">${esc(fmt(r[c]))}</span>`:esc(fmt(r[c]))}</td>`).join('')}${id==='payments'?`<td>${r.status==='pending'?`<button class="btn" onclick="review('${esc(r.id)}','approve')">Approve</button> <button class="btn btn-danger" onclick="review('${esc(r.id)}','reject')">Reject</button>`:'—'}</td>`:''}</tr>`).join('');document.getElementById('view').innerHTML=`<div class="section-head"><h2>Latest ${esc(titles[id])} data</h2><button class="btn" onclick="show('${id}')">Refresh</button></div><div class="table-wrap">${rows.length?`<table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}${id==='payments'?'<th>actions</th>':''}</tr></thead><tbody>${body}</tbody></table>`:'<div class="empty">No data found.</div>'}</div>`}
async function review(id,action){let reason='';if(action==='reject')reason=prompt('Rejection reason (optional)')||'';if(!confirm(`${action} this payment request?`))return;try{await call(`/api/admin/payment-requests/${action}`,{method:'POST',body:JSON.stringify({payment_request_id:id,reason})});show('payments')}catch(e){alert(e.message)}}
function renderScan(scan){document.getElementById('view').innerHTML=`<div class="notice">Admin chat is read-only in this version. It can scan and summarize the system, but it cannot approve payments, change credits, delete data, or access secret values.</div><div class="section-head"><h2 class="status-${esc(scan.status)}">${scan.status==='healthy'?'✅':scan.status==='warning'?'⚠️':'❌'} ${esc(scan.status)}</h2><button class="btn" onclick="show('system-scan')">Run scan</button></div><div class="scan">${scan.checks.map(c=>`<article class="card scan-item"><strong class="status-${esc(c.status)}">${c.status==='ok'?'✅ OK':c.status==='warning'?'⚠️ Warning':'❌ Critical'}</strong><strong>${esc(c.name)}</strong><div>${esc(c.message)} <span class="muted">${esc(JSON.stringify(c.details||{}))}</span></div></article>`).join('')}</div>`}
function renderChat(){document.getElementById('view').innerHTML=`<div class="notice">Admin chat is read-only in this version. It can scan and summarize the system, but it cannot approve payments, change credits, delete data, or access secret values.</div><div class="quick">${['Sistemi tara','Ödeme bekleyenleri göster','Bugünkü aktiviteleri özetle','Watchlist durumunu kontrol et','Alchemy/Chains durumunu kontrol et','Kredi anomalilerini kontrol et'].map(x=>`<button class="btn" onclick="sendChat('${x}')">${x}</button>`).join('')}</div><div class="card chat-window" id="chatWindow"><div class="bubble">✅ OK — Koschei Admin Chat is ready. Ask for a read-only system summary.<small>${new Date().toLocaleTimeString()}</small></div></div><form class="chat-form" id="chatForm"><input id="chatInput" placeholder="Ask Koschei about system state…" required><button class="btn btn-primary">Send</button></form>`;document.getElementById('chatForm').onsubmit=e=>{e.preventDefault();sendChat(document.getElementById('chatInput').value)}}
async function sendChat(message){if(!message)return;const win=document.getElementById('chatWindow');win.insertAdjacentHTML('beforeend',`<div class="bubble admin">${esc(message)}<small>${new Date().toLocaleTimeString()}</small></div>`);document.getElementById('chatInput').value='';try{const data=await call('/api/admin/chat',{method:'POST',body:JSON.stringify({message})});win.insertAdjacentHTML('beforeend',`<div class="bubble">${esc(data.answer)}<small>${new Date().toLocaleTimeString()}</small></div>`)}catch(e){win.insertAdjacentHTML('beforeend',`<div class="bubble status-critical">${esc(e.message)}</div>`)}win.scrollTop=win.scrollHeight}
document.getElementById('unlockForm').onsubmit=async e=>{e.preventDefault();sessionStorage.setItem(storageKey,document.getElementById('password').value);try{await call('/api/admin/summary');init()}catch(e){}};document.getElementById('lockButton').onclick=()=>lock();if(sessionStorage.getItem(storageKey))init();
</script>
</body></html>
